    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  ocean:    { name:'🌊 Ocean',     BG:'#020d1a', BG2:'#041525', BG3:'#061e33', BG4:'#082540', BORDER:'#082540', BORDER2:'#0d3560', TEXT:'#b0d4f0', DIM:'#2a5070', MID:'#4a80a0', YELLOW:'#fbbf24', YELLOW2:'#fcd34d', PURPLE:'#818cf8', GREEN:'#34d399', GREEN2:'#6ee7b7', RED:'#f87171', ORANGE:'#fb923c', BLUE:'#38bdf8', TEAL:'#2dd4bf' },
  sunset:   { name:'🔥 Sunset',    BG:'#120508', BG2:'#1e0a0f', BG3:'#2a1015', BG4:'#35151a', BORDER:'#35151a', BORDER2:'#50202a', TEXT:'#f5d0c0', DIM:'#6b3535', MID:'#9b5555', YELLOW:'#fbbf24', YELLOW2:'#fcd34d', PURPLE:'#c084fc', GREEN:'#4ade80', GREEN2:'#86efac', RED:'#ff6b6b', ORANGE:'#fb923c', BLUE:'#7dd3fc', TEAL:'#5eead4' },
};

function applicaTema(t) {
  var c = TEMI[t] || TEMI.scuro;
  BG=c.BG; BG2=c.BG2; BG3=c.BG3; BG4=c.BG4; BORDER=c.BORDER; BORDER2=c.BORDER2;
  TEXT=c.TEXT; DIM=c.DIM; MID=c.MID;
  YELLOW=c.YELLOW; YELLOW2=c.YELLOW2; PURPLE=c.PURPLE;
  GREEN=c.GREEN; GREEN2=c.GREEN2; RED=c.RED; ORANGE=c.ORANGE; BLUE=c.BLUE; TEAL=c.TEAL;
  document.body.style.background = BG;
}
var K = { pwd:'tm_pwd', auth:'tm_auth', turni:'tm_turni', stra:'tm_stra', colli:'tm_colli', rate:'tm_rate', storico:'tm_storico', fb:'tm_fb', puntiSit:'tm_punti_sit', tema:'tm_tema', template:'tm_template' };
var PWD_DEFAULT_HASH = '2716882c405a97cb51cb0224575d250dfe399301e5c0c13688e7893d2d9b295c';

async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

var DEF_TURNI = [
  { id:1, nome:'Mattina 06:00',    inizio:'06:00', fine:'12:20', pIn:'10:00', pOut:'10:20', persone:0, assenti:0 },
  { id:5, nome:'Giornata 08:00',   inizio:'08:00', fine:'14:20', pIn:'12:00', pOut:'12:20', persone:0, assenti:0 },
  { id:2, nome:'Giornata 10:00',   inizio:'10:00', fine:'16:20', pIn:'14:00', pOut:'14:20', persone:0, assenti:0 },
  { id:3, nome:'Pomeriggio 13:00', inizio:'13:00', fine:'19:20', pIn:'17:00', pOut:'17:20', persone:0, assenti:0 },
];
var DEF_STRA = [
  { id:1, righe:[ { inizio:'12:20', fine:'13:20', persone:0 } ] },
  { id:5, righe:[] },
  { id:2, righe:[] },
  { id:3, righe:[ { inizio:'12:00', fine:'13:00', persone:0 } ] },
];

function lsg(k, d) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
function lss(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

// Applica tema salvato al caricamento (ora K e lsg sono definiti)
(function(){ applicaTema(lsg(K.tema, 'scuro')); })();
function tMin(t) { if (!t || t.indexOf(':') < 0) return 0; var p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); }
function mToT(m) { var h = Math.floor(m/60); var mn = Math.round(m % 60); if (mn === 60) { h++; mn = 0; } return (h < 10 ? '0'+h : ''+h) + ':' + (mn < 10 ? '0'+mn : ''+mn); }
function oggi() { var d = new Date(); return (d.getDate()<10?'0':'')+d.getDate()+'/'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'/'+d.getFullYear(); }
function fmt(n) { return Math.round(n).toLocaleString('it-IT'); }
function tColor(nome) { if (/mattina/i.test(nome)) return YELLOW; if (/pomeriggio/i.test(nome)) return PURPLE; return BLUE; }
function newId() { return Date.now() + Math.floor(Math.random()*999); }

// ── CALCOLO ──
function buildAllT(turni, stra, rate) {
  var all = turni.map(function(t) {
    return { id: t.id, nome: t.nome, inizio: t.inizio, fine: t.fine, pIn: t.pIn, pOut: t.pOut,
             persone: Math.max(0, (t.persone||0) - (t.assenti||0)), rate: Number(rate) };
  });
  stra.forEach(function(sp) {
    var t = turni.find(function(x) { return x.id === sp.id; });
    if (!t) return;
    (sp.righe || []).forEach(function(r) {
      if (r.inizio && r.fine && Number(r.persone) > 0) {
        all.push({ id: t.id, nome: t.nome + ' (rinforzo)', inizio: r.inizio, fine: r.fine,
                   pIn: '', pOut: '', persone: Number(r.persone), rate: Number(rate), isStrao: true });
      }
    });
  });
  return all;
}

function calcRows(colliN, allT, rate) {
  var evS = {};
  allT.forEach(function(t) {
    evS[tMin(t.inizio)] = true; evS[tMin(t.fine)] = true;
    if (t.pIn && t.pOut) { evS[tMin(t.pIn)] = true; evS[tMin(t.pOut)] = true; }
  });
  var ev = Object.keys(evS).map(Number).sort(function(a,b){return a-b;});
  var cum = 0; var rows = []; var finished = false;
  for (var i = 0; i < ev.length - 1; i++) {
    var frm = ev[i]; var to = ev[i+1];
    var totalR = 0; var pers = 0; var nome = ''; var isStrao = false;
    allT.forEach(function(t) {
      var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
      var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
      if (frm >= tIn && to <= tOut && !(pIn !== null && frm >= pIn && to <= pOut)) {
        totalR += t.persone * t.rate; pers += t.persone;
        nome = t.nome; if (t.isStrao) isStrao = true;
      }
    });
    var dur = to - frm;
    var prod = totalR * dur / 60;
    var colliH = Math.round(totalR);
    if (pers === 0) {
      rows.push({ frm:mToT(frm), to:mToT(to), pers:0, colliH:0, dur:dur, prod:0, cum:Math.round(cum), rim:Math.round(Math.max(0,colliN-cum)), pausa:true });
      continue;
    }
    if (finished) {
      rows.push({ frm:mToT(frm), to:mToT(to), pers:pers, colliH:colliH, dur:dur, prod:Math.round(prod), cum:colliN, rim:0, anticipo:true, nome:nome, isStrao:isStrao });
      continue;
    }
    if (cum + prod >= colliN) {
      var fineMin = frm + (colliN - cum) / totalR * 60;
      var prodFatta = colliN - cum; cum = colliN; finished = true;
      rows.push({ frm:mToT(frm), to:mToT(to), fineEx:mToT(fineMin), pers:pers, colliH:colliH, dur:dur, prod:Math.round(prodFatta), cum:colliN, rim:0, highlight:true, nome:nome, isStrao:isStrao });
    } else {
      cum += prod;
      rows.push({ frm:mToT(frm), to:mToT(to), pers:pers, colliH:colliH, dur:dur, prod:Math.round(prod), cum:Math.round(cum), rim:Math.round(Math.max(0,colliN-cum)), nome:nome, isStrao:isStrao });
    }
  }
  return { ok:finished, rows:rows, cum:Math.round(cum), fineEx:finished ? rows.find(function(r){return r.highlight;}).fineEx : null };
}

function calcAnticipo(allT, fineStr, rate) {
  if (!fineStr) return 0;
  var fineM = tMin(fineStr); var tot = 0;
  var evS = {}; evS[fineM] = true;
  allT.forEach(function(t) {
    evS[tMin(t.inizio)] = true; evS[tMin(t.fine)] = true;
    if (t.pIn && t.pOut) { evS[tMin(t.pIn)] = true; evS[tMin(t.pOut)] = true; }
  });
  var ev = Object.keys(evS).map(Number).filter(function(e){return e >= fineM;}).sort(function(a,b){return a-b;});
  for (var i = 0; i < ev.length - 1; i++) {
    var frm = ev[i]; var to = ev[i+1]; var tR = 0;
    allT.forEach(function(t) {
      var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
      var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
      if (frm >= tIn && to <= tOut && !(pIn !== null && frm >= pIn && to <= pOut))
        tR += t.persone * t.rate;
    });
    tot += tR * (to - frm) / 60;
  }
  return Math.round(tot);
}

// ── HOOK AUTO-SAVE con indicatore ──
function useAutoSave(key, value, delay) {
  delay = delay || 400;
  var _saved = useState(false); var saved = _saved[0]; var setSaved = _saved[1];
  var timerRef = useRef(null);
  var isFirst = useRef(true);
  useEffect(function() {
    if (isFirst.current) { isFirst.current = false; return; }
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(function() {
      lss(key, value);
      setSaved(true);
      setTimeout(function() { setSaved(false); }, 1200);
    }, delay);
    return function() { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [JSON.stringify(value)]);
  return saved;
}

function NumInput(props) {

      <input type="number" value={displayVal} placeholder="0"
        onChange={function(e){props.onChange(e.target.value===''?0:Math.max(0,Number(e.target.value)));}}
        style={{ width:'42px', textAlign:'center', background:BG3, border:'1px solid '+BORDER2, borderRadius:'8px', color:color, fontFamily:FONT, fontSize:'16px', fontWeight:'bold', padding:'5px 2px', outline:'none' }} />
      <button onClick={function(){props.onChange(Number(props.value)+1);}}
        style={{ width:'30px', height:'30px', borderRadius:'8px', border:'1px solid '+BORDER2, background:BG3, color:color, fontFamily:FONT, fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s' }}>+</button>
    </div>

function TimeInput(props) {

    style={{ background:BG3, border:'1px solid '+BORDER2, borderRadius:'8px', color:props.color||TEXT, fontFamily:FONT, fontSize:'12px', padding:'6px 8px', outline:'none', width:'100%', transition:'border-color 0.2s' }} />;

function ActionBtn(props) {
  var active = props.active;
  return (
    <button onClick={props.onClick}
      style={{ padding: props.small ? '6px 10px' : '10px 14px', background: active ? 'rgba(16,185,129,0.15)' : (props.bg || ('rgba('+hexToRgb(props.color||YELLOW)+',0.07)')), border:'1px solid '+(active?GREEN:(props.color||YELLOW)), borderRadius:'9px', color:active?GREEN:(props.color||YELLOW), fontFamily:FONT, fontSize: props.small ? '8px' : '9px', fontWeight:'bold', letterSpacing:'1.5px', cursor:'pointer', transition:'all 0.2s', whiteSpace:'nowrap' }}>
      {active ? (props.activeLabel || props.children) : props.children}
    </button>
  );
}
function hexToRgb(hex) {
  var r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? parseInt(r[1],16)+','+parseInt(r[2],16)+','+parseInt(r[3],16) : '255,255,255';
}

// ── LOGIN ──
function Login(props) {
  var _pwd = useState(''); var pwd = _pwd[0]; var setPwd = _pwd[1];
  var _show = useState(false); var show = _show[0]; var setShow = _show[1];
  var _err = useState(''); var err = _err[0]; var setErr = _err[1];
  var _shake = useState(false); var shake = _shake[0]; var setShake = _shake[1];
  var _loading = useState(false); var loading = _loading[0]; var setLoading = _loading[1];

  async function doLogin() {
    if (!pwd) return;
    setLoading(true);
    var h = await sha256(pwd);
    var saved = lsg(K.pwd, null);
    var ok = false;
    if (!saved) { ok = (h === PWD_DEFAULT_HASH); }
    else if (saved === h) { ok = true; }
    else if (saved === pwd) { ok = true; lss(K.pwd, h); }
    if (ok) {
      try { sessionStorage.setItem(K.auth, '1'); } catch(e) {}
      props.onLogin();
    } else {
      setErr('✗ PASSWORD ERRATA');
      setShake(true); setPwd('');
      setTimeout(function(){setShake(false);}, 500);
      setTimeout(function(){setErr('');}, 2500);
    }
    setLoading(false);
  }
  function onKey(e) { if (e.key === 'Enter') doLogin(); }

  return (
    <div style={{ minHeight:'100dvh', background:'radial-gradient(ellipse at 50% 0%, #0f1220 0%, '+BG+' 70%)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FONT, padding:'20px' }}>
      <div style={{ width:'100%', maxWidth:'300px', animation: shake ? 'shake 0.4s ease' : 'fadeIn 0.5s ease' }}>
        <div style={{ textAlign:'center', marginBottom:'40px' }}>
          <div style={{ fontSize:'56px', marginBottom:'12px', filter:'drop-shadow(0 0 20px rgba(245,158,11,0.4))' }}>📦</div>
          <div style={{ fontSize:'15px', fontWeight:'bold', letterSpacing:'5px', color:YELLOW }}>TURNIPRO</div>
          <div style={{ width:'40px', height:'2px', background:'linear-gradient(90deg,transparent,'+YELLOW+',transparent)', margin:'10px auto' }} />
          <div style={{ fontSize:'9px', color:DIM, letterSpacing:'2px' }}>v6.6 · ACCESSO RICHIESTO</div>
        </div>
        <div style={{ position:'relative', marginBottom:'14px' }}>
          <input type={show ? 'text' : 'password'} value={pwd}
            onChange={function(e){setPwd(e.target.value); setErr('');}}
            onKeyDown={onKey} placeholder="Password" autoFocus
            style={{ width:'100%', background:BG2, border:'2px solid '+(err?RED:pwd?YELLOW:BORDER2), borderRadius:'13px', color:TEXT, fontFamily:FONT, fontSize:'18px', padding:'15px 48px 15px 18px', outline:'none', letterSpacing:'2px', boxSizing:'border-box', transition:'border-color 0.25s' }} />
          <button onClick={function(){setShow(!show);}}
            style={{ position:'absolute', right:'14px', top:'50%', transform:'translateY(-50%)', background:'transparent', border:'none', cursor:'pointer', fontSize:'18px', color:DIM, padding:'4px' }}>
            {show ? '🙈' : '👁️'}
          </button>
        </div>
        <button onClick={doLogin} disabled={loading || !pwd}
          style={{ width:'100%', padding:'15px', background: pwd ? 'linear-gradient(135deg,'+YELLOW+','+YELLOW2+')' : BG3, border:'none', borderRadius:'13px', color: pwd ? '#000' : DIM, fontFamily:FONT, fontSize:'12px', fontWeight:'bold', letterSpacing:'3px', cursor: pwd ? 'pointer' : 'default', transition:'all 0.25s', boxShadow: pwd ? '0 4px 20px rgba(245,158,11,0.25)' : 'none' }}>
          {loading ? '· · ·' : 'ENTRA →'}
        </button>
        {err && <div style={{ textAlign:'center', color:RED, fontSize:'10px', letterSpacing:'2px', marginTop:'14px', animation:'fadeIn 0.2s ease' }}>{err}</div>}
      </div>
    </div>
  );
}

// ── BOTTOM NAV ──
function Nav(props) {
  var tabs = [
    { id:'input',     icon:'✏️', label:'TURNI'    },
    { id:'turni',     icon:'⚡', label:'STRAORD.'  },
    { id:'dettaglio', icon:'📋', label:'DETTAGLIO'},
    { id:'settings',  icon:'⚙️', label:'CONFIG'   },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0,
      background:BG2, borderTop:'1px solid '+BORDER,
      display:'flex', zIndex:100,
      paddingTop:'8px',
      paddingBottom:'calc(env(safe-area-inset-bottom) + 10px)',
    }}>
      {tabs.map(function(t) {
        var active = props.page === t.id;
        return (
          <button key={t.id} onClick={function(){props.setPage(t.id);}}
            style={{
              flex:1, background:'transparent', border:'none',
              cursor:'pointer', display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'flex-start',
              gap:'4px', WebkitTapHighlightColor:'transparent',
            }}>
            <div style={{
              width:'46px', height:'32px', borderRadius:'16px',
              background: active ? 'rgba(245,158,11,0.18)' : 'transparent',
              display:'flex', alignItems:'center', justifyContent:'center',
              border: active ? '1px solid rgba(245,158,11,0.4)' : '1px solid transparent',
              flexShrink:0
            }}>
              <span style={{
                fontSize:'20px', lineHeight:'1', display:'block',
                filter: active ? 'drop-shadow(0 0 5px rgba(245,158,11,0.7))' : 'opacity(0.6)',
              }}>{t.icon}</span>
            </div>
            <span style={{
              fontSize:'9px', letterSpacing:'0.5px', fontFamily:FONT,
              color: active ? YELLOW : DIM,
              fontWeight: active ? 'bold' : 'normal', lineHeight:'1'
            }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── PAGE INPUT RAPIDO ──
function PageInput(props) {
  var turni = props.turni; var setTurni = props.setTurni;
  var stra = props.stra;
  var colli = props.colli; var setColli = props.setColli;
  var rate = props.rate; var setRate = props.setRate;
  var setPage = props.setPage;

  var _pers = React.useState(function() {
    var m = {};
    props.turni.forEach(function(t){ m[t.id] = t.persone || 0; });
    return m;
  });
  var persone = _pers[0]; var setPersone = _pers[1];

  var _colliInput = React.useState(colli || '');
  var colliInput = _colliInput[0]; var setColliInput = _colliInput[1];

  var _autoSaved = React.useState(false); var autoSaved = _autoSaved[0]; var setAutoSaved = _autoSaved[1];
  var autoSaveTimer = useRef(null);

  // Punto situazione
  var _puntoOra = React.useState(''); var puntoOra = _puntoOra[0]; var setPuntoOra = _puntoOra[1];
  var _puntoRim = React.useState(''); var puntoRim = _puntoRim[0]; var setPuntoRim = _puntoRim[1];
  var _puntoRes = React.useState(null); var puntoRes = _puntoRes[0]; var setPuntoRes = _puntoRes[1];

  // Punti situazione salvati — auto-elimina giorni precedenti al caricamento
  var _pSt = React.useState(function(){
    var tutti = lsg(K.puntiSit, []);
    var soloOggi = tutti.filter(function(p){ return p.data === oggi(); });
    if (soloOggi.length !== tutti.length) lss(K.puntiSit, soloOggi); // pulisce vecchi giorni
    return soloOggi;
  });
  var puntiStoico = _pSt[0]; var setPuntiStoico = _pSt[1];
  var _pSaved = React.useState(false); var pSaved = _pSaved[0]; var setPSaved = _pSaved[1];
  var autoSavePuntoTimer = useRef(null);

  function _doSavePunto(res, isAuto) {
    if (!res) return;
    var entry = {
      id: Date.now(),
      data: oggi(),
      ora: puntoOra,
      colliRim: Number(puntoRim),
      ok: res.ok,
      fine: res.fine || null,
      anticipo: res.anticipo || 0,
      manca: res.manca || 0,
      persone: res.totPersRim || 0,
      auto: !!isAuto,
    };
    // Evita duplicati: non salvare se ora e colli uguali all'ultimo
    var prev = lsg(K.puntiSit, []).filter(function(p){ return p.data === oggi(); });
    if (prev.length > 0 && prev[0].ora === entry.ora && prev[0].colliRim === entry.colliRim) return;
    var updated = [entry].concat(prev.slice(0, 19));
    lss(K.puntiSit, updated);
    setPuntiStoico(updated);
    if (!isAuto) { setPSaved(true); setTimeout(function(){ setPSaved(false); }, 2000); }
  }

  function salvaPuntoManuale() { _doSavePunto(puntoRes, false); }

  // Sincronizza persone con turni quando cambiano dall'esterno
  useEffect(function() {
    setPersone(function(prev) {
      var m = Object.assign({}, prev);
      props.turni.forEach(function(t) { if (!(t.id in m)) m[t.id] = t.persone || 0; });
      return m;
    });
  }, [props.turni.length]);

  // AUTO-SAVE: ogni modifica salva silenziosamente — nessun bottone necessario
  function triggerAutoSave(newPersone, newColli) {
    if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current = setTimeout(function() {
      setTurni(function(prev) {
        return prev.map(function(t) {
          return Object.assign({}, t, { persone: (newPersone||persone)[t.id] || 0 });
        });
      });
      if (newColli !== undefined) setColli(newColli);
      setAutoSaved(true);
      setTimeout(function() { setAutoSaved(false); }, 1500);
    }, 500);
  }

  function setPers(id, v) {
    var newP = Object.assign({}, persone); newP[id] = Math.max(0, v);
    setPersone(newP);
    triggerAutoSave(newP, undefined);
  }

  function handleColliChange(v) {
    setColliInput(v);
    triggerAutoSave(undefined, v);
  }

  var totPersone = Object.values(persone).reduce(function(a,b){ return a + Number(b); }, 0);
  var r2 = Number(rate);

  // allT dai persone locali (non ancora committati) — include straordinari
  function buildAllTLocal() {
    var localTurni = props.turni.map(function(t) {
      return Object.assign({}, t, { persone: persone[t.id] || 0, assenti: 0 });
    });
    return buildAllT(localTurni, props.stra || [], r2);
  }

  // ── Calcolo chiusura + anticipo in tempo reale ──
  var chiusuraInfo = useMemo(function() {
    if (!colliInput || totPersone === 0) return null;
    var colliN = Number(colliInput);
    var allT = buildAllTLocal();
    var res = calcRows(colliN, allT, r2);
    if (!res.ok) return { ok: false };
    var ant = calcAnticipo(allT, res.fineEx, r2);
    return { ok: true, fine: res.fineEx, anticipo: ant };
  }, [colliInput, r2, JSON.stringify(persone), JSON.stringify(props.turni)]);

  // Colli per singolo turno
  function colliPerTurno(t) {
    var p = persone[t.id] || 0;
    if (!p) return 0;
    var min = tMin(t.fine) - tMin(t.inizio);
    if (t.pIn && t.pOut) min -= (tMin(t.pOut) - tMin(t.pIn));
    return Math.round(p * r2 * min / 60);
  }

  var totaleColli = props.turni.reduce(function(s, t) { return s + colliPerTurno(t); }, 0);

  // ── PUNTO SITUAZIONE — ricalcolo automatico (solo turni base, senza straordinari) ──
  useEffect(function() {
    if (!puntoOra || !puntoRim) { setPuntoRes(null); return; }
    var oraM = tMin(puntoOra); var rim = Number(puntoRim);
    if (!rim) { setPuntoRes(null); return; }
    var allT = buildAllT(props.turni, [], r2); // senza straordinari — quelli si vedono nella pagina STRAORD.
    var capRim = 0;
    allT.forEach(function(t) {
      var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
      var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
      var start = Math.max(oraM, tIn);
      if (start >= tOut) return;
      var mn = tOut - start;
      if (pIn !== null && pOut > start && pIn < tOut) mn -= Math.min(pOut,tOut) - Math.max(pIn,start);
      if (mn <= 0) return;
      capRim += Math.round(mn / 60 * t.rate * t.persone);
    });
    var ok = capRim >= rim;
    var fineStimata = null;
    if (ok) {
      var evS2 = {}; evS2[oraM] = true;
      allT.forEach(function(t) {
        if (tMin(t.fine) > oraM) {
          evS2[Math.max(oraM, tMin(t.inizio))] = true; evS2[tMin(t.fine)] = true;
          if (t.pIn && t.pOut) { if(tMin(t.pIn)>oraM) evS2[tMin(t.pIn)]=true; if(tMin(t.pOut)>oraM) evS2[tMin(t.pOut)]=true; }
        }
      });
      var sorted = Object.keys(evS2).map(Number).sort(function(a,b){return a-b;});
      var cum2 = 0;
      for (var ii = 0; ii < sorted.length-1; ii++) {
        var f2 = sorted[ii]; var t2 = sorted[ii+1];
        if (f2 < oraM) continue;
        var tR2 = 0;
        allT.forEach(function(t) {
          var tIn=tMin(t.inizio); var tOut=tMin(t.fine);
          var p2=t.pIn?tMin(t.pIn):null; var po2=t.pOut?tMin(t.pOut):null;
          if(f2>=tIn&&t2<=tOut&&!(p2!==null&&f2>=p2&&t2<=po2)) tR2+=t.persone*t.rate;
        });
        if (tR2===0) continue;
        var pp2 = tR2*(t2-f2)/60;
        if (cum2+pp2>=rim) { fineStimata=mToT(f2+(rim-cum2)/tR2*60); break; }
        cum2+=pp2;
      }
    }
    var anticipo2 = ok && fineStimata ? calcAnticipo(allT, fineStimata, r2) : 0;
    var persRim = [];
    allT.forEach(function(t) {
      if (tMin(t.fine) > oraM && t.persone > 0)
        persRim.push({ nome: t.isStrao ? t.nome+' ⚡' : t.nome, persone: t.persone, fine: mToT(tMin(t.fine)) });
    });
    var totPersRim = persRim.reduce(function(a,x){return a+x.persone;},0);
    var confronto = null;
    if (colli) {
      var fatti = Math.max(0, Number(colli) - rim);
      var piano = 0;
      allT.forEach(function(t) {
        var tIn=tMin(t.inizio); var tOut=Math.min(oraM,tMin(t.fine));
        if (tIn>=oraM||tOut<=tIn) return;
        var pIn3=t.pIn?tMin(t.pIn):null; var pOut3=t.pOut?tMin(t.pOut):null;
        var mn=tOut-tIn;
        if (pIn3!==null&&pOut3>tIn&&pIn3<tOut) mn-=Math.min(pOut3,tOut)-Math.max(pIn3,tIn);
        if (mn>0) piano+=t.persone*t.rate*mn/60;
      });
      confronto = { fatti:fatti, piano:Math.round(piano), delta:fatti-Math.round(piano) };
    }
    var newRes = { ok:ok, capRim:Math.round(capRim), rim:rim, manca:Math.abs(rim-capRim), fine:fineStimata, anticipo:anticipo2, confronto:confronto, persRim:persRim, totPersRim:totPersRim };
    setPuntoRes(newRes);

    // Auto-save dopo 3 secondi di stabilità
    if (autoSavePuntoTimer.current) clearTimeout(autoSavePuntoTimer.current);
    autoSavePuntoTimer.current = setTimeout(function() {
      _doSavePunto(newRes, true);
    }, 3000);
  }, [puntoOra, puntoRim, colli, r2, JSON.stringify(props.turni), JSON.stringify(props.stra)]);

  var storico = lsg(K.storico, []).slice(0, 5);
  var hasData = colliInput && totPersone > 0;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', fontFamily:FONT }}>

      {/* ══════════════════════════════════════════════════
          STICKY HEADER — compatto
          ══════════════════════════════════════════════════ */}
      <div style={{ background:BG2, borderBottom:'1px solid '+BORDER, padding:'10px 14px 10px', flexShrink:0 }}>

        {/* Riga titolo + chiusura stimata inline */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
            <div style={{ fontSize:'13px', fontWeight:'bold', letterSpacing:'3px', color:YELLOW }}>📦 TURNI</div>
            <SavedBadge show={autoSaved} />
          </div>

          {/* CHIUSURA STIMATA — compact pill a destra del titolo */}
          {chiusuraInfo && chiusuraInfo.ok && (
            <div style={{ background:'linear-gradient(135deg,#052e20,#064e3b)', border:'1px solid rgba(16,185,129,0.5)', borderRadius:'12px', padding:'6px 12px', display:'flex', alignItems:'center', gap:'10px' }}>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:'7px', letterSpacing:'1.5px', color:'#6ee7b7' }}>✅ CHIUSURA STIMATA</div>
                <div style={{ fontSize:'7px', color:'rgba(110,231,183,0.5)', lineHeight:1.5 }}>{totPersone} pers · {fmt(totaleColli)} colli</div>
                {chiusuraInfo.anticipo > 0 && <div style={{ fontSize:'9px', fontWeight:'bold', color:GREEN2 }}>✅ +{chiusuraInfo.anticipo.toLocaleString('it-IT')}</div>}
              </div>
              <div style={{ fontSize:'30px', fontWeight:'bold', color:GREEN, lineHeight:1, letterSpacing:'-2px', textShadow:'0 0 16px rgba(16,185,129,0.5)' }}>
                {chiusuraInfo.fine}
              </div>
            </div>
          )}
          {hasData && chiusuraInfo && !chiusuraInfo.ok && (
            <div style={{ background:'rgba(127,29,29,0.4)', border:'1px solid rgba(239,68,68,0.45)', borderRadius:'10px', padding:'6px 12px' }}>
              <div style={{ fontSize:'8px', color:'#fca5a5', letterSpacing:'1px' }}>🔴 insufficienti</div>
            </div>
          )}
          {!hasData && (
            <div style={{ fontSize:'22px', fontWeight:'bold', color:DIM, letterSpacing:'-1px' }}>--:--</div>
          )}
        </div>

        {/* Colli + Straordinari + Rate — sempre visibili */}
        {(function(){
          // Calcola totale ore-persona straordinari
          var totOreStrao = 0;
          var totPersStrao = 0;
          (props.stra||[]).forEach(function(sp){
            (sp.righe||[]).forEach(function(r){
              if(r.inizio&&r.fine&&Number(r.persone)>0){
                var mins = tMin(r.fine) - tMin(r.inizio);
                if(mins>0){ totOreStrao += mins/60 * Number(r.persone); totPersStrao += Number(r.persone); }
              }
            });
          });
          var oreInt = Math.floor(totOreStrao);
          var oreMin = Math.round((totOreStrao - oreInt)*60);
          var oreLabel = totOreStrao > 0 ? (oreInt > 0 ? oreInt+'h' : '') + (oreMin > 0 ? (oreInt>0?' ':'')+oreMin+'m' : '') : '—';
          var hasStrao = totOreStrao > 0;

          return (
            <div style={{ display:'grid', gridTemplateColumns:'1fr auto auto', gap:'8px', alignItems:'center' }}>
              <div>
                <div style={{ fontSize:'7px', color:DIM, letterSpacing:'2px', marginBottom:'3px' }}>📦 COLLI TARGET</div>
                <input
                  type="number"
                  value={colliInput}
                  onChange={function(e){handleColliChange(e.target.value);}}
                  placeholder="es. 12000"
                  style={{ width:'100%', background:BG3, border:'1px solid '+(colliInput?'rgba(245,158,11,0.5)':BORDER2), borderRadius:'10px', color:YELLOW, fontFamily:FONT, fontSize:'28px', fontWeight:'bold', outline:'none', padding:'6px 10px', transition:'border-color 0.2s' }}
                />
              </div>
              {/* ── TOTALE ORE STRAORDINARI ── */}
              <div style={{ textAlign:'center' }}>
                <div style={{ fontSize:'7px', color:DIM, letterSpacing:'1.5px', marginBottom:'3px', whiteSpace:'nowrap' }}>⚡ STRAORD.</div>
                <div style={{ background: hasStrao?'rgba(249,115,22,0.1)':BG3, border:'1px solid '+(hasStrao?'rgba(249,115,22,0.45)':BORDER2), borderRadius:'9px', padding:'5px 8px', minWidth:'52px', textAlign:'center' }}>
                  <div style={{ fontSize:'16px', fontWeight:'bold', color:hasStrao?ORANGE:DIM, lineHeight:1, letterSpacing:'-0.5px', whiteSpace:'nowrap' }}>
                    {hasStrao ? oreLabel+' · '+totPersStrao+'p' : '—'}
                  </div>
                </div>
              </div>
              <div>
                <div style={{ fontSize:'7px', color:DIM, letterSpacing:'2px', marginBottom:'3px' }}>C/ORA</div>
                <div style={{ display:'flex', flexDirection:'column', gap:'4px' }}>
                  {[90,100].map(function(v) {
                    return (
                      <button key={v} onClick={function(){setRate(v);}}
                        style={{ width:'52px', padding:'6px 4px', borderRadius:'8px', border:'2px solid '+(rate==v?PURPLE:BORDER2), background:rate==v?'rgba(167,139,250,0.2)':'transparent', color:rate==v?PURPLE:DIM, fontFamily:FONT, fontSize:'14px', fontWeight:'bold', cursor:'pointer', transition:'all 0.2s', textAlign:'center' }}>
                        {v}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })()}

      </div>

      {/* ══════════════════════════════════════════════════
          SCROLL AREA
          ══════════════════════════════════════════════════ */}
      <div style={{ flex:1, overflowY:'auto', padding:'14px', paddingBottom:'80px' }}>

        {/* ── PERSONE PER TURNO con colli inline ── */}
        <SectionHeader color={YELLOW} icon="👥">PERSONE PER TURNO</SectionHeader>
        {props.turni.map(function(t) {
          var cl = tColor(t.nome);
          var p = persone[t.id] || 0;
          var cT = colliPerTurno(t);
          return (
            <Panel key={t.id} style={{ marginBottom:'8px', border: p > 0 ? '1px solid rgba('+hexToRgb(cl)+',0.4)' : '1px solid '+BORDER, transition:'border-color 0.2s' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: p > 0 ? '9px' : '0' }}>

                  <div style={{ fontSize:'8px', color:DIM, marginTop:'2px' }}>{t.inizio} – {t.fine}</div>
                </div>
                <NumInput value={p} onChange={function(v){setPers(t.id, v);}} color={cl} />

            </div>

        {/* vs obiettivo */}
        {totPersone > 0 && Number(colliInput) > 0 && (
          <div style={{ background: totaleColli>=Number(colliInput)?'rgba(16,185,129,0.07)':'rgba(239,68,68,0.07)', border:'1px solid '+(totaleColli>=Number(colliInput)?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'), borderRadius:'10px', padding:'9px 14px', display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px' }}>
            <div style={{ fontSize:'8px', color:DIM, letterSpacing:'1px' }}>vs obiettivo {Number(colliInput).toLocaleString('it-IT')}</div>
            <div style={{ fontSize:'13px', fontWeight:'bold', color: totaleColli>=Number(colliInput)?GREEN:RED }}>
              {totaleColli>=Number(colliInput) ? '✅ +'+fmt(totaleColli-Number(colliInput)) : '⚠️ −'+fmt(Number(colliInput)-totaleColli)}
            </div>
          </div>
        )}

        {/* nota straordinari */}
        <div style={{ fontSize:'8px', color:DIM, textAlign:'center', padding:'8px 0', marginBottom:'10px', letterSpacing:'0.5px' }}>
          Per straordinari → ⚡ STRAORD.
        </div>

        {/* ══════════════════════════════════════════════
            PUNTO SITUAZIONE
            ══════════════════════════════════════════════ */}
        {(function() {
          var puntiOggi = puntiStoico.filter(function(p){ return p.data === oggi(); });
          return (
            <div style={{ background:BG2, border:'1px solid rgba(16,185,129,0.3)', borderRadius:'14px', padding:'14px', marginBottom:'14px' }}>
              {/* Header */}
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>

                  <span style={{ fontSize:'8px', color:BLUE, background:'rgba(56,189,248,0.1)', border:'1px solid rgba(56,189,248,0.35)', borderRadius:'5px', padding:'2px 7px', letterSpacing:'0.5px', fontWeight:'bold' }}>🕐 orari normali</span>
                </div>
                {puntoRes && (

                    style={{ padding:'5px 11px', background: pSaved?'rgba(16,185,129,0.2)':'rgba(16,185,129,0.08)', border:'1px solid '+(pSaved?GREEN:'rgba(16,185,129,0.4)'), borderRadius:'8px', color:pSaved?GREEN:GREEN2, fontFamily:FONT, fontSize:'8px', fontWeight:'bold', letterSpacing:'1.5px', cursor:'pointer', transition:'all 0.2s' }}>

                  </button>

              </div>

              {/* Input ora + colli */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px' }}>

                  <Lbl>ORA ATTUALE</Lbl>

                </div>

              {!puntoOra && !puntoRim && (
                <div style={{ textAlign:'center', color:DIM, fontSize:'8px', letterSpacing:'1px', padding:'6px 0 2px' }}>

              {puntoRes && (

                  {/* RISULTATO PRINCIPALE */}

                      }

                      × cancella

                  {puntiOggi.map(function(p) {

                            </div>

        {/* ── STORICO ── */}
        {storico.length > 0 && (
          <Panel>

            {storico.map(function(e, i) {
              return (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'9px 0', borderBottom: i<storico.length-1 ? '1px solid '+BORDER : 'none' }}>
                  <div>
                    <div style={{ fontSize:'10px', color:TEXT, fontWeight:'bold' }}>{e.data}</div>
                    <div style={{ fontSize:'8px', color:DIM, marginTop:'1px' }}>{e.colli.toLocaleString('it-IT')} colli · {e.rate} c/h</div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontSize:'15px', fontWeight:'bold', color: e.ok ? GREEN : RED }}>{e.chiusura||'—'}</div>
                    {e.anticipo > 0 && <div style={{ fontSize:'8px', color:GREEN2 }}>+{e.anticipo.toLocaleString('it-IT')}</div>}
                  </div>
                </div>
              );
            })}
          </Panel>
        )}

      </div>
    </div>
  );
}

// ── PAGE TURNI ──
function PageTurni(props) {
  var turni = props.turni; var setTurni = props.setTurni;
  var stra = props.stra; var setStra = props.setStra;
  var colli = props.colli; var setColli = props.setColli;
  var rate = props.rate; var setRate = props.setRate;

  var _r = useState(null); var risultato = _r[0]; var setRisultato = _r[1];
  var puntoOra = props.puntoOra; var setPuntoOra = props.setPuntoOra;
  var puntoRim = props.puntoRim; var setPuntoRim = props.setPuntoRim;
  var puntoRes = props.puntoRes; var setPuntoRes = props.setPuntoRes;
  var _ot = useState('18:00'); var oraTarget = _ot[0]; var setOraTarget = _ot[1];
  var _inv = useState(null); var invResult = _inv[0]; var setInvResult = _inv[1];
  var _sv = useState(false); var salvato = _sv[0]; var setSalvato = _sv[1];
  var _cp = useState(false); var copiato = _cp[0]; var setCopiato = _cp[1];

  // Auto-save indicatori
  var turniSaved = useAutoSave(K.turni, turni);
  var straSaved = useAutoSave(K.stra, stra);

  useEffect(function() {
    var colliN = Number(colli);
    if (!colliN) { setRisultato(null); return; }
    var r = Number(rate);
    var allT = buildAllT(turni, stra, r);
    var res = calcRows(colliN, allT, r);
    if (res.ok) res.anticipo = calcAnticipo(allT, res.fineEx, r);
    setRisultato(res);
  }, [colli, rate, JSON.stringify(turni), JSON.stringify(stra)]);

  useEffect(function() {
    if (!puntoOra || !puntoRim) return;
    var r = Number(rate); var oraM = tMin(puntoOra); var rim = Number(puntoRim);
    if (!rim) return;
    var allT = buildAllT(turni, stra, r);
    var capRim = 0;
    allT.forEach(function(t) {
      var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
      var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
      var start = Math.max(oraM, tIn);
      if (start >= tOut) return;
      var min = tOut - start;
      if (pIn !== null && pOut > start && pIn < tOut) min -= Math.min(pOut,tOut) - Math.max(pIn,start);
      if (min <= 0) return;
      capRim += Math.round(min / 60 * t.rate * t.persone);
    });
    var ok = capRim >= rim;
    var fineStimata = null;
    if (ok) {
      var evS2 = {}; evS2[oraM] = true;
      allT.forEach(function(t) {
        if (tMin(t.fine) > oraM) {
          evS2[Math.max(oraM, tMin(t.inizio))] = true; evS2[tMin(t.fine)] = true;
          if (t.pIn && t.pOut) { if(tMin(t.pIn)>oraM)evS2[tMin(t.pIn)]=true; if(tMin(t.pOut)>oraM)evS2[tMin(t.pOut)]=true; }
        }
      });
      var sorted = Object.keys(evS2).map(Number).sort(function(a,b){return a-b;});
      var cum2 = 0;
      for (var ii = 0; ii < sorted.length-1; ii++) {
        var f2 = sorted[ii]; var t2 = sorted[ii+1];
        if (f2 < oraM) continue;
        var tR2 = 0;
        allT.forEach(function(t) {
          var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
          var pIn2 = t.pIn ? tMin(t.pIn) : null; var pOut2 = t.pOut ? tMin(t.pOut) : null;
          if (f2 >= tIn && t2 <= tOut && !(pIn2 !== null && f2 >= pIn2 && t2 <= pOut2)) tR2 += t.persone * t.rate;
        });
        if (tR2 === 0) continue;
        var p2 = tR2 * (t2 - f2) / 60;
        if (cum2 + p2 >= rim) { fineStimata = mToT(f2 + (rim - cum2) / tR2 * 60); break; }
        cum2 += p2;
      }
    }
    var anticipo2 = ok && fineStimata ? calcAnticipo(allT, fineStimata, r) : 0;
    var persRimanenti = [];
    allT.forEach(function(t) {
      if (tMin(t.fine) > oraM && t.persone > 0)
        persRimanenti.push({ nome: t.isStrao ? t.nome : t.nome, persone: t.persone, fine: mToT(tMin(t.fine)), isStrao: !!t.isStrao });
    });
    var totPersRim = persRimanenti.reduce(function(acc,x){ return acc+x.persone; }, 0);
    var confronto = null;
    if (colli) {
      var fatti = Math.max(0, Number(colli) - rim);
      var colliPian = 0;
      allT.forEach(function(t) {
        var tIn = tMin(t.inizio); var tOut = Math.min(oraM, tMin(t.fine));
        if (tIn >= oraM || tOut <= tIn) return;
        var pIn3 = t.pIn ? tMin(t.pIn) : null; var pOut3 = t.pOut ? tMin(t.pOut) : null;
        var min = tOut - tIn;
        if (pIn3 !== null && pOut3 > tIn && pIn3 < tOut) min -= Math.min(pOut3,tOut) - Math.max(pIn3,tIn);
        if (min > 0) colliPian += t.persone * t.rate * min / 60;
      });
      confronto = { fatti:fatti, piano:Math.round(colliPian), delta:fatti-Math.round(colliPian) };
    }
    setPuntoRes({ ok:ok, capRim:Math.round(capRim), rim:rim, manca:Math.abs(rim-capRim), fine:fineStimata, anticipo:anticipo2, confronto:confronto, persRimanenti:persRimanenti, totPersRim:totPersRim });
  }, [puntoOra, puntoRim, colli, rate, JSON.stringify(turni), JSON.stringify(stra)]);

  function setP(id, v) { setTurni(function(prev){return prev.map(function(t){return t.id===id ? Object.assign({},t,{persone:Math.max(0,v)}) : t;});}); }
  function setA(id, v) { setTurni(function(prev){return prev.map(function(t){return t.id===id ? Object.assign({},t,{assenti:Math.max(0,v)}) : t;});}); }
  function setStraRiga(tid,ri,field,val) { setStra(function(prev){return prev.map(function(sp){ if(sp.id!==tid)return sp; return Object.assign({},sp,{righe:sp.righe.map(function(r,i){return i===ri?Object.assign({},r,{[field]:val}):r;})}); });}); }
  function addStraRiga(tid) { setStra(function(prev){return prev.map(function(sp){ if(sp.id!==tid)return sp; return Object.assign({},sp,{righe:sp.righe.concat([{inizio:'',fine:'',persone:0}])}); });}); }
  function delStraRiga(tid,ri) { setStra(function(prev){return prev.map(function(sp){ if(sp.id!==tid)return sp; return Object.assign({},sp,{righe:sp.righe.filter(function(_,i){return i!==ri;})}); });}); }
  function resetGiornata() {
    // azzera solo assenti e persone rinforzi — le persone dei turni rimangono
    setTurni(function(prev){return prev.map(function(t){return Object.assign({},t,{assenti:0});});});
    setStra(function(prev){return prev.map(function(sp){return Object.assign({},sp,{righe:(sp.righe||[]).map(function(r){return Object.assign({},r,{persone:0});})});});});
  }

  function salvaStorico() {
    var storico = lsg(K.storico, []);
    var ant = risultato ? (risultato.anticipo||0) : 0;
    var entry = { id:Date.now(), data:oggi(), colli:Number(colli), rate:Number(rate), turni:turni.map(function(t){return{nome:t.nome,persone:t.persone||0,assenti:t.assenti||0};}), chiusura:risultato?risultato.fineEx:null, anticipo:ant, ok:risultato?risultato.ok:false };
    lss(K.storico, [entry].concat(storico.slice(0,29)));
    setSalvato(true); setTimeout(function(){setSalvato(false);}, 2500);
  }

  function copiaPian() {
    var lines = ['📦 TURNIPRO - '+oggi(),'================================','COLLI: '+(colli||0)+' · C/H: '+rate,'','TURNI','────────────────────────────'];
    turni.forEach(function(t){ var eff=Math.max(0,(t.persone||0)-(t.assenti||0)); if(eff>0) lines.push(t.nome+'  '+t.inizio+'→'+t.fine+'  👥'+eff); });
    var hasS=false;
    stra.forEach(function(sp){ (sp.righe||[]).filter(function(r){return r.inizio&&r.fine&&Number(r.persone)>0;}).forEach(function(r){ if(!hasS){lines.push('','RINFORZI','────────────────────────────');hasS=true;} var t=turni.find(function(x){return x.id===sp.id;}); lines.push('⚡ '+(t?t.nome:'')+'  '+r.inizio+'→'+r.fine+'  👥'+r.persone); }); });
    if (risultato) {
      lines.push('','RISULTATO','────────────────────────────');
      if (risultato.ok) { lines.push('🏁 Chiusura: '+risultato.fineEx); if(risultato.anticipo>0) lines.push('⚡ Anticipo: +'+risultato.anticipo.toLocaleString('it-IT')); }
      else lines.push('🔴 Mancano: '+(Number(colli)-risultato.cum).toLocaleString('it-IT'));
    }
    navigator.clipboard.writeText(lines.join('\n')).then(function(){setCopiato(true);setTimeout(function(){setCopiato(false);},2500);}).catch(function(){prompt('Copia:',lines.join('\n'));});
  }

  function calcolaInverso() {
    var target = tMin(oraTarget); var colliN = Number(colli); var r = Number(rate); var TOL = 20;
    function calcF(allT2) {
      var evS3 = {};
      allT2.forEach(function(t){ evS3[tMin(t.inizio)]=true; evS3[tMin(t.fine)]=true; if(t.pIn&&t.pOut){evS3[tMin(t.pIn)]=true;evS3[tMin(t.pOut)]=true;} });
      var ev2 = Object.keys(evS3).map(Number).sort(function(a,b){return a-b;}); var cum3=0;
      for(var ii=0;ii<ev2.length-1;ii++){
        var f3=ev2[ii];var t3=ev2[ii+1];var tR3=0;
        allT2.forEach(function(t){var tIn=tMin(t.inizio);var tOut=tMin(t.fine);var pIn=t.pIn?tMin(t.pIn):null;var pOut=t.pOut?tMin(t.pOut):null;if(f3>=tIn&&t3<=tOut&&!(pIn!==null&&f3>=pIn&&t3<=pOut))tR3+=t.persone*t.rate;});
        if(tR3===0)continue;var p3=tR3*(t3-f3)/60;if(cum3+p3>=colliN)return f3+(colliN-cum3)/tR3*60;cum3+=p3;
      }
      return null;
    }
    var turniEff = turni.map(function(t){return Object.assign({},t,{persone:Math.max(0,(t.persone||0)-(t.assenti||0)),rate:r});});
    var straV = [];
    stra.forEach(function(sp){
      var t = turni.find(function(x){return x.id===sp.id;});
      (sp.righe||[]).forEach(function(rr){
        if(rr.inizio&&rr.fine&&Number(rr.persone)>0) straV.push({id:sp.id,nome:(t?t.nome:'')+'(rinforzo)',inizio:rr.inizio,fine:rr.fine,pIn:'',pOut:'',persone:Number(rr.persone),rate:r,isStrao:true});
      });
    });
    var mat = turniEff.find(function(t){return /mattina/i.test(t.nome);});
    var pom = turniEff.find(function(t){return /pomeriggio/i.test(t.nome);});
    var allCur = turniEff.concat(straV);
    var fineAtt = calcF(allCur);
    var fineAttStr = fineAtt ? mToT(Math.round(fineAtt)) : null;
    var diff = fineAtt ? fineAtt - target : null;
    if (fineAtt && Math.abs(diff) <= TOL) { setInvResult({tipo:'ok',fine:fineAttStr}); return; }
    if (mat && pom && fineAtt) {
      var verso = diff < 0 ? 'mp' : 'pm';
      var maxS = verso==='mp' ? mat.persone : pom.persone;
      for (var s=1; s<=maxS; s++) {
        var tm = turniEff.map(function(t){
          var tc = Object.assign({},t);
          if(verso==='mp'){if(t.id===mat.id)tc.persone=Math.max(0,mat.persone-s);if(t.id===pom.id)tc.persone=pom.persone+s;}
          else{if(t.id===mat.id)tc.persone=mat.persone+s;if(t.id===pom.id)tc.persone=Math.max(0,pom.persone-s);}
          return tc;
        });
        var fm = calcF(tm.concat(straV));
        if (fm && Math.abs(fm-target) <= TOL) {
          setInvResult({tipo:'sposta',fineAtt:fineAttStr,fineNuova:mToT(Math.round(fm)),quante:s,da:verso==='mp'?mat.nome:pom.nome,a:verso==='mp'?pom.nome:mat.nome,matNew:verso==='mp'?mat.persone-s:mat.persone+s,pomNew:verso==='mp'?pom.persone+s:Math.max(0,pom.persone-s)});
          return;
        }
      }
    }
    var maxM = mat?mat.persone:0; var maxP = pom?pom.persone:0;
    for (var pm=0;pm<=maxP;pm++) {
      for (var sm=0;sm<=maxM;sm++) {
        if (pm===0&&sm===0) continue;
        var st = [];
        if(sm>0) st.push({nome:'Rinforzo Mat',inizio:'12:20',fine:'13:20',pIn:'',pOut:'',persone:sm,rate:r,isStrao:true});
        if(pm>0) st.push({nome:'Rinforzo Pom',inizio:'12:00',fine:'13:00',pIn:'',pOut:'',persone:pm,rate:r,isStrao:true});
        var fm2 = calcF(turniEff.concat(straV).concat(st));
        if (fm2 && Math.abs(fm2-target) <= TOL) { setInvResult({tipo:'strao',fineAtt:fineAttStr,fineNuova:mToT(Math.round(fm2)),strao:st}); return; }
      }
    }
    setInvResult({tipo:'impossibile',fineAtt:fineAttStr});
  }

  var isOk = risultato && risultato.ok;
  var anyModified = turniSaved || straSaved;

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:'70px' }}>
      {/* HEADER */}
      <div style={{ background:'linear-gradient(180deg,'+BG2+','+BG+')', borderBottom:'1px solid '+BORDER, padding:'10px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
          <div style={{ fontSize:'13px', fontWeight:'bold', letterSpacing:'3px', color:YELLOW, fontFamily:FONT }}>⚡ TURNI STRAORD.</div>
          <SavedBadge show={anyModified} />
        </div>
        <div style={{ display:'flex', gap:'5px' }}>
          <ActionBtn onClick={copiaPian} color={PURPLE} active={copiato} activeLabel="✅ COPIATO" small>📋 COPIA</ActionBtn>
          {risultato && <ActionBtn onClick={salvaStorico} color={GREEN} active={salvato} activeLabel="✅ SALVATO" small>💾 SALVA</ActionBtn>}
          <ActionBtn onClick={function(){setTurni(DEF_TURNI);setStra(DEF_STRA);setColli('');}} color={RED} small>↺ RESET</ActionBtn>
        </div>
      </div>

      <div style={{ padding:'10px 14px 0' }}>
        <button onClick={resetGiornata}
          style={{ width:'100%', padding:'11px', background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.4)', borderRadius:'11px', color:RED, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer', transition:'all 0.2s' }}>
          ↺ AZZERA ASSENTI E ORE STRAORDINARIE
        </button>
      </div>

      <div style={{ padding:'14px', fontFamily:FONT }}>
        {/* COLLI + RATE */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'14px' }}>
          <Panel style={{ border: colli ? '1px solid rgba(245,158,11,0.4)' : '1px solid '+BORDER }}>
            <Lbl color={YELLOW}>COLLI TARGET</Lbl>
            <input type="number" value={colli} onChange={function(e){setColli(e.target.value);}} placeholder="0"
              style={{ width:'100%', background:'transparent', border:'none', color:YELLOW, fontFamily:FONT, fontSize:'30px', fontWeight:'bold', outline:'none', padding:0 }} />
          </Panel>
          <Panel>
            <Lbl color={PURPLE}>COLLI / ORA</Lbl>
            <div style={{ display:'flex', gap:'6px' }}>
              {[90,100].map(function(v) {
                return <button key={v} onClick={function(){setRate(v);}} style={{ flex:1, padding:'10px 4px', borderRadius:'9px', border:'2px solid '+(rate==v?PURPLE:BORDER2), background:rate==v?'rgba(167,139,250,0.15)':'transparent', color:rate==v?PURPLE:DIM, fontFamily:FONT, fontSize:'17px', fontWeight:'bold', cursor:'pointer', transition:'all 0.2s' }}>{v}</button>;
              })}
            </div>
          </Panel>
        </div>

        <SectionHeader color={YELLOW}>TURNI DI LAVORO</SectionHeader>
        {turni.map(function(t) {
          var eff = Math.max(0, (t.persone||0) - (t.assenti||0));
          var cl = tColor(t.nome);
          var sp = stra.find(function(s){return s.id===t.id;}) || { righe:[] };
          return (
            <Panel key={t.id} style={{ marginBottom:'10px', border: eff > 0 ? '1px solid rgba('+hexToRgb(cl)+',0.35)' : '1px solid '+BORDER }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px' }}>
                <div>
                  <div style={{ fontSize:'11px', fontWeight:'bold', color:cl, letterSpacing:'1px' }}>{t.nome}</div>
                  <div style={{ fontSize:'8px', color:DIM, marginTop:'2px' }}>{t.inizio} – {t.fine} · pausa {t.pIn}–{t.pOut}</div>
                </div>
                {eff > 0 && (
                  <div style={{ fontSize:'10px', fontWeight:'bold', color:GREEN, background:'rgba(16,185,129,0.12)', border:'1px solid rgba(16,185,129,0.3)', borderRadius:'8px', padding:'4px 10px', letterSpacing:'0.5px' }}>
                    {eff} eff.
                  </div>
                )}
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom: eff > 0 ? '8px' : 0 }}>
                <div><Lbl>👥 PERSONE</Lbl><NumInput value={t.persone||0} onChange={function(v){setP(t.id,v);}} color={cl} /></div>
                <div><Lbl>🚫 ASSENTI</Lbl><NumInput value={t.assenti||0} onChange={function(v){setA(t.id,v);}} color={RED} /></div>
              </div>
              {(function(){
                if (eff === 0) return null;
                var tIn2 = tMin(t.inizio); var tOut2 = tMin(t.fine);
                var pIn2 = t.pIn ? tMin(t.pIn) : null; var pOut2 = t.pOut ? tMin(t.pOut) : null;
                var min2 = tOut2 - tIn2;
                if (pIn2 && pOut2) min2 -= (pOut2 - pIn2);
                var colliTurno = Math.round(eff * Number(rate) * min2 / 60);
                var colliStrao = 0;
                (sp.righe||[]).forEach(function(rr){
                  if(rr.inizio&&rr.fine&&Number(rr.persone)>0) colliStrao += Math.round(Number(rr.persone)*Number(rate)*(tMin(rr.fine)-tMin(rr.inizio))/60);
                });
                return (
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', background:BG3, borderRadius:'9px', padding:'8px 12px', marginBottom:'10px' }}>
                    <div style={{ fontSize:'8px', color:DIM, letterSpacing:'1.5px' }}>📦 COLLI TURNO</div>
                    <div style={{ display:'flex', gap:'10px', alignItems:'center' }}>
                      <div style={{ fontSize:'16px', fontWeight:'bold', color:cl }}>{colliTurno.toLocaleString('it-IT')}</div>
                      {colliStrao > 0 && <div style={{ fontSize:'11px', color:ORANGE, fontWeight:'bold' }}>+{colliStrao.toLocaleString('it-IT')}</div>}
                    </div>
                  </div>
                );
              })()}
              {sp.righe.map(function(rr, ri) {
                return (
                  <div key={ri} style={{ borderTop:'1px solid '+BORDER, paddingTop:'10px', marginTop:'6px' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'9px' }}>
                      <div style={{ fontSize:'8px', color:ORANGE, letterSpacing:'2px', fontWeight:'bold' }}>
                        👤 STRAORDINARIO{sp.righe.length>1?' '+(ri+1):''}
                      </div>
                      <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
                        <NumInput value={rr.persone||0} onChange={function(v){setStraRiga(t.id,ri,'persone',v);}} color={ORANGE} />
                        <button onClick={function(){delStraRiga(t.id,ri);}} style={{ background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:'5px', color:RED, cursor:'pointer', fontSize:'13px', padding:'1px 7px', lineHeight:1.5 }}>×</button>
                      </div>
                    </div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'7px' }}>
                      <div><div style={{ fontSize:'7px', color:DIM, marginBottom:'3px' }}>DALLE</div><TimeInput value={rr.inizio} onChange={function(v){setStraRiga(t.id,ri,'inizio',v);}} color={ORANGE} /></div>
                      <div><div style={{ fontSize:'7px', color:DIM, marginBottom:'3px' }}>ALLE</div><TimeInput value={rr.fine} onChange={function(v){setStraRiga(t.id,ri,'fine',v);}} color={ORANGE} /></div>
                    </div>
                  </div>
                );
              })}
              <button onClick={function(){addStraRiga(t.id);}}
                style={{ width:'100%', marginTop:'10px', padding:'8px', background:'rgba(249,115,22,0.05)', border:'1px dashed rgba(249,115,22,0.5)', borderRadius:'9px', color:ORANGE, fontFamily:FONT, fontSize:'8px', letterSpacing:'2px', cursor:'pointer' }}>
                + AGGIUNGI ORARIO STRAORDINARIO
              </button>
            </Panel>
          );
        })}

        {/* RISULTATO */}
        {risultato && (
          <div className="fadeup" style={{ marginTop:'14px' }}>
            <div style={{ background: isOk ? 'linear-gradient(135deg,#064e3b,#065f46)' : 'linear-gradient(135deg,#450a0a,#7f1d1d)', border:'2px solid '+(isOk?GREEN:RED), borderRadius:'16px', padding:'22px', textAlign:'center', boxShadow: isOk ? '0 6px 24px rgba(16,185,129,0.15)' : '0 6px 24px rgba(239,68,68,0.1)' }}>
              <div style={{ fontSize:'8px', letterSpacing:'3px', color: isOk ? '#6ee7b7' : '#fca5a5', marginBottom:'10px' }}>{isOk ? '✅ CHIUSURA PREVISTA' : '🔴 TURNI INSUFFICIENTI'}</div>
              {isOk ? (
                <div>
                  <div style={{ fontSize:'56px', fontWeight:'bold', color:GREEN, lineHeight:1, marginBottom:'8px', letterSpacing:'-2px', textShadow:'0 0 30px rgba(16,185,129,0.4)' }}>{risultato.fineEx}</div>
                  {risultato.anticipo > 0 && <div style={{ fontSize:'11px', color:'#6ee7b7' }}>⚡ Anticipo: <b style={{ color:GREEN2, fontSize:'13px' }}>+{risultato.anticipo.toLocaleString('it-IT')}</b> colli</div>}
                </div>
              ) : (
                <div>
                  <div style={{ fontSize:'36px', fontWeight:'bold', color:RED, marginBottom:'6px' }}>{(Number(colli)-risultato.cum).toLocaleString('it-IT')}</div>
                  <div style={{ fontSize:'10px', color:'#fca5a5' }}>colli mancanti · prodotti: {risultato.cum.toLocaleString('it-IT')}</div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* PUNTO SITUAZIONE CON STRAORDINARI */}
        <div style={{ marginTop:'14px', background:BG2, border:'1px solid rgba(16,185,129,0.3)', borderRadius:'14px', padding:'14px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px' }}>
            <SectionHeader color={GREEN} icon="📍">PUNTO SITUAZIONE</SectionHeader>
            <span style={{ fontSize:'8px', color:ORANGE, background:'rgba(249,115,22,0.1)', border:'1px solid rgba(249,115,22,0.35)', borderRadius:'5px', padding:'2px 7px', letterSpacing:'0.5px' }}>⚡ con straordinari</span>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px' }}>
            <div>
              <Lbl>ORA ATTUALE</Lbl>
              <input type="time" value={puntoOra} onChange={function(e){setPuntoOra(e.target.value);}}
                style={{ width:'100%', background:BG3, border:'1px solid '+(puntoOra?'rgba(16,185,129,0.4)':BORDER2), borderRadius:'9px', color:GREEN, fontFamily:FONT, fontSize:'19px', fontWeight:'bold', padding:'9px', outline:'none', transition:'border-color 0.2s' }} />
            </div>
            <div>
              <Lbl>COLLI RIMANENTI</Lbl>
              <input type="number" value={puntoRim} onChange={function(e){setPuntoRim(e.target.value);}} placeholder="es. 5000"
                style={{ width:'100%', background:BG3, border:'1px solid '+(puntoRim?'rgba(16,185,129,0.4)':BORDER2), borderRadius:'9px', color:GREEN, fontFamily:FONT, fontSize:'19px', fontWeight:'bold', padding:'9px', outline:'none', transition:'border-color 0.2s' }} />
            </div>
          </div>
          {!puntoOra && !puntoRim && (
            <div style={{ textAlign:'center', color:DIM, fontSize:'8px', letterSpacing:'1px', padding:'4px 0' }}>
              Inserisci ora e colli rimanenti → risultato automatico
            </div>
          )}
          {puntoRes && (
            <div className="fadeup">
              <div style={{ background: puntoRes.ok ? 'linear-gradient(135deg,#064e3b,#065f46)' : 'linear-gradient(135deg,#450a0a,#7f1d1d)', border:'2px solid '+(puntoRes.ok?GREEN:RED), borderRadius:'13px', padding:'16px', marginBottom:'8px', textAlign:'center' }}>
                <div style={{ fontSize:'8px', letterSpacing:'2px', color: puntoRes.ok ? '#6ee7b7' : '#fca5a5', marginBottom:'8px' }}>
                  {puntoRes.ok ? '✅ CE LA FACCIAMO' : '🔴 NON CE LA FACCIAMO'}
                </div>
                {puntoRes.ok
                  ? <div>
                      <div style={{ fontSize:'40px', fontWeight:'bold', color:GREEN, lineHeight:1 }}>{puntoRes.fine||'—'}</div>
                      {puntoRes.anticipo>0 && <div style={{ fontSize:'10px', color:'#6ee7b7', marginTop:'4px' }}>⚡ +{puntoRes.anticipo.toLocaleString('it-IT')} extra</div>}
                    </div>
                  : <div style={{ fontSize:'24px', fontWeight:'bold', color:RED }}>{puntoRes.manca.toLocaleString('it-IT')} mancanti</div>
                }
              </div>
              {puntoRes.confronto && (
                <Panel style={{ marginBottom:'8px' }}>
                  <Lbl>CONFRONTO COLLI</Lbl>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'8px', textAlign:'center' }}>
                    {[['FATTI',puntoRes.confronto.fatti,TEXT],['PIANO',puntoRes.confronto.piano,BLUE],['DELTA',puntoRes.confronto.delta,puntoRes.confronto.delta>=0?GREEN:RED]].map(function(x){
                      return <div key={x[0]}><div style={{ fontSize:'7px', color:DIM, marginBottom:'3px' }}>{x[0]}</div><div style={{ fontSize:'17px', fontWeight:'bold', color:x[2] }}>{x[0]==='DELTA'?(x[1]>=0?'+':'')+x[1].toLocaleString('it-IT'):x[1].toLocaleString('it-IT')}</div></div>;
                    })}
                  </div>
                </Panel>
              )}
              {puntoRes.persRimanenti && puntoRes.persRimanenti.length > 0 && (
                <Panel style={{ border:'1px solid rgba(56,189,248,0.3)' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
                    <div style={{ fontSize:'8px', color:BLUE, letterSpacing:'2px', fontWeight:'bold' }}>👥 ANCORA IN TURNO</div>
                    <div style={{ fontSize:'22px', fontWeight:'bold', color:BLUE }}>{puntoRes.totPersRim}</div>
                  </div>
                  {puntoRes.persRimanenti.map(function(p, i) {
                    return (
                      <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', background:BG3, borderRadius:'8px', padding:'7px 11px', marginBottom:'4px' }}>
                        <div>
                          <div style={{ fontSize:'10px', color: p.isStrao ? ORANGE : TEXT, fontWeight:'bold' }}>{p.nome}</div>
                          <div style={{ fontSize:'8px', color:DIM, marginTop:'1px' }}>fino alle {p.fine}</div>
                        </div>
                        <div style={{ fontSize:'22px', fontWeight:'bold', color: p.isStrao ? ORANGE : BLUE }}>{p.persone}</div>
                      </div>
                    );
                  })}
                </Panel>
              )}
            </div>
          )}
        </div>

        {/* OBIETTIVO INVERSO */}
        <div style={{ marginTop:'12px', background:BG2, border:'1px solid '+BORDER, borderRadius:'14px', padding:'14px' }}>
          <SectionHeader color={PURPLE} icon="🎯">OBIETTIVO INVERSO</SectionHeader>
          <div style={{ display:'flex', gap:'10px', alignItems:'flex-end', marginBottom:'10px' }}>
            <div style={{ flex:1 }}>
              <Lbl>CHIUSURA DESIDERATA</Lbl>
              <input type="time" value={oraTarget} onChange={function(e){setOraTarget(e.target.value);setInvResult(null);}}
                style={{ width:'100%', background:BG3, border:'2px solid rgba(167,139,250,0.5)', borderRadius:'9px', color:PURPLE, fontFamily:FONT, fontSize:'22px', fontWeight:'bold', padding:'9px', outline:'none' }} />
            </div>
            <button onClick={calcolaInverso}
              style={{ padding:'11px 16px', background:'rgba(167,139,250,0.1)', border:'2px solid '+PURPLE, borderRadius:'10px', color:PURPLE, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer', whiteSpace:'nowrap' }}>
              🎯 CALCOLA
            </button>
          </div>
          {invResult && (
            <div className="fadeup">
              {invResult.tipo==='ok' && <Panel style={{ border:'2px solid '+GREEN, textAlign:'center', marginBottom:'8px' }}><Lbl color={GREEN}>✅ GIÀ IN ORARIO</Lbl><div style={{ fontSize:'40px', fontWeight:'bold', color:GREEN }}>{invResult.fine}</div></Panel>}
              {invResult.tipo==='impossibile' && <Panel style={{ border:'2px solid '+RED, marginBottom:'8px' }}><Lbl color={RED}>🔴 IMPOSSIBILE</Lbl><div style={{ fontSize:'11px', color:'#fca5a5' }}>Nessuna soluzione trovata con le risorse disponibili.</div></Panel>}
              {invResult.tipo==='sposta' && (
                <Panel style={{ border:'2px solid '+PURPLE, marginBottom:'8px' }}>
                  <Lbl color={PURPLE}>🔀 SPOSTA PERSONE</Lbl>
                  <div style={{ display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'10px', alignItems:'center' }}>
                    <div style={{ background:BG3, borderRadius:'9px', padding:'8px 12px', textAlign:'center' }}><div style={{ fontSize:'7px', color:DIM, marginBottom:'2px' }}>DA</div><div style={{ fontSize:'10px', color:'#c4b5fd', fontWeight:'bold' }}>{invResult.da}</div></div>
                    <div style={{ fontSize:'20px', color:PURPLE }}>→</div>
                    <div style={{ background:BG3, borderRadius:'9px', padding:'8px 12px', textAlign:'center' }}><div style={{ fontSize:'7px', color:DIM, marginBottom:'2px' }}>A</div><div style={{ fontSize:'10px', color:'#c4b5fd', fontWeight:'bold' }}>{invResult.a}</div></div>
                    <div style={{ background:BG3, borderRadius:'9px', padding:'8px 12px', textAlign:'center' }}><div style={{ fontSize:'7px', color:DIM, marginBottom:'2px' }}>QUANTE</div><div style={{ fontSize:'28px', fontWeight:'bold', color:PURPLE, lineHeight:1 }}>{invResult.quante}</div></div>
                    <div style={{ background:'rgba(16,185,129,0.1)', border:'1px solid rgba(16,185,129,0.3)', borderRadius:'9px', padding:'8px 12px', textAlign:'center' }}><div style={{ fontSize:'7px', color:DIM, marginBottom:'2px' }}>CHIUSURA</div><div style={{ fontSize:'22px', fontWeight:'bold', color:GREEN, lineHeight:1 }}>{invResult.fineNuova}</div></div>
                  </div>
                  <div style={{ fontSize:'10px', color:MID }}>Mat → <b style={{ color:TEXT }}>{invResult.matNew}</b> · Pom → <b style={{ color:TEXT }}>{invResult.pomNew}</b></div>
                </Panel>
              )}
              {invResult.tipo==='strao' && (
                <Panel style={{ border:'2px solid '+ORANGE, marginBottom:'8px' }}>
                  <Lbl color={ORANGE}>⚡ RINFORZO NECESSARIO</Lbl>
                  {invResult.strao.map(function(s,i){
                    return (
                      <div key={i} style={{ display:'flex', gap:'12px', alignItems:'center', marginBottom:'8px', background:BG3, borderRadius:'9px', padding:'9px 12px' }}>
                        <div><div style={{ fontSize:'8px', color:DIM }}>{s.nome}</div><div style={{ fontSize:'13px', color:ORANGE, fontWeight:'bold' }}>{s.inizio}→{s.fine}</div></div>
                        <div style={{ fontSize:'28px', fontWeight:'bold', color:ORANGE }}>{s.persone}</div>
                        <div style={{ fontSize:'10px', color:DIM }}>persone</div>
                      </div>
                    );
                  })}
                  <div style={{ fontSize:'11px', color:MID }}>Chiusura: <b style={{ color:GREEN, fontSize:'15px' }}>{invResult.fineNuova}</b> <span style={{ color:DIM }}>· attuale: {invResult.fineAtt}</span></div>
                </Panel>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PAGE DETTAGLIO ──
function PageDettaglio(props) {
  var turni = props.turni; var stra = props.stra;
  var colli = props.colli; var rate = props.rate;

  var rows = useMemo(function() {
    var colliN = Number(colli);
    if (!colliN) return [];
    var allT = buildAllT(turni, stra, Number(rate));
    return calcRows(colliN, allT, Number(rate)).rows;
  }, [colli, rate, JSON.stringify(turni), JSON.stringify(stra)]);

  var chiusura = null;
  rows.forEach(function(r) { if (r.highlight) chiusura = r.fineEx; });
  var anticipo = chiusura ? calcAnticipo(buildAllT(turni, stra, Number(rate)), chiusura, Number(rate)) : 0;

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:'70px', fontFamily:FONT }}>
      <div style={{ background:'linear-gradient(180deg,'+BG2+','+BG+')', borderBottom:'1px solid '+BORDER, padding:'11px 14px', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ fontSize:'14px', fontWeight:'bold', letterSpacing:'3px', color:YELLOW }}>📋 DETTAGLIO FASCE</div>
      </div>
      <div style={{ padding:'14px' }}>
        {!Number(colli) ? (
          <div style={{ textAlign:'center', color:DIM, fontSize:'11px', marginTop:'60px', letterSpacing:'2px' }}>
            <div style={{ fontSize:'36px', marginBottom:'14px', opacity:0.4 }}>📋</div>
            INSERISCI I COLLI<br />
            <span style={{ fontSize:'9px' }}>nella pagina TURNI o INPUT</span>
          </div>
        ) : (
          <div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'12px' }}>
              <Panel style={{ textAlign:'center' }}>
                <Lbl>COLLI TARGET</Lbl>
                <div style={{ fontSize:'26px', fontWeight:'bold', color:YELLOW }}>{Number(colli).toLocaleString('it-IT')}</div>
              </Panel>
              <Panel style={{ border:'2px solid '+(chiusura?GREEN:RED), textAlign:'center', background: chiusura ? 'rgba(16,185,129,0.04)' : 'rgba(239,68,68,0.04)' }}>
                <Lbl>CHIUSURA</Lbl>
                <div style={{ fontSize:'26px', fontWeight:'bold', color:chiusura?GREEN:RED }}>{chiusura||'—'}</div>
              </Panel>
            </div>
            {anticipo > 0 && (
              <Panel style={{ border:'1px solid rgba(167,139,250,0.4)', textAlign:'center', marginBottom:'12px', background:'rgba(167,139,250,0.04)' }}>
                <Lbl color={PURPLE}>⚡ ANTICIPO TOTALE</Lbl>
                <div style={{ fontSize:'22px', fontWeight:'bold', color:'#c4b5fd' }}>+{anticipo.toLocaleString('it-IT')} colli</div>
              </Panel>
            )}
            <SectionHeader color={MID}>FASCE ORARIE</SectionHeader>
            {rows.map(function(r, i) {
              var isS = r.isStrao || (r.nome && r.nome.indexOf('rinforzo') >= 0);
              var bord = r.highlight ? GREEN : isS ? ORANGE : r.anticipo ? PURPLE : BORDER;
              var bg = r.highlight ? 'rgba(16,185,129,0.08)' : isS ? 'rgba(249,115,22,0.07)' : r.anticipo ? 'rgba(167,139,250,0.06)' : r.pausa ? 'rgba(30,34,53,0.5)' : BG2;
              var tc = r.highlight ? GREEN : isS ? ORANGE : r.anticipo ? PURPLE : r.pausa ? DIM : TEXT;
              return (
                <div key={i} style={{ background:bg, border:'1px solid '+bord, borderRadius:'11px', padding:'10px 13px', marginBottom:'6px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: r.pausa ? 0 : '8px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:'7px' }}>
                      {isS && <span style={{ fontSize:'13px' }}>⚡</span>}
                      <div style={{ fontSize:'13px', fontWeight:'bold', color:tc }}>
                        {r.frm} → {r.highlight ? r.fineEx : r.to}
                        {r.highlight && <span style={{ marginLeft:'8px', fontSize:'8px', background:GREEN, color:'#000', borderRadius:'4px', padding:'2px 6px', fontWeight:'bold' }}>FINE ✓</span>}
                        {r.anticipo && <span style={{ marginLeft:'6px', fontSize:'8px', color:PURPLE }}> ANTICIPO</span>}
                      </div>
                      {isS && <span style={{ fontSize:'7px', background:'rgba(249,115,22,0.2)', color:ORANGE, borderRadius:'4px', padding:'2px 6px', fontWeight:'bold' }}>STRAO</span>}
                    </div>
                    <div style={{ fontSize:'8px', color:DIM }}>{r.dur}min</div>
                  </div>
                  {r.pausa ? (
                    <div style={{ fontSize:'8px', color:DIM, textAlign:'center', letterSpacing:'2px', paddingTop:'2px' }}>— PAUSA —</div>
                  ) : (
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'4px', textAlign:'center' }}>
                      {[['PERS.',r.pers,TEXT],['C/H',r.colliH||'—',MID],[r.anticipo?'ANTICIPO':'PROD.',r.prod>0?'+'+r.prod.toLocaleString('it-IT'):'—',r.highlight?GREEN:isS?ORANGE:r.anticipo?PURPLE:TEXT],[r.anticipo?'CUM.':'RIM.',r.rim.toLocaleString('it-IT'),r.rim===0?GREEN:r.anticipo?PURPLE:YELLOW]].map(function(x,xi){
                        return <div key={xi}><div style={{ fontSize:'7px', color:DIM, marginBottom:'3px' }}>{x[0]}</div><div style={{ fontSize:'13px', fontWeight:'bold', color:x[2] }}>{x[1]}</div></div>;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── PAGE SETTINGS ──
function PageSettings(props) {
  var turni = props.turni; var setTurni = props.setTurni;
  var stra = props.stra; var setStra = props.setStra;
  var onLogout = props.onLogout;
  var tema = props.tema; var setTema = props.setTema;

  var _tab = useState('turni'); var tab = _tab[0]; var setTab = _tab[1];

    setTurni(function(prev){return prev.concat([{id:id,nome:'Nuovo Turno',inizio:'06:00',fine:'14:00',pIn:'10:00',pOut:'10:20',persone:0,assenti:0}]);});
    setStra(function(prev){return prev.concat([{id:id,righe:[]}]);});
  }
  function eliminaTurno(id) { setTurni(function(prev){return prev.filter(function(t){return t.id!==id;});}); setStra(function(prev){return prev.filter(function(s){return s.id!==id;});}); }
  function addStraDefault(tid) { setStra(function(prev){return prev.map(function(sp){return sp.id===tid?Object.assign({},sp,{righe:(sp.righe||[]).concat([{inizio:'',fine:'',persone:0}])}):sp;});}); }
  function delStraDefault(tid,ri) { setStra(function(prev){return prev.map(function(sp){return sp.id===tid?Object.assign({},sp,{righe:sp.righe.filter(function(_,i){return i!==ri;})}):sp;});}); }
  function setStraDefault(tid,ri,field,val) {
    setStra(function(prev){return prev.map(function(sp){
      if(sp.id!==tid)return sp;
      return Object.assign({},sp,{righe:sp.righe.map(function(r,i){return i===ri?Object.assign({},r,{[field]:val}):r;})});
    });});
  }

  async function cambiaPwd() {
    var curHash = lsg(K.pwd, PWD_DEFAULT_HASH);
    var oldHash = await sha256(oldP);
    if (oldHash !== curHash) { setMsg({ok:false,t:'Password attuale errata'}); return; }
    if (newP.length < 4) { setMsg({ok:false,t:'Minimo 4 caratteri'}); return; }
    if (newP !== conf) { setMsg({ok:false,t:'Le password non coincidono'}); return; }
    lss(K.pwd, await sha256(newP)); setMsg({ok:true,t:'✅ Password cambiata!'}); setOldP(''); setNewP(''); setConf('');
    setTimeout(function(){setMsg(null);}, 2500);
  }

  function syncNow(dir) {
    var fbCfg = lsg(K.fb, {});
    if (!fbCfg.url) { setSyncMsg({ok:false,t:'Configura prima il URL Firebase'}); return; }
    setSyncing(true);
    var url = fbCfg.url.replace(/\/$/, '') + '/turni_data.json';
    if (dir === 'up') {
      var data = { turni:lsg(K.turni,[]), stra:lsg(K.stra,[]), colli:lsg(K.colli,''), rate:lsg(K.rate,90), storico:lsg(K.storico,[]) };
      fetch(url, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) })
        .then(function(res){ setSyncing(false); setSyncMsg(res.ok?{ok:true,t:'✅ Dati caricati!'}:{ok:false,t:'Errore HTTP '+res.status}); setTimeout(function(){setSyncMsg(null);},4000); })
        .catch(function(e){ setSyncing(false); setSyncMsg({ok:false,t:'Errore: '+e.message}); setTimeout(function(){setSyncMsg(null);},4000); });
    } else {
      fetch(url).then(function(res){return res.json();})
        .then(function(d){ if(d.turni)lss(K.turni,d.turni); if(d.stra)lss(K.stra,d.stra); if(d.colli!==undefined)lss(K.colli,d.colli); if(d.rate)lss(K.rate,d.rate); if(d.storico)lss(K.storico,d.storico); setSyncing(false); setSyncMsg({ok:true,t:'✅ Scaricato! Ricarica.'}); setTimeout(function(){setSyncMsg(null);},4000); })

  var _aiLoading = useState(false); var aiLoading = _aiLoading[0]; var setAiLoading = _aiLoading[1];

  function buildAiContext() {
    var t = turni || []; var s = stra || [];
    var storico = lsg(K.storico, []).slice(0, 10);
    var ctx = '=== DATI ATTUALI APP TURNIPRO ===\n';
    ctx += 'Colli target: ' + (lsg(K.colli,'') || 'non impostato') + '\n';
    ctx += 'Velocità: ' + (lsg(K.rate,90)) + ' colli/ora\n\n';
    ctx += 'TURNI:\n';
    t.forEach(function(tr) {
      var eff = Math.max(0,(tr.persone||0)-(tr.assenti||0));
      ctx += '- ' + tr.nome + ': ' + tr.inizio + '-' + tr.fine + ', ' + (tr.persone||0) + ' pers' + (tr.assenti>0?' ('+tr.assenti+' assenti)':'') + ', effettivi: ' + eff + '\n';
    });
    var hasStra = s.some(function(sp){return (sp.righe||[]).some(function(r){return Number(r.persone)>0;});});
    if (hasStra) {
      ctx += '\nSTRAORDINARI:\n';
      s.forEach(function(sp) {
        var turno = t.find(function(x){return x.id===sp.id;});
        (sp.righe||[]).forEach(function(r) {
          if (r.inizio && r.fine && Number(r.persone)>0)
            ctx += '- ' + (turno?turno.nome:'') + ': ' + r.inizio + '-' + r.fine + ', ' + r.persone + ' pers\n';
        });
      });
    }
    if (storico.length > 0) {
      ctx += '\nSTORICO ULTIME GIORNATE:\n';
      storico.forEach(function(e) {
        ctx += '- ' + e.data + ': ' + (e.colli||0) + ' colli, chiusura ' + (e.chiusura||'—') + (e.ok?' ✅':' 🔴') + (e.anticipo>0?' +'+e.anticipo:'') + '\n';
      });
    }
    ctx += '\n=== SEI UN ASSISTENTE ESPERTO DI MAGAZZINO ===\nRispondi in italiano, in modo conciso e pratico. Usa i dati sopra per rispondere in modo preciso.';
    return ctx;
  }

  async function inviaMessaggio() {
    var testo = aiInput.trim();
    if (!testo || aiLoading) return;
    var nuoviMsgs = aiMsgs.concat([{role:'user', content:testo}]);
    setAiMsgs(nuoviMsgs);
    setAiInput('');
    setAiLoading(true);
    try {
      var systemCtx = buildAiContext();
      var messages = nuoviMsgs.map(function(m){ return {role:m.role, content:m.content}; });
      var resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemCtx,
          messages: messages
        })
      });
      var data = await resp.json();
      var testo_ai = (data.content && data.content[0] && data.content[0].text) || 'Errore nella risposta.';
      setAiMsgs(nuoviMsgs.concat([{role:'assistant', content:testo_ai}]));
    } catch(e) {
      setAiMsgs(nuoviMsgs.concat([{role:'assistant', content:'⚠️ Errore di connessione: ' + e.message}]));
    }
    setAiLoading(false);
    setTimeout(function(){ if(aiEndRef.current) aiEndRef.current.scrollIntoView({behavior:'smooth'}); }, 100);
  }
