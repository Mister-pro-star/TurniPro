  border:'#1e2235',border2:'#2a2d3f',

  purple:'#a78bfa',purple2:'#c4b5fd',
  green:'#10b981',green2:'#34d399',
  red:'#ef4444',red2:'#fca5a5',
  orange:'#f97316',
  blue:'#38bdf8',
  text:'#e8e8e0',dim:'#555',mid:'#888',

const LS = {pwd:'tm_pwd',auth:'tm_auth',turni:'tm_turni',strao:'tm_strao',straPers:'tm_straPers',colli:'tm_colli',rate:'tm_rate',storico:'tm_storico',squadra:'tm_squadra',firebase:'tm_firebase'};
const DEFAULT_PWD = 'Vaniusa1987.';

const DEFAULT_TURNI = [
  {id:1,nome:'Mattina 06:00',inizio:'06:00',fine:'12:20',pausaInizio:'10:00',pausaFine:'10:20',persone:0,assenti:0},
  {id:5,nome:'Giornata 08:00',inizio:'08:00',fine:'14:20',pausaInizio:'12:00',pausaFine:'12:20',persone:0,assenti:0},
  {id:2,nome:'Giornata 10:00',inizio:'10:00',fine:'16:20',pausaInizio:'14:00',pausaFine:'14:20',persone:0,assenti:0},
  {id:3,nome:'Pomeriggio 13:00',inizio:'13:00',fine:'19:20',pausaInizio:'17:00',pausaFine:'17:20',persone:0,assenti:0},

const DEFAULT_STRAPERSONE = [
  {id:1,inizio:'12:20',fine:'13:20',persone:0},
  {id:5,inizio:'',fine:'',persone:0},

];

// ── UTILS ──
function lsg(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function timeToMin(t){if(!t||!t.includes(':'))return 0;const[h,m]=t.split(':').map(Number);return h*60+m}
function minToTime(m){let h=Math.floor(m/60);let mn=Math.round(m%60);if(mn===60){h++;mn=0}return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`}
function oggi(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`}
function turnoColore(nome){if(/mattina/i.test(nome))return C.accent;if(/pomeriggio/i.test(nome))return C.purple;return C.blue}

// ── CALC ENGINE ──
function calcola(colliN, tuttiTurni, rate) {
  const events = new Set();
  tuttiTurni.forEach(t=>{
    events.add(timeToMin(t.inizio));events.add(timeToMin(t.fine));
    if(t.pausaInizio&&t.pausaFine){events.add(timeToMin(t.pausaInizio));events.add(timeToMin(t.pausaFine))}
  });
  const sorted=Array.from(events).sort((a,b)=>a-b);
  let cumulo=0;const rows=[];
  for(let i=0;i<sorted.length-1;i++){
    const from=sorted[i],to=sorted[i+1];
    let pers=0;
    tuttiTurni.forEach(t=>{
      const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
      const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
      const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
      const r=Number(t._rate||rate);
      if(from>=tIn&&to<=tOut&&!(pIn!==null&&from>=pIn&&to<=pOut))
        pers+=Number(t.persone)||0;
    });
    let r2=rate;
    tuttiTurni.forEach(t=>{const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;const pOut=t.pausaFine?timeToMin(t.pausaFine):null;if(from>=tIn&&to<=tOut&&!(pIn!==null&&from>=pIn&&to<=pOut)&&t._rate)r2=Number(t._rate)});
    const prod=pers*(Number(tuttiTurni[0]?._rate||rate))*(to-from)/60;
    // recalc with proper rates
    let prodPreciso=0;
    tuttiTurni.forEach(t=>{
      const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
      const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
      const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
      const r=Number(t._rate||rate);
      if(from>=tIn&&to<=tOut&&!(pIn!==null&&from>=pIn&&to<=pOut))
        prodPreciso+=(Number(t.persone)||0)*r*(to-from)/60;
    });
    if(pers===0){rows.push({from,to,pers:0,prod:0,cumulo,nome:'PAUSA'});continue}
    if(cumulo+prodPreciso>=colliN){
      const fineMin=from+(colliN-cumulo)/pers/rate*60;
      // better: find exact with rate
      let c2=cumulo,fineEx=from;
      let persR=0,rateR=rate;
      tuttiTurni.forEach(t=>{
        const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
        const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
        const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
        const r=Number(t._rate||rate);
        if(from>=tIn&&to<=tOut&&!(pIn!==null&&from>=pIn&&to<=pOut)){
          persR+=Number(t.persone)||0;
        }
      });
      let totalRate=0;
      tuttiTurni.forEach(t=>{
        const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
        const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
        const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
        const r=Number(t._rate||rate);
        if(from>=tIn&&to<=tOut&&!(pIn!==null&&from>=pIn&&to<=pOut))
          totalRate+=(Number(t.persone)||0)*r;
      });
      const fineEsatta=totalRate>0?minToTime(from+(colliN-cumulo)/totalRate*60):minToTime(fineMin);
      rows.push({from,to,pers,prod:colliN-cumulo,cumulo:colliN,highlight:true,fineEsatta});
      return{ok:true,fineEsatta,rows,cumulo:colliN};
    }
    cumulo+=prodPreciso;
    rows.push({from,to,pers,prod:Math.round(prodPreciso),cumulo:Math.round(cumulo)});
  }
  return{ok:false,fineEsatta:null,rows,cumulo:Math.round(cumulo)};
}

function calcolaAnticipo(tuttiTurni,fineStr,rate){
  if(!fineStr)return{totale:0,dettaglio:[]};
  const fineMin=timeToMin(fineStr);
  let totale=0;const dettaglio=[];
  const events=new Set([fineMin]);
  tuttiTurni.forEach(t=>{
    events.add(timeToMin(t.inizio));events.add(timeToMin(t.fine));
    if(t.pausaInizio&&t.pausaFine){events.add(timeToMin(t.pausaInizio));events.add(timeToMin(t.pausaFine))}
  });
  const sorted=Array.from(events).filter(e=>e>=fineMin).sort((a,b)=>a-b);
  for(let i=0;i<sorted.length-1;i++){
    const from=sorted[i],to=sorted[i+1];
    let prodPreciso=0;
    tuttiTurni.forEach(t=>{
      const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
      const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
      const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
      const r=Number(t._rate||rate);
      if(from>=tIn&&to<=tOut&&!(pIn!==null&&from>=pIn&&to<=pOut))
        prodPreciso+=(Number(t.persone)||0)*r*(to-from)/60;
    });
    totale+=prodPreciso;
  }
  return{totale:Math.round(totale),dettaglio};
}

// ── FIREBASE SYNC ──
async function fbSync(fbConfig, data) {
  if(!fbConfig?.url)return{ok:false,err:'Nessun URL Firebase configurato'};
  try{
    const url=fbConfig.url.replace(/\/$/,'')+'/turni_data.json';
    const res=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    return{ok:true};
  }catch(e){return{ok:false,err:e.message}}
}
async function fbLoad(fbConfig) {
  if(!fbConfig?.url)return{ok:false,err:'Nessun URL Firebase configurato'};
  try{
    const url=fbConfig.url.replace(/\/$/,'')+'/turni_data.json';
    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    return{ok:true,data};
  }catch(e){return{ok:false,err:e.message}}
}

// ── LOGIN ──

// ── GRAFICO ──
function Grafico({turni,straPers,colli,rate}){
  const allT=useMemo(()=>[
    ...turni.map(t=>({...t,persone:Math.max(0,Number(t.persone)-Number(t.assenti||0)),_rate:rate})),
    ...straPers.filter(s=>s.inizio&&s.fine&&Number(s.persone)>0).map(s=>({...s,_rate:rate})),
  ],[turni,straPers,rate]);
  if(!colli||allT.every(t=>!Number(t.persone)))return null;
  const W=340,H=150,PL=44,PR=8,PT=8,PB=26;
  const pw=W-PL-PR,ph=H-PT-PB;
  const evS=new Set();
  allT.forEach(t=>{evS.add(timeToMin(t.inizio));evS.add(timeToMin(t.fine));if(t.pausaInizio&&t.pausaFine){evS.add(timeToMin(t.pausaInizio));evS.add(timeToMin(t.pausaFine))}});
  const ev=Array.from(evS).sort((a,b)=>a-b);
  const minS=ev[0],maxE=ev[ev.length-1],tRange=maxE-minS;
  const pts=[{t:minS,c:0}];
  let cum=0,done=false;
  for(let i=0;i<ev.length-1;i++){
    const frm=ev[i],to=ev[i+1];
    let prod=0;
    allT.forEach(t=>{
      const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
      const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
      const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
      const r=Number(t._rate||rate);
      if(frm>=tIn&&to<=tOut&&!(pIn!==null&&frm>=pIn&&to<=pOut))
        prod+=(Number(t.persone)||0)*r*(to-frm)/60;
    });
    if(!done&&cum+prod>=colli){const ft=frm+(colli-cum)/(prod/(to-frm))*60;cum=colli;done=true;pts.push({t:ft,c:cum})}
    else if(!done)cum+=prod;
    pts.push({t:to,c:done?colli:cum});
  }
  const maxC=Math.max(colli,cum)*1.05;
  const tx=t=>PL+((t-minS)/tRange)*pw;
  const ty=c=>PT+ph-(c/maxC)*ph;
  const pathD=pts.map((p,i)=>(i===0?'M':'L')+tx(p.t).toFixed(1)+','+ty(p.c).toFixed(1)).join(' ');
  const areaD=pathD+` L${tx(pts[pts.length-1].t).toFixed(1)},${PT+ph} L${PL},${PT+ph} Z`;
  const tY=ty(colli);
  const startH=Math.ceil(minS/60),endH=Math.floor(maxE/60);
  const hours=[];for(let h=startH;h<=endH;h++)hours.push(h*60);
  const closePt=pts.find(p=>p.c>=colli);
  return(
    <Panel style={{marginTop:'10px'}}>
      <SectionLabel color={C.purple}>📊 ANDAMENTO PRODUZIONE</SectionLabel>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block'}}>
        {[0.25,0.5,0.75,1].map(f=>(
          <g key={f}>
            <line x1={PL} y1={ty(maxC*f)} x2={PL+pw} y2={ty(maxC*f)} stroke={C.border} strokeWidth="1"/>
            <text x={PL-4} y={ty(maxC*f)+4} textAnchor="end" fill={C.dim} fontSize="8">{Math.round(maxC*f/100)*100}</text>
          </g>
        ))}
        <line x1={PL} y1={tY} x2={PL+pw} y2={tY} stroke={C.accent} strokeWidth="1" strokeDasharray="3,3"/>
        <path d={areaD} fill="rgba(167,139,250,0.1)"/>
        <path d={pathD} fill="none" stroke={C.purple} strokeWidth="2" strokeLinejoin="round"/>
        {hours.map(m=>(
          <g key={m}>
            <line x1={tx(m)} y1={PT} x2={tx(m)} y2={PT+ph} stroke={C.border} strokeWidth="1"/>
            <text x={tx(m)} y={PT+ph+12} textAnchor="middle" fill={C.dim} fontSize="8">{Math.floor(m/60)}:00</text>
          </g>
        ))}
        {closePt&&<g><circle cx={tx(closePt.t)} cy={ty(closePt.c)} r="4" fill={C.green}/><text x={tx(closePt.t)} y={ty(closePt.c)-7} textAnchor="middle" fill={C.green} fontSize="8" fontWeight="bold">{minToTime(closePt.t)}</text></g>}
        <line x1={PL} y1={PT} x2={PL} y2={PT+ph} stroke={C.border2} strokeWidth="1"/>
        <line x1={PL} y1={PT+ph} x2={PL+pw} y2={PT+ph} stroke={C.border2} strokeWidth="1"/>
      </svg>
    </Panel>
  );
}

// ── PAGE TURNI ──
function PageTurni(){
  const[colli,setColli]=useState(()=>lsg(LS.colli,''));
  const[rate,setRate]=useState(()=>lsg(LS.rate,90));
  const[turni,setTurni]=useState(()=>lsg(LS.turni,DEFAULT_TURNI));
  const[straPers,setStraPers]=useState(()=>lsg(LS.straPers,DEFAULT_STRAPERSONE));
  const[risultato,setRisultato]=useState(null);
  const[puntoOra,setPuntoOra]=useState('');
  const[puntoRim,setPuntoRim]=useState('');
  const[puntoResult,setPuntoResult]=useState(null);
  const[oraTarget,setOraTarget]=useState('18:00');
  const[invResult,setInvResult]=useState(null);
  const[salvato,setSalvato]=useState(false);
  const[copiato,setCopiato]=useState(false);

  useEffect(()=>{lss(LS.colli,colli)},[colli]);
  useEffect(()=>{lss(LS.rate,rate)},[rate]);
  useEffect(()=>{lss(LS.turni,turni)},[turni]);
  useEffect(()=>{lss(LS.straPers,straPers)},[straPers]);

  // Sync straPersone when turni change
  useEffect(()=>{
    setStraPers(prev=>turni.map(t=>{
      const ex=prev.find(s=>s.id===t.id);
      return ex||{id:t.id,inizio:'',fine:'',persone:0};
    }));
  },[turni.length]);

  // Auto-calcolo
  useEffect(()=>{
    const colliN=Number(colli);
    if(!colliN||colliN<=0){setRisultato(null);return}
    const r=Number(rate);
    const tuttiTurni=[
      ...turni.map(t=>({...t,persone:Math.max(0,Number(t.persone)-Number(t.assenti||0)),_rate:r})),
      ...straPers.filter(s=>s.inizio&&s.fine&&Number(s.persone)>0).map(s=>({...s,_rate:r})),
    ];
    const res=calcola(colliN,tuttiTurni,r);
    if(res.ok)res.anticipo=calcolaAnticipo(tuttiTurni,res.fineEsatta,r);
    setRisultato(res);
  },[colli,rate,turni,straPers]);

  const setP=(id,v)=>setTurni(prev=>prev.map(t=>t.id===id?{...t,persone:Math.max(0,v)}:t));
  const setA=(id,v)=>setTurni(prev=>prev.map(t=>t.id===id?{...t,assenti:Math.max(0,v)}:t));
  const setStrP=(id,field,v)=>setStraPers(prev=>prev.map(s=>s.id===id?{...s,[field]:v}:s));

  const calcolaPunto=useCallback(()=>{
    if(!puntoOra||!puntoRim)return;
    const r=Number(rate);
    const oraMin=timeToMin(puntoOra);
    const rimanenti=Number(puntoRim);
    const straV=straPers.filter(s=>s.inizio&&s.fine&&Number(s.persone)>0).map(s=>({...s,_rate:r,nome:(turni.find(t=>t.id===s.id)?.nome||'')+'(strao)'}));
    const tuttiTurni=[
      ...turni.map(t=>({...t,persone:Math.max(0,Number(t.persone)-Number(t.assenti||0)),_rate:r})),
      ...straV,
    ];
    // Capacità rimanente
    let capRim=0;const dettaglio=[];
    tuttiTurni.forEach(t=>{
      const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
      const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
      const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
      const start=Math.max(oraMin,tIn);
      if(start>=tOut)return;
      let min=tOut-start;
      if(pIn!==null&&pOut>start&&pIn<tOut)min-=Math.min(pOut,tOut)-Math.max(pIn,start);
      if(min<=0)return;
      const c=Math.round(min/60*r*Number(t.persone));
      capRim+=c;
      dettaglio.push({nome:t.nome||'Turno',dalle:minToTime(start),alle:t.fine,persone:Number(t.persone),colli:c});
    });
    const ok=capRim>=rimanenti;
    // Stima fine
    let fineStimata=null;
    if(ok){
      const evS=new Set([oraMin]);
      tuttiTurni.forEach(t=>{if(timeToMin(t.fine)>oraMin){evS.add(Math.max(oraMin,timeToMin(t.inizio)));evS.add(timeToMin(t.fine));if(t.pausaInizio&&t.pausaFine){const pI=timeToMin(t.pausaInizio);const pO=timeToMin(t.pausaFine);if(pI>oraMin)evS.add(pI);if(pO>oraMin)evS.add(pO)}}});
      const sorted=Array.from(evS).sort((a,b)=>a-b);
      let cum=0;
      for(let i=0;i<sorted.length-1;i++){
        const from=sorted[i],to=sorted[i+1];
        if(from<oraMin)continue;
        let prodP=0;
        tuttiTurni.forEach(t=>{
          const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
          const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
          const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
          if(from>=tIn&&to<=tOut&&!(pIn!==null&&from>=pIn&&to<=pOut))
            prodP+=(Number(t.persone)||0)*r*(to-from)/60;
        });
        if(cum+prodP>=rimanenti){
          let totalRate=0;
          tuttiTurni.forEach(t=>{const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;const pOut=t.pausaFine?timeToMin(t.pausaFine):null;if(from>=tIn&&to<=tOut&&!(pIn!==null&&from>=pIn&&to<=pOut))totalRate+=(Number(t.persone)||0)*r});
          fineStimata=totalRate>0?minToTime(from+(rimanenti-cum)/totalRate*60):null;
          break;
        }
        cum+=prodP;
      }
    }
    let anticipo=null;
    if(ok&&fineStimata)anticipo=calcolaAnticipo(tuttiTurni,fineStimata,r);
    // Confronto
    let confronto=null;
    if(colli){
      const colliFatti=Math.max(0,Number(colli)-rimanenti);
      let colliPian=0;
      tuttiTurni.forEach(t=>{
        const tIn=timeToMin(t.inizio),tOut=Math.min(oraMin,timeToMin(t.fine));
        if(tIn>=oraMin||tOut<=tIn)return;
        const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
        const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
        let min=tOut-tIn;
        if(pIn!==null&&pOut>tIn&&pIn<tOut)min-=Math.min(pOut,tOut)-Math.max(pIn,tIn);
        if(min>0)colliPian+=Math.round(min/60*r*Number(t.persone));
      });
      confronto={fatti:colliFatti,pianificati:Math.round(colliPian),delta:colliFatti-Math.round(colliPian)};
    }
    setPuntoResult({ok,capRim:Math.round(capRim),rimanenti,mancaDelta:Math.abs(rimanenti-capRim),fineStimata,dettaglio,anticipo,confronto});
  },[puntoOra,puntoRim,turni,straPers,colli,rate]);

  const calcolaInverso=useCallback(()=>{
    const target=timeToMin(oraTarget);
    const colliN=Number(colli);
    const r=Number(rate);
    const TOL=20;
    const calcF=(allT)=>{
      const evS=new Set();
      allT.forEach(t=>{evS.add(timeToMin(t.inizio));evS.add(timeToMin(t.fine));if(t.pausaInizio&&t.pausaFine){evS.add(timeToMin(t.pausaInizio));evS.add(timeToMin(t.pausaFine))}});
      const ev=Array.from(evS).sort((a,b)=>a-b);
      let cum=0;
      for(let i=0;i<ev.length-1;i++){
        const frm=ev[i],to=ev[i+1];
        let totalR=0;
        allT.forEach(t=>{
          const tIn=timeToMin(t.inizio),tOut=timeToMin(t.fine);
          const pIn=t.pausaInizio?timeToMin(t.pausaInizio):null;
          const pOut=t.pausaFine?timeToMin(t.pausaFine):null;
          const rt=Number(t._rate||r);
          if(frm>=tIn&&to<=tOut&&!(pIn!==null&&frm>=pIn&&to<=pOut))
            totalR+=(Number(t.persone)||0)*rt;
        });
        if(totalR===0)continue;
        const prod=totalR*(to-frm)/60;
        if(cum+prod>=colliN)return frm+(colliN-cum)/totalR*60;
        cum+=prod;
      }
      return null;
    };
    const turniEff=turni.map(t=>({...t,persone:Math.max(0,Number(t.persone)-Number(t.assenti||0)),_rate:r}));
    const mat=turniEff.find(t=>/mattina/i.test(t.nome));
    const pom=turniEff.find(t=>/pomeriggio/i.test(t.nome));
    const straV=straPers.filter(s=>s.inizio&&s.fine&&Number(s.persone)>0).map(s=>({...s,_rate:r}));
    const fineAtt=calcF([...turniEff,...straV]);
    const fineAttStr=fineAtt?minToTime(Math.round(fineAtt)):null;
    const diff=fineAtt?fineAtt-target:null;
    if(fineAtt&&Math.abs(diff)<=TOL){setInvResult({tipo:'ok',fineAttuale:fineAttStr});return}
    // Sposta
    if(mat&&pom&&fineAtt){
      const verso=diff<0?'mat_pom':'pom_mat';
      const maxS=verso==='mat_pom'?mat.persone:pom.persone;
      for(let s=1;s<=maxS;s++){
        const tm=turniEff.map(t=>{const tc={...t};if(verso==='mat_pom'){if(t.id===mat.id)tc.persone=Math.max(0,mat.persone-s);if(t.id===pom.id)tc.persone=pom.persone+s}else{if(t.id===mat.id)tc.persone=mat.persone+s;if(t.id===pom.id)tc.persone=Math.max(0,pom.persone-s)}return tc});
        const fm=calcF([...tm,...straV]);
        if(fm&&Math.abs(fm-target)<=TOL){
          setInvResult({tipo:'sposta',fineAttuale:fineAttStr,fineNuova:minToTime(Math.round(fm)),spostamento:{quante:s,da:verso==='mat_pom'?mat.nome:pom.nome,a:verso==='mat_pom'?pom.nome:mat.nome,mattinaNew:verso==='mat_pom'?mat.persone-s:mat.persone+s,pomeriggioNew:verso==='mat_pom'?pom.persone+s:Math.max(0,pom.persone-s)},straordinari:null});return;
        }
      }
    }
    // Straordinari
    const maxM=mat?mat.persone:0,maxP=pom?pom.persone:0;
    for(let pm=0;pm<=maxP;pm++){
      for(let sm=0;sm<=maxM;sm++){
        if(pm===0&&sm===0)continue;
        const st=[];
        if(sm>0)st.push({nome:'Strao Mattina',inizio:'12:20',fine:'13:20',persone:sm,pausaInizio:'',pausaFine:'',_rate:r});
        if(pm>0)st.push({nome:'Strao Pomeriggio',inizio:'12:00',fine:'13:00',persone:pm,pausaInizio:'',pausaFine:'',_rate:r});
        const fm=calcF([...turniEff,...straV,...st]);
        if(fm&&Math.abs(fm-target)<=TOL){setInvResult({tipo:'straordinario',fineAttuale:fineAttStr,fineNuova:minToTime(Math.round(fm)),spostamento:null,straordinari:st});return}
      }
    }
    // Combinato
    if(mat&&pom){
      for(let s=1;s<=Math.min(mat.persone,pom.persone,3);s++){
        const tm=turniEff.map(t=>{const tc={...t};if(t.id===mat.id)tc.persone=Math.max(0,mat.persone-s);if(t.id===pom.id)tc.persone=pom.persone+s;return tc});
        for(let pm=0;pm<=Math.min(maxP,4);pm++){
          for(let sm=0;sm<=Math.min(maxM,4);sm++){
            if(pm===0&&sm===0)continue;
            const st=[];
            if(sm>0)st.push({nome:'Strao Mattina',inizio:'12:20',fine:'13:20',persone:sm,pausaInizio:'',pausaFine:'',_rate:r});
            if(pm>0)st.push({nome:'Strao Pomeriggio',inizio:'12:00',fine:'13:00',persone:pm,pausaInizio:'',pausaFine:'',_rate:r});
            const fm=calcF([...tm,...straV,...st]);
            if(fm&&Math.abs(fm-target)<=TOL){
              setInvResult({tipo:'combinato',fineAttuale:fineAttStr,fineNuova:minToTime(Math.round(fm)),spostamento:{quante:s,da:mat.nome,a:pom.nome,mattinaNew:mat.persone-s,pomeriggioNew:pom.persone+s},straordinari:st});return;
            }
          }
        }
      }
    }
    setInvResult({tipo:'impossibile',fineAttuale:fineAttStr,messaggio:'Nessuna soluzione trovata'});
  },[oraTarget,colli,rate,turni,straPers]);

  const salvaStorico=()=>{
    const storico=lsg(LS.storico,[]);
    const entry={id:Date.now(),data:oggi(),colli:Number(colli),rate:Number(rate),turni:turni.map(t=>({nome:t.nome,persone:Number(t.persone),assenti:Number(t.assenti||0)})),chiusura:risultato?.fineEsatta||null,anticipo:risultato?.anticipo?.totale||risultato?.anticipo||0,ok:risultato?.ok||false};
    lss(LS.storico,[entry,...storico.slice(0,29)]);
    setSalvato(true);setTimeout(()=>setSalvato(false),2500);
  };

  const copiaPianificazione=()=>{
    const lines=['📦 TURNI MAGAZZINO - '+oggi(),'=====================================','COLLI: '+(colli||0),'COLLI/ORA: '+rate,''];
    lines.push('TURNI','─────────────────────────');
    turni.forEach(t=>{const eff=Math.max(0,Number(t.persone)-Number(t.assenti||0));if(eff>0)lines.push(`${t.nome}  ${t.inizio}→${t.fine}  👥${eff}`)});
    const straV=straPers.filter(s=>s.inizio&&s.fine&&Number(s.persone)>0);
    if(straV.length){lines.push('','STRAORDINARI','─────────────────────────');straV.forEach(s=>{const t=turni.find(x=>x.id===s.id);lines.push(`${t?.nome||'Strao'}  ${s.inizio}→${s.fine}  👥${s.persone}`)})}
    if(risultato){
      lines.push('','RISULTATO','─────────────────────────');
      if(risultato.ok){
        lines.push('🏁 Chiusura: '+risultato.fineEsatta);
        const ant=risultato.anticipo?.totale||risultato.anticipo||0;
        if(ant>0)lines.push('⚡ Anticipo: +'+ant.toLocaleString('it-IT')+' colli');
      }else lines.push('🔴 NON CE LA FACCIAMO','Mancano: '+(Number(colli)-risultato.cumulo).toLocaleString('it-IT')+' colli');
    }
    const txt=lines.join('\n');
    navigator.clipboard.writeText(txt).then(()=>{setCopiato(true);setTimeout(()=>setCopiato(false),2500)}).catch(()=>prompt('Copia:',txt));
  };

  const isOk=risultato&&risultato.ok;
  const coloreRis=isOk?C.green:C.red;

  return(
    <div style={{height:'100%',overflowY:'auto',paddingBottom:'80px'}}>
      {/* Header */}
      <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:10}}>
        <div style={{fontSize:'13px',fontWeight:'bold',letterSpacing:'3px',color:C.accent,fontFamily:C.F}}>📦 TURNI</div>
        <div style={{display:'flex',gap:'6px'}}>
          <button onClick={copiaPianificazione} style={{background:copiato?'rgba(16,185,129,0.15)':'rgba(167,139,250,0.1)',border:`1px solid ${copiato?C.green:C.purple}`,borderRadius:'8px',color:copiato?C.green:C.purple,fontFamily:C.F,fontSize:'9px',letterSpacing:'1px',padding:'6px 8px',cursor:'pointer'}}>
            {copiato?'✅':'📋'}
          </button>
          {risultato&&<button onClick={salvaStorico} style={{background:salvato?'rgba(16,185,129,0.15)':'rgba(16,185,129,0.1)',border:`1px solid ${C.green}`,borderRadius:'8px',color:C.green,fontFamily:C.F,fontSize:'9px',letterSpacing:'1px',padding:'6px 8px',cursor:'pointer'}}>{salvato?'✅':'💾'}</button>}
          <button onClick={()=>{setTurni(DEFAULT_TURNI);setStraPers(DEFAULT_STRAPERSONE);setColli('')}} style={{background:'rgba(239,68,68,0.1)',border:`1px solid ${C.red}`,borderRadius:'8px',color:C.red,fontFamily:C.F,fontSize:'9px',padding:'6px 8px',cursor:'pointer'}}>↺</button>
        </div>
      </div>

      <div style={{padding:'12px',fontFamily:C.F}}>
        {/* Colli + Rate */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'12px'}}>
          <Panel>
            <SectionLabel color={C.accent}>COLLI DA PROCESSARE</SectionLabel>
            <input type="number" value={colli} onChange={e=>setColli(e.target.value)} placeholder="0"
              style={{width:'100%',background:'transparent',border:'none',color:C.accent,fontFamily:C.F,fontSize:'32px',fontWeight:'bold',outline:'none',padding:0}}/>
          </Panel>
          <Panel>
            <SectionLabel color={C.purple}>COLLI / ORA</SectionLabel>
            <div style={{display:'flex',gap:'6px'}}>
              {[90,100].map(v=>(
                <button key={v} onClick={()=>setRate(v)} style={{flex:1,padding:'8px 4px',borderRadius:'8px',border:`2px solid ${rate==v?C.purple:C.border2}`,background:rate==v?'rgba(167,139,250,0.15)':'transparent',color:rate==v?C.purple:C.dim,fontFamily:C.F,fontSize:'16px',fontWeight:'bold',cursor:'pointer'}}>{v}</button>
              ))}
            </div>
          </Panel>
        </div>

        {/* Turni */}
        <SectionLabel color={C.accent}>TURNI DI LAVORO</SectionLabel>
        {turni.map(t=>{
          const eff=Math.max(0,Number(t.persone)-Number(t.assenti||0));
          const cl=turnoColore(t.nome);
          const sp=straPers.find(s=>s.id===t.id);
          return(
            <Panel key={t.id} style={{marginBottom:'8px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
                <div>
                  <div style={{fontSize:'10px',fontWeight:'bold',color:cl,letterSpacing:'1px'}}>{t.nome}</div>
                  <div style={{fontSize:'9px',color:C.dim,marginTop:'1px'}}>{t.inizio} → {t.fine} · pausa {t.pausaInizio}-{t.pausaFine}</div>
                </div>
                {eff>0&&<div style={{fontSize:'9px',color:C.green,background:'rgba(16,185,129,0.1)',border:`1px solid ${C.green}`,borderRadius:'6px',padding:'2px 7px'}}>{eff} eff.</div>}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom: sp?'10px':0}}>
                <div>
                  <div style={{fontSize:'8px',color:C.dim,letterSpacing:'1px',marginBottom:'4px'}}>👥 PERSONE</div>
                  <NumInput value={t.persone} onChange={v=>setP(t.id,v)} color={cl}/>
                </div>
                <div>
                  <div style={{fontSize:'8px',color:C.dim,letterSpacing:'1px',marginBottom:'4px'}}>🚫 ASSENTI</div>
                  <NumInput value={t.assenti||0} onChange={v=>setA(t.id,v)} color={C.red}/>
                </div>
              </div>
              {/* Straordinario per questo turno */}
              {sp&&(
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:'8px',marginTop:'2px'}}>
                  <div style={{fontSize:'8px',color:C.orange,letterSpacing:'1px',marginBottom:'6px'}}>⚡ STRAORDINARIO</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:'7px',color:C.dim,marginBottom:'2px'}}>DALLE</div>
                      <input type="time" value={sp.inizio} onChange={e=>setStrP(t.id,'inizio',e.target.value)}
                        style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'6px',color:C.orange,fontFamily:C.F,fontSize:'11px',padding:'4px 6px',outline:'none'}}/>
                    </div>
                    <div>
                      <div style={{fontSize:'7px',color:C.dim,marginBottom:'2px'}}>ALLE</div>
                      <input type="time" value={sp.fine} onChange={e=>setStrP(t.id,'fine',e.target.value)}
                        style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'6px',color:C.orange,fontFamily:C.F,fontSize:'11px',padding:'4px 6px',outline:'none'}}/>
                    </div>
                    <div>
                      <div style={{fontSize:'7px',color:C.dim,marginBottom:'2px'}}>PERSONE</div>
                      <input type="number" value={sp.persone} onChange={e=>setStrP(t.id,'persone',Math.max(0,Number(e.target.value)))}
                        style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'6px',color:'#4ade80',fontFamily:C.F,fontSize:'14px',fontWeight:'bold',padding:'4px 6px',outline:'none',textAlign:'center'}}/>
                    </div>
                  </div>
                </div>
              )}
            </Panel>
          );
        })}

        {/* Risultato principale */}
        {risultato&&(
          <div className="fadeup" style={{marginTop:'12px'}}>
            <div style={{background:isOk?'linear-gradient(135deg,#064e3b,#065f46)':'linear-gradient(135deg,#450a0a,#7f1d1d)',border:`2px solid ${coloreRis}`,borderRadius:'14px',padding:'20px',textAlign:'center',marginBottom:'10px'}}>
              <div style={{fontSize:'9px',letterSpacing:'3px',color:isOk?'#6ee7b7':C.red2,marginBottom:'8px'}}>{isOk?'✅ CHIUSURA PREVISTA':'🔴 TURNI INSUFFICIENTI'}</div>
              {isOk?(
                <>
                  <div style={{fontSize:'52px',fontWeight:'bold',color:C.green,lineHeight:1,marginBottom:'6px'}}>{risultato.fineEsatta}</div>
                  {(risultato.anticipo?.totale||risultato.anticipo)>0&&<div style={{fontSize:'11px',color:'#6ee7b7'}}>⚡ Anticipo: <b style={{color:C.green2}}>+{(risultato.anticipo?.totale||risultato.anticipo).toLocaleString('it-IT')} colli</b></div>}
                </>
              ):(
                <>
                  <div style={{fontSize:'32px',fontWeight:'bold',color:C.red,marginBottom:'4px'}}>{(Number(colli)-risultato.cumulo).toLocaleString('it-IT')}</div>
                  <div style={{fontSize:'10px',color:C.red2}}>colli mancanti · Prodotti: {risultato.cumulo.toLocaleString('it-IT')}</div>
                </>
              )}
            </div>
            <Grafico turni={turni} straPers={straPers} colli={Number(colli)} rate={Number(rate)}/>
          </div>
        )}

        {/* PUNTO SITUAZIONE */}
        <div style={{marginTop:'16px',borderTop:`1px solid ${C.border}`,paddingTop:'14px'}}>
          <SectionLabel color={C.green}>📍 PUNTO SITUAZIONE</SectionLabel>
          <div style={{fontSize:'10px',color:C.dim,marginBottom:'10px'}}>Quanti colli mancano adesso?</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}}>
            <div>
              <SectionLabel>ORA ATTUALE</SectionLabel>
              <input type="time" value={puntoOra} onChange={e=>{setPuntoOra(e.target.value);setPuntoResult(null)}}
                style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'8px',color:C.green,fontFamily:C.F,fontSize:'18px',fontWeight:'bold',padding:'10px 10px',outline:'none'}}/>
            </div>
            <div>
              <SectionLabel>COLLI RIMANENTI</SectionLabel>
              <input type="number" value={puntoRim} onChange={e=>{setPuntoRim(e.target.value);setPuntoResult(null)}} placeholder="es. 5000"
                style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'8px',color:C.green,fontFamily:C.F,fontSize:'18px',fontWeight:'bold',padding:'10px 10px',outline:'none'}}/>
            </div>
          </div>
          <Btn onClick={calcolaPunto} color={C.green} full>📍 CALCOLA</Btn>
          {puntoResult&&(
            <div className="fadeup" style={{marginTop:'10px'}}>
              <div style={{background:puntoResult.ok?'linear-gradient(135deg,#064e3b,#065f46)':'linear-gradient(135deg,#450a0a,#7f1d1d)',border:`2px solid ${puntoResult.ok?C.green:C.red}`,borderRadius:'12px',padding:'16px',marginBottom:'8px',textAlign:'center'}}>
                <div style={{fontSize:'9px',letterSpacing:'2px',color:puntoResult.ok?'#6ee7b7':C.red2,marginBottom:'6px'}}>{puntoResult.ok?'✅ CE LA FACCIAMO':'🔴 NON CE LA FACCIAMO'}</div>
                {puntoResult.ok?(
                  <>
                    <div style={{fontSize:'36px',fontWeight:'bold',color:C.green,lineHeight:1}}>{puntoResult.fineStimata||'—'}</div>
                    {puntoResult.anticipo?.totale>0&&<div style={{fontSize:'10px',color:'#6ee7b7',marginTop:'4px'}}>⚡ Anticipo: +{puntoResult.anticipo.totale.toLocaleString('it-IT')} colli</div>}
                  </>
                ):(
                  <div style={{fontSize:'22px',fontWeight:'bold',color:C.red}}>{puntoResult.mancaDelta.toLocaleString('it-IT')} colli mancanti</div>
                )}
              </div>
              {puntoResult.confronto&&(
                <Panel style={{marginBottom:'8px'}}>
                  <SectionLabel>CONFRONTO PIANIFICATO vs REALE</SectionLabel>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',textAlign:'center'}}>
                    {[['FATTI',puntoResult.confronto.fatti,C.text],['PIANO',puntoResult.confronto.pianificati,C.blue],['DELTA',puntoResult.confronto.delta>=0?'+'+puntoResult.confronto.delta:puntoResult.confronto.delta,puntoResult.confronto.delta>=0?C.green:C.red]].map(([l,v,c])=>(
                      <div key={l}><div style={{fontSize:'8px',color:C.dim,marginBottom:'2px'}}>{l}</div><div style={{fontSize:'16px',fontWeight:'bold',color:c}}>{typeof v==='number'?v.toLocaleString('it-IT'):v}</div></div>
                    ))}
                  </div>
                </Panel>
              )}
            </div>
          )}
        </div>

        {/* OBIETTIVO INVERSO */}
        <div style={{marginTop:'16px',borderTop:`1px solid ${C.border}`,paddingTop:'14px'}}>
          <SectionLabel color={C.purple}>🎯 OBIETTIVO INVERSO</SectionLabel>
          <div style={{fontSize:'10px',color:C.dim,marginBottom:'10px'}}>Vuoi chiudere entro che ora?</div>
          <div style={{display:'flex',gap:'10px',alignItems:'flex-end',marginBottom:'10px',flexWrap:'wrap'}}>
            <div style={{flex:1}}>
              <SectionLabel>CHIUSURA DESIDERATA</SectionLabel>
              <input type="time" value={oraTarget} onChange={e=>{setOraTarget(e.target.value);setInvResult(null)}}
                style={{width:'100%',background:C.bg3,border:`2px solid ${C.purple}`,borderRadius:'8px',color:C.purple,fontFamily:C.F,fontSize:'22px',fontWeight:'bold',padding:'10px',outline:'none'}}/>
            </div>
            <Btn onClick={calcolaInverso} color={C.purple}>🎯 CALCOLA</Btn>
          </div>
          {invResult&&(
            <div className="fadeup">
              {invResult.tipo==='ok'&&<Panel style={{border:`2px solid ${C.green}`,textAlign:'center'}}><div style={{fontSize:'9px',color:C.green,letterSpacing:'2px',marginBottom:'6px'}}>✅ GIÀ OK</div><div style={{fontSize:'36px',fontWeight:'bold',color:C.green}}>{invResult.fineAttuale}</div></Panel>}
              {invResult.tipo==='impossibile'&&<Panel style={{border:`2px solid ${C.red}`}}><div style={{fontSize:'9px',color:C.red,letterSpacing:'2px',marginBottom:'6px'}}>🔴 IMPOSSIBILE</div><div style={{fontSize:'11px',color:C.red2}}>{invResult.messaggio}</div></Panel>}
              {(invResult.tipo==='sposta'||invResult.tipo==='combinato')&&invResult.spostamento&&(
                <Panel style={{border:`2px solid ${C.purple}`,marginBottom:'8px'}}>
                  <div style={{fontSize:'9px',color:C.purple2,letterSpacing:'2px',marginBottom:'10px'}}>🔀 SPOSTA PERSONE</div>
                  <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',marginBottom:'8px'}}>
                    <div style={{background:C.bg3,borderRadius:'8px',padding:'8px 12px',textAlign:'center'}}>
                      <div style={{fontSize:'8px',color:C.dim}}>DA</div>
                      <div style={{fontSize:'10px',color:C.purple2,fontWeight:'bold'}}>{invResult.spostamento.da}</div>
                    </div>
                    <div style={{fontSize:'20px',color:C.purple}}>→</div>
                    <div style={{background:C.bg3,borderRadius:'8px',padding:'8px 12px',textAlign:'center'}}>
                      <div style={{fontSize:'8px',color:C.dim}}>A</div>
                      <div style={{fontSize:'10px',color:C.purple2,fontWeight:'bold'}}>{invResult.spostamento.a}</div>
                    </div>
                    <div style={{background:C.bg3,borderRadius:'8px',padding:'8px 12px',textAlign:'center'}}>
                      <div style={{fontSize:'8px',color:C.dim}}>QUANTE</div>
                      <div style={{fontSize:'28px',fontWeight:'bold',color:C.purple,lineHeight:1}}>{invResult.spostamento.quante}</div>
                    </div>
                    <div style={{background:C.bg3,borderRadius:'8px',padding:'8px 12px',textAlign:'center'}}>
                      <div style={{fontSize:'8px',color:C.dim}}>CHIUSURA</div>
                      <div style={{fontSize:'22px',fontWeight:'bold',color:C.green,lineHeight:1}}>{invResult.fineNuova}</div>
                    </div>
                  </div>
                  <div style={{fontSize:'11px',color:C.mid}}>Mattina → <b style={{color:C.text}}>{invResult.spostamento.mattinaNew}</b> · Pomeriggio → <b style={{color:C.text}}>{invResult.spostamento.pomeriggioNew}</b></div>
                </Panel>
              )}
              {(invResult.tipo==='straordinario'||invResult.tipo==='combinato')&&invResult.straordinari&&(
                <Panel style={{border:`2px solid ${C.orange}`}}>
                  <div style={{fontSize:'9px',color:C.orange,letterSpacing:'2px',marginBottom:'10px'}}>⚡ STRAORDINARIO NECESSARIO</div>
                  {invResult.straordinari.map((s,i)=>(
                    <div key={i} style={{display:'flex',gap:'10px',alignItems:'center',marginBottom:'8px'}}>
                      <div style={{background:C.bg3,borderRadius:'8px',padding:'6px 10px'}}>
                        <div style={{fontSize:'8px',color:C.dim}}>{s.nome}</div>
                        <div style={{fontSize:'13px',color:C.orange,fontWeight:'bold'}}>{s.inizio}→{s.fine}</div>
                      </div>
                      <div style={{fontSize:'28px',fontWeight:'bold',color:C.orange}}>{s.persone}</div>
                      <div style={{fontSize:'10px',color:C.dim}}>pers.</div>
                    </div>
                  ))}
                  <div style={{fontSize:'11px',color:C.mid,marginTop:'4px'}}>Chiusura: <b style={{color:C.green,fontSize:'15px'}}>{invResult.fineNuova}</b> · Attuale: {invResult.fineAttuale}</div>
                </Panel>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── STORICO ──
function PageStorico(){
  const[storico,setStorico]=useState(()=>lsg(LS.storico,[]));
  const[sel,setSel]=useState(null);
  const del=(id)=>{const n=storico.filter(s=>s.id!==id);setStorico(n);lss(LS.storico,n);setSel(null)};
  if(sel){
    const e=storico.find(s=>s.id===sel);
    if(!e)return null;
    return(
      <div style={{height:'100%',overflowY:'auto',paddingBottom:'80px',fontFamily:C.F}}>
        <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:'12px 14px',display:'flex',alignItems:'center',gap:'12px',position:'sticky',top:0,zIndex:10}}>
          <button onClick={()=>setSel(null)} style={{background:'transparent',border:'none',color:C.accent,cursor:'pointer',fontFamily:C.F,fontSize:'12px'}}>← INDIETRO</button>
          <div style={{fontSize:'12px',fontWeight:'bold',letterSpacing:'2px',color:C.accent}}>{e.data}</div>
        </div>
        <div style={{padding:'12px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}}>
            <Panel style={{textAlign:'center'}}><SectionLabel>COLLI</SectionLabel><div style={{fontSize:'28px',fontWeight:'bold',color:C.accent}}>{e.colli.toLocaleString('it-IT')}</div></Panel>
            <Panel style={{border:`1px solid ${e.ok?C.green:C.red}`,textAlign:'center'}}><SectionLabel>CHIUSURA</SectionLabel><div style={{fontSize:'28px',fontWeight:'bold',color:e.ok?C.green:C.red}}>{e.chiusura||'—'}</div></Panel>
          </div>
          {e.anticipo>0&&<Panel style={{border:`1px solid ${C.green}`,textAlign:'center',marginBottom:'10px'}}><div style={{fontSize:'9px',color:C.green,marginBottom:'4px'}}>⚡ ANTICIPO</div><div style={{fontSize:'22px',fontWeight:'bold',color:C.green2}}>+{e.anticipo.toLocaleString('it-IT')}</div></Panel>}
          <SectionLabel>TURNI</SectionLabel>
          {e.turni.map((t,i)=>(
            <Panel key={i} style={{marginBottom:'6px',display:'flex',justifyContent:'space-between'}}>
              <div style={{fontSize:'10px',color:C.text}}>{t.nome}</div>
              <div style={{fontSize:'10px',color:C.green}}>{t.persone} pers {t.assenti>0&&<span style={{color:C.red}}>({t.assenti} ass.)</span>}</div>
            </Panel>
          ))}
          <Btn onClick={()=>del(e.id)} color={C.red} full style={{marginTop:'14px'}}>🗑 ELIMINA</Btn>
        </div>
      </div>
    );
  }
  return(
    <div style={{height:'100%',overflowY:'auto',paddingBottom:'80px',fontFamily:C.F}}>
      <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:'12px 14px',position:'sticky',top:0,zIndex:10}}>
        <div style={{fontSize:'13px',fontWeight:'bold',letterSpacing:'3px',color:C.accent}}>📋 STORICO</div>
      </div>
      <div style={{padding:'12px'}}>
        {storico.length===0?(
          <div style={{textAlign:'center',color:C.dim,fontSize:'11px',marginTop:'60px',letterSpacing:'2px'}}><div style={{fontSize:'32px',marginBottom:'12px'}}>📭</div>NESSUN DATO<br/><span style={{fontSize:'9px'}}>Salva una giornata dalla pagina TURNI</span></div>
        ):storico.map(e=>(
          <button key={e.id} onClick={()=>setSel(e.id)} style={{width:'100%',background:C.bg2,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'12px 14px',marginBottom:'8px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',fontFamily:C.F}}>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:'12px',fontWeight:'bold',color:C.text,marginBottom:'2px'}}>{e.data}</div>
              <div style={{fontSize:'9px',color:C.dim}}>{e.colli.toLocaleString('it-IT')} colli · {e.rate} c/h</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:'18px',fontWeight:'bold',color:e.ok?C.green:C.red}}>{e.chiusura||'—'}</div>
              {e.anticipo>0&&<div style={{fontSize:'9px',color:C.green}}>+{e.anticipo.toLocaleString('it-IT')}</div>}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── SQUADRA ──
function PageSquadra(){
  const[squadra,setSquadra]=useState(()=>lsg(LS.squadra,[]));
  const[nome,setNome]=useState('');
  const[turnoSel,setTurnoSel]=useState('Mattina 06:00');
  const upd=(n)=>{setSquadra(n);lss(LS.squadra,n)};
  const aggiungi=()=>{if(!nome.trim())return;upd([...squadra,{id:Date.now(),nome:nome.trim(),turno:turnoSel,presente:true}]);setNome('')};
  const toggle=(id)=>upd(squadra.map(p=>p.id===id?{...p,presente:!p.presente}:p));
  const rimuovi=(id)=>upd(squadra.filter(p=>p.id!==id));
  const presenti=squadra.filter(p=>p.presente).length;
  const assenti=squadra.filter(p=>!p.presente).length;
  const turniNomi=['Mattina 06:00','Giornata 08:00','Giornata 10:00','Pomeriggio 13:00'];
  return(
    <div style={{height:'100%',overflowY:'auto',paddingBottom:'80px',fontFamily:C.F}}>
      <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:'12px 14px',position:'sticky',top:0,zIndex:10}}>
        <div style={{fontSize:'13px',fontWeight:'bold',letterSpacing:'3px',color:C.accent}}>👥 SQUADRA</div>
      </div>
      <div style={{padding:'12px'}}>
        {squadra.length>0&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'12px'}}>
            {[[squadra.length,'TOTALE',C.text],[presenti,'PRESENTI',C.green],[assenti,'ASSENTI',C.red]].map(([v,l,c])=>(
              <Panel key={l} style={{textAlign:'center',border:`1px solid ${c==='#e8e8e0'?C.border:c}`}}><div style={{fontSize:'22px',fontWeight:'bold',color:c}}>{v}</div><div style={{fontSize:'8px',color:C.dim,letterSpacing:'1px'}}>{l}</div></Panel>
            ))}
          </div>
        )}
        <Panel style={{marginBottom:'12px'}}>
          <SectionLabel>+ AGGIUNGI</SectionLabel>
          <input value={nome} onChange={e=>setNome(e.target.value)} onKeyDown={e=>e.key==='Enter'&&aggiungi()} placeholder="Nome..."
            style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'8px',color:C.text,fontFamily:C.F,fontSize:'14px',padding:'10px 12px',outline:'none',marginBottom:'8px'}}/>
          <select value={turnoSel} onChange={e=>setTurnoSel(e.target.value)}
            style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'8px',color:C.text,fontFamily:C.F,fontSize:'12px',padding:'10px',outline:'none',marginBottom:'8px'}}>
            {turniNomi.map(t=><option key={t}>{t}</option>)}
          </select>
          <Btn onClick={aggiungi} color={C.accent} full>+ AGGIUNGI</Btn>
        </Panel>
        {turniNomi.map(tn=>{
          const gruppo=squadra.filter(p=>p.turno===tn);
          if(!gruppo.length)return null;
          return(
            <div key={tn} style={{marginBottom:'12px'}}>
              <div style={{fontSize:'9px',fontWeight:'bold',color:turnoColore(tn),letterSpacing:'2px',marginBottom:'6px',paddingLeft:'2px'}}>{tn}</div>
              {gruppo.map(p=>(
                <div key={p.id} style={{background:C.bg2,border:`1px solid ${p.presente?C.border:C.red}`,borderRadius:'10px',padding:'10px 12px',marginBottom:'6px',display:'flex',alignItems:'center',gap:'10px',opacity:p.presente?1:0.6}}>
                  <button onClick={()=>toggle(p.id)} style={{width:'28px',height:'28px',borderRadius:'50%',border:`2px solid ${p.presente?C.green:C.red}`,background:p.presente?'rgba(16,185,129,0.2)':'rgba(239,68,68,0.2)',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    {p.presente?'✓':'✗'}
                  </button>
                  <div style={{flex:1,fontSize:'13px',color:p.presente?C.text:C.mid,textDecoration:p.presente?'none':'line-through'}}>{p.nome}</div>
                  <button onClick={()=>rimuovi(p.id)} style={{background:'transparent',border:'none',color:C.dim,cursor:'pointer',fontSize:'18px',padding:'2px'}}>×</button>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SETTINGS ──
function PageSettings({onLogout}){
  const[oldP,setOldP]=useState('');
  const[newP,setNewP]=useState('');
  const[conf,setConf]=useState('');
  const[msg,setMsg]=useState(null);
  const[fbUrl,setFbUrl]=useState(()=>lsg(LS.firebase,{})?.url||'');
  const[syncing,setSyncing]=useState(false);
  const[syncMsg,setSyncMsg]=useState(null);

  const cambiaPwd=()=>{
    const cur=lsg(LS.pwd,DEFAULT_PWD);
    if(oldP!==cur){setMsg({ok:false,t:'Password attuale errata'});return}
    if(newP.length<4){setMsg({ok:false,t:'Minimo 4 caratteri'});return}
    if(newP!==conf){setMsg({ok:false,t:'Le password non coincidono'});return}
    lss(LS.pwd,newP);setMsg({ok:true,t:'Password cambiata!'});setOldP('');setNewP('');setConf('');
    setTimeout(()=>setMsg(null),2500);
  };

  const salvaFb=()=>{lss(LS.firebase,{url:fbUrl});setSyncMsg({ok:true,t:'Configurazione salvata!'});setTimeout(()=>setSyncMsg(null),2000)};

  const syncNow=async(dir)=>{
    const fbConfig=lsg(LS.firebase,{});
    if(!fbConfig.url){setSyncMsg({ok:false,t:'Configura prima il URL Firebase'});return}
    setSyncing(true);
    if(dir==='up'){
      const data={turni:lsg(LS.turni,[]),strao:lsg(LS.strao,[]),straPers:lsg(LS.straPers,[]),colli:lsg(LS.colli,''),rate:lsg(LS.rate,90),storico:lsg(LS.storico,[]),squadra:lsg(LS.squadra,[])};
      const res=await fbSync(fbConfig,data);
      setSyncMsg(res.ok?{ok:true,t:'✅ Dati caricati online!'}:{ok:false,t:'Errore: '+res.err});
    }else{
      const res=await fbLoad(fbConfig);
      if(res.ok&&res.data){
        const d=res.data;
        if(d.turni)lss(LS.turni,d.turni);
        if(d.straPers)lss(LS.straPers,d.straPers);
        if(d.colli!==undefined)lss(LS.colli,d.colli);
        if(d.rate)lss(LS.rate,d.rate);
        if(d.storico)lss(LS.storico,d.storico);
        if(d.squadra)lss(LS.squadra,d.squadra);
        setSyncMsg({ok:true,t:'✅ Dati scaricati! Ricarica la pagina.'});
      }else setSyncMsg({ok:false,t:'Errore: '+(res.err||'dati vuoti')});
    }
    setSyncing(false);setTimeout(()=>setSyncMsg(null),4000);
  };

  const resetTutto=()=>{if(!window.confirm('Cancellare tutti i dati?'))return;[LS.turni,LS.strao,LS.straPers,LS.colli,LS.rate,LS.storico,LS.squadra].forEach(k=>{try{localStorage.removeItem(k)}catch{}});window.location.reload()};

  return(
    <div style={{height:'100%',overflowY:'auto',paddingBottom:'80px',fontFamily:C.F}}>
      <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:'12px 14px',position:'sticky',top:0,zIndex:10}}>
        <div style={{fontSize:'13px',fontWeight:'bold',letterSpacing:'3px',color:C.accent}}>⚙️ IMPOSTAZIONI</div>
      </div>
      <div style={{padding:'12px'}}>

        {/* SYNC ONLINE */}
        <Panel style={{marginBottom:'12px',border:`1px solid ${C.blue}`}}>
          <SectionLabel color={C.blue}>☁️ SINCRONIZZAZIONE ONLINE</SectionLabel>
          <div style={{fontSize:'9px',color:C.dim,marginBottom:'8px',lineHeight:1.6}}>
            Crea un account su <b style={{color:C.blue}}>firebase.google.com</b> →<br/>
            Crea progetto → Realtime Database →<br/>
            Copia l'URL del database (finisce con .firebaseio.com)
          </div>
          <div style={{fontSize:'8px',color:C.dim,marginBottom:'4px',letterSpacing:'1px'}}>URL DATABASE FIREBASE</div>
          <input value={fbUrl} onChange={e=>setFbUrl(e.target.value)} placeholder="https://progetto-default-rtdb.firebaseio.com"
            style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'8px',color:C.text,fontFamily:C.F,fontSize:'10px',padding:'10px',outline:'none',marginBottom:'8px'}}/>
          <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
            <Btn onClick={salvaFb} color={C.blue} small>💾 SALVA URL</Btn>
            <Btn onClick={()=>syncNow('up')} color={C.green} small>{syncing?<span className="spin">⟳</span>:'⬆️ CARICA'}</Btn>
            <Btn onClick={()=>syncNow('down')} color={C.orange} small>{syncing?<span className="spin">⟳</span>:'⬇️ SCARICA'}</Btn>
          </div>
          {syncMsg&&<div style={{marginTop:'8px',fontSize:'10px',color:syncMsg.ok?C.green:C.red,letterSpacing:'1px'}}>{syncMsg.t}</div>}
        </Panel>

        {/* PASSWORD */}
        <Panel style={{marginBottom:'12px'}}>
          <SectionLabel>🔐 CAMBIA PASSWORD</SectionLabel>
          {[['Password attuale',oldP,setOldP],['Nuova password',newP,setNewP],['Conferma',conf,setConf]].map(([l,v,s])=>(
            <div key={l} style={{marginBottom:'8px'}}>
              <div style={{fontSize:'8px',color:C.dim,marginBottom:'3px',letterSpacing:'1px'}}>{l}</div>
              <input type="password" value={v} onChange={e=>s(e.target.value)}
                style={{width:'100%',background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:'8px',color:C.text,fontFamily:C.F,fontSize:'14px',padding:'10px',outline:'none'}}/>
            </div>
          ))}
          {msg&&<div style={{fontSize:'10px',color:msg.ok?C.green:C.red,textAlign:'center',marginBottom:'8px'}}>{msg.t}</div>}
          <Btn onClick={cambiaPwd} color={C.purple} full>SALVA PASSWORD</Btn>
        </Panel>

        {/* INFO */}
        <Panel style={{marginBottom:'12px'}}>
          <SectionLabel>ℹ️ INFO</SectionLabel>
          <div style={{fontSize:'10px',color:C.mid,lineHeight:1.7}}>Turni Magazzino v2.0<br/>Dati salvati sul dispositivo.<br/>Usa SYNC per condividerli tra dispositivi.</div>
        </Panel>

        <Btn onClick={onLogout} color={C.accent} full style={{marginBottom:'8px'}}>🚪 ESCI</Btn>
        <Btn onClick={resetTutto} color={C.red} full>🗑 CANCELLA TUTTI I DATI</Btn>
      </div>
    </div>
  );
}

// ── APP ──
function App(){
  const[page,setPage]=useState('turni');
  const logout=()=>{try{sessionStorage.removeItem(LS.auth)}catch{}window.location.reload()};
  const pages={turni:<PageTurni/>,storico:<PageStorico/>,squadra:<PageSquadra/>,settings:<PageSettings onLogout={logout}/>};
  return(
    <div style={{height:'100vh',height:'100dvh',display:'flex',flexDirection:'column',background:C.bg,overflow:'hidden'}}>
      <div key={page} style={{flex:1,overflow:'hidden',animation:'fadeUp 0.25s ease'}}>{pages[page]}</div>
      <Nav page={page} setPage={setPage}/>
    </div>
  );
}
function Root(){
  const[ok,setOk]=useState(()=>{try{return!!sessionStorage.getItem(LS.auth)}catch{return false}});
  const login=()=>{try{sessionStorage.setItem(LS.auth,'1')}catch{}setOk(true)};
  return ok?<App/>:<Login onLogin={login}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
