<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Turni Magazzino</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0a0c12; overflow: hidden; }
    #root { height: 100%; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input, button { -webkit-appearance: none; border-radius: 0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .page-enter { animation: fadeUp 0.25s ease; }
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef, useMemo } = React;

// ── Constants ──
const LS = {
  auth: 'tm_auth',
  pwd: 'tm_pwd',
  turni: 'tm_turni',
  squadra: 'tm_squadra',
  storico: 'tm_storico',
  settings: 'tm_settings',
};

const DEFAULT_PWD = 'Vaniusa1987.';

const DEFAULT_TURNI = [
  { id:1, nome:'Mattina 06:00',    inizio:'06:00', fine:'12:20', pausaInizio:'10:00', pausaFine:'10:20', persone:0, assenti:0 },
  { id:5, nome:'Giornata 08:00',   inizio:'08:00', fine:'14:20', pausaInizio:'12:00', pausaFine:'12:20', persone:0, assenti:0 },
  { id:2, nome:'Giornata 10:00',   inizio:'10:00', fine:'16:20', pausaInizio:'14:00', pausaFine:'14:20', persone:0, assenti:0 },
  { id:3, nome:'Pomeriggio 13:00', inizio:'13:00', fine:'19:20', pausaInizio:'17:00', pausaFine:'17:20', persone:0, assenti:0 },
];

const DEFAULT_STRAO = [
  { id:1, nome:'Strao Mattina',    inizio:'12:20', fine:'13:20', persone:0 },
  { id:3, nome:'Strao Pomeriggio', inizio:'12:00', fine:'13:00', persone:0 },
];

const T = {
  bg: '#0a0c12', bg2: '#12141e', bg3: '#1a1d2a',
  border: '#1e2235', border2: '#2a2d3f',
  accent: '#f59e0b', accent2: '#fbbf24',
  purple: '#a78bfa', purple2: '#c4b5fd',
  green: '#10b981', green2: '#34d399',
  red: '#ef4444', red2: '#fca5a5',
  orange: '#f97316',
  text: '#e8e8e0', textDim: '#555', textMid: '#888',
  font: "'Courier New','Consolas',monospace",
};

// ── Utils ──
function tMin(t) {
  if (!t || !t.includes(':')) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function minToT(m) {
  return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(Math.round(m)%60).padStart(2,'0');
}
function ls(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function oggi() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// ── Calcolo ──
function calcFine(allT, colliN, r) {
  const evSet = new Set();
  allT.forEach(t => {
    evSet.add(tMin(t.inizio)); evSet.add(tMin(t.fine));
    if (t.pausaInizio && t.pausaFine) { evSet.add(tMin(t.pausaInizio)); evSet.add(tMin(t.pausaFine)); }
  });
  const ev = Array.from(evSet).sort((a,b) => a-b);
  let cum = 0;
  const rows = [];
  for (let i = 0; i < ev.length-1; i++) {
    const frm = ev[i], to = ev[i+1];
    let pers = 0;
    allT.forEach(t => {
      const tIn = tMin(t.inizio), tOut = tMin(t.fine);
      const pIn = t.pausaInizio ? tMin(t.pausaInizio) : null;
      const pOut = t.pausaFine ? tMin(t.pausaFine) : null;
      if (frm >= tIn && to <= tOut && !(pIn !== null && frm >= pIn && to <= pOut))
        pers += Number(t.persone);
    });
    if (pers === 0) { rows.push({ frm, to, pers:0, prod:0, cum }); continue; }
    const prod = pers * r * (to - frm) / 60;
    if (cum + prod >= colliN) {
      const fineMin = frm + (colliN - cum) / (pers * r) * 60;
      rows.push({ frm, to, pers, prod: colliN-cum, cum: colliN, highlight: true, fine: minToT(fineMin) });
      return { ok: true, fineEsatta: minToT(fineMin), rows, cumulo: colliN };
    }
    cum += prod;
    rows.push({ frm, to, pers, prod, cum });
  }
  return { ok: false, fineEsatta: null, rows, cumulo: Math.round(cum) };
}

function calcAnticipo(allT, fineStr, r) {
  if (!fineStr) return 0;
  const fineMin = tMin(fineStr);
  let tot = 0;
  const evSet = new Set();
  allT.forEach(t => {
    evSet.add(tMin(t.inizio)); evSet.add(tMin(t.fine));
    if (t.pausaInizio && t.pausaFine) { evSet.add(tMin(t.pausaInizio)); evSet.add(tMin(t.pausaFine)); }
  });
  const ev = Array.from(evSet).sort((a,b) => a-b);
  for (let i = 0; i < ev.length-1; i++) {
    const frm = ev[i], to = ev[i+1];
    if (to <= fineMin) continue;
    const start = Math.max(frm, fineMin);
    let pers = 0;
    allT.forEach(t => {
      const tIn = tMin(t.inizio), tOut = tMin(t.fine);
      const pIn = t.pausaInizio ? tMin(t.pausaInizio) : null;
      const pOut = t.pausaFine ? tMin(t.pausaFine) : null;
      if (start >= tIn && to <= tOut && !(pIn !== null && start >= pIn && to <= pOut))
        pers += Number(t.persone);
    });
    if (pers > 0) tot += pers * r * (to - start) / 60;
  }
  return Math.round(tot);
}

// ── LOGIN ──
function Login({ onLogin }) {
  const [code, setCode] = useState('');
  const [err, setErr] = useState(false);
  const [shake, setShake] = useState(false);
  const inp = useRef(null);

  useEffect(() => { setTimeout(() => inp.current?.focus(), 300); }, []);

  const tryLogin = () => {
    const pwd = ls(LS.pwd, DEFAULT_PWD);
    if (code === pwd) { lsSet(LS.auth, Date.now()); onLogin(); }
    else {
      setErr(true); setShake(true); setCode('');
      setTimeout(() => setShake(false), 500);
      setTimeout(() => setErr(false), 2000);
    }
  };

  return (
    <div style={{ minHeight:'100vh', minHeight:'100dvh', background:T.bg, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:T.font, padding:'20px' }}>
      <div style={{ width:'100%', maxWidth:'320px', animation: shake ? 'shake 0.4s ease' : 'fadeIn 0.4s ease' }}>
        <div style={{ textAlign:'center', marginBottom:'40px' }}>
          <div style={{ fontSize:'52px', marginBottom:'12px' }}>📦</div>
          <div style={{ fontSize:'16px', fontWeight:'bold', letterSpacing:'4px', color:T.accent }}>TURNI MAGAZZINO</div>
          <div style={{ fontSize:'9px', color:T.textDim, letterSpacing:'3px', marginTop:'4px' }}>ACCESSO RISERVATO</div>
        </div>
        <div style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:'16px', padding:'28px 24px' }}>
          <div style={{ fontSize:'9px', letterSpacing:'2px', color:T.textDim, marginBottom:'8px' }}>CODICE DI ACCESSO</div>
          <input ref={inp} type="password" value={code}
            onChange={e => setCode(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && tryLogin()}
            placeholder="••••••••"
            style={{ width:'100%', background:T.bg, border:`2px solid ${err ? T.red : T.border2}`, borderRadius:'10px', color:T.text, fontFamily:T.font, fontSize:'20px', padding:'14px 16px', textAlign:'center', letterSpacing:'6px', outline:'none', transition:'border-color 0.2s', marginBottom:'8px' }}
          />
          {err && <div style={{ color:T.red, fontSize:'10px', letterSpacing:'2px', textAlign:'center', marginBottom:'8px' }}>✗ CODICE ERRATO</div>}
          <button onClick={tryLogin} style={{ width:'100%', padding:'16px', background:`linear-gradient(135deg,${T.accent},${T.accent2})`, border:'none', borderRadius:'10px', color:'#000', fontFamily:T.font, fontSize:'12px', fontWeight:'bold', letterSpacing:'3px', cursor:'pointer', marginTop:'8px' }}>
            ENTRA →
          </button>
        </div>
      </div>
    </div>
  );
}

// ── BOTTOM NAV ──
function BottomNav({ page, setPage }) {
  const tabs = [
    { id:'turni', icon:'📊', label:'TURNI' },
    { id:'storico', icon:'📋', label:'STORICO' },
    { id:'squadra', icon:'👥', label:'SQUADRA' },
    { id:'settings', icon:'⚙️', label:'CONFIG' },
  ];
  return (
    <div style={{ position:'fixed', bottom:0, left:0, right:0, background:T.bg2, borderTop:`1px solid ${T.border}`, display:'flex', zIndex:100, paddingBottom:'env(safe-area-inset-bottom)' }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => setPage(t.id)} style={{ flex:1, background:'transparent', border:'none', padding:'10px 4px 8px', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:'3px' }}>
          <div style={{ fontSize:'20px', lineHeight:1 }}>{t.icon}</div>
          <div style={{ fontSize:'8px', letterSpacing:'1px', fontFamily:T.font, color: page===t.id ? T.accent : T.textDim, fontWeight: page===t.id ? 'bold' : 'normal', transition:'color 0.2s' }}>{t.label}</div>
          {page===t.id && <div style={{ width:'20px', height:'2px', background:T.accent, borderRadius:'1px' }}/>}
        </button>
      ))}
    </div>
  );
}

// ── TURNI PAGE ──
function PageTurni() {
  const [colli, setColli] = useState(() => ls('tm_colli', ''));
  const [rate, setRate] = useState(() => ls('tm_rate', 90));
  const [turni, setTurni] = useState(() => ls(LS.turni, DEFAULT_TURNI));
  const [strao, setStrao] = useState(() => ls('tm_strao', DEFAULT_STRAO));
  const [risultato, setRisultato] = useState(null);
  const [saved, setSaved] = useState(false);

  // Auto save state
  useEffect(() => { lsSet('tm_colli', colli); }, [colli]);
  useEffect(() => { lsSet('tm_rate', rate); }, [rate]);
  useEffect(() => { lsSet(LS.turni, turni); }, [turni]);
  useEffect(() => { lsSet('tm_strao', strao); }, [strao]);

  // Auto calc
  useEffect(() => {
    const colliN = Number(colli);
    if (!colliN || colliN <= 0) { setRisultato(null); return; }
    const r = Number(rate);
    const allT = [
      ...turni.map(t => ({ ...t, persone: Math.max(0, Number(t.persone) - Number(t.assenti||0)) })),
      ...strao.filter(s => s.inizio && s.fine && Number(s.persone) > 0),
    ];
    const res = calcFine(allT, colliN, r);
    if (res.ok) res.anticipo = calcAnticipo(allT, res.fineEsatta, r);
    setRisultato(res);
  }, [colli, rate, turni, strao]);

  const setP = (id, val) => setTurni(prev => prev.map(t => t.id===id ? { ...t, persone: Math.max(0, Number(val)) } : t));
  const setA = (id, val) => setTurni(prev => prev.map(t => t.id===id ? { ...t, assenti: Math.max(0, Number(val)) } : t));
  const setStraoP = (id, val) => setStrao(prev => prev.map(s => s.id===id ? { ...s, persone: Math.max(0, Number(val)) } : s));

  const turnoColor = (nome) => {
    if (/mattina/i.test(nome)) return T.accent;
    if (/pomeriggio/i.test(nome)) return T.purple;
    return '#38bdf8';
  };

  const salvaStorico = () => {
    const storico = ls(LS.storico, []);
    const entry = {
      id: Date.now(),
      data: oggi(),
      colli: Number(colli),
      rate: Number(rate),
      turni: turni.map(t => ({ nome: t.nome, persone: Number(t.persone), assenti: Number(t.assenti||0) })),
      chiusura: risultato?.fineEsatta || null,
      anticipo: risultato?.anticipo || 0,
      ok: risultato?.ok || false,
    };
    lsSet(LS.storico, [entry, ...storico.slice(0, 29)]);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const isOk = risultato && risultato.ok;

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:'80px' }}>
      {/* Header */}
      <div style={{ background:T.bg2, borderBottom:`1px solid ${T.border}`, padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ fontSize:'13px', fontWeight:'bold', letterSpacing:'3px', color:T.accent, fontFamily:T.font }}>📦 TURNI</div>
        <div style={{ display:'flex', gap:'8px' }}>
          {risultato && (
            <button onClick={salvaStorico} style={{ background: saved ? 'rgba(16,185,129,0.15)' : 'rgba(167,139,250,0.1)', border:`1px solid ${saved ? T.green : T.purple}`, borderRadius:'8px', color: saved ? T.green : T.purple, fontFamily:T.font, fontSize:'9px', letterSpacing:'1px', padding:'6px 10px', cursor:'pointer' }}>
              {saved ? '✅ SALVATO' : '💾 SALVA'}
            </button>
          )}
          <button onClick={() => { setTurni(DEFAULT_TURNI); setStrao(DEFAULT_STRAO); setColli(''); }} style={{ background:'rgba(239,68,68,0.1)', border:`1px solid ${T.red}`, borderRadius:'8px', color:T.red, fontFamily:T.font, fontSize:'9px', letterSpacing:'1px', padding:'6px 10px', cursor:'pointer' }}>
            ↺ RESET
          </button>
        </div>
      </div>

      <div style={{ padding:'14px 14px 0', fontFamily:T.font }}>

        {/* Colli + Rate */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'14px' }}>
          <div style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:'12px', padding:'14px' }}>
            <div style={{ fontSize:'9px', letterSpacing:'2px', color:T.accent, marginBottom:'6px' }}>COLLI</div>
            <input type="number" value={colli} onChange={e => setColli(e.target.value)} placeholder="0"
              style={{ width:'100%', background:'transparent', border:'none', color:T.accent, fontFamily:T.font, fontSize:'28px', fontWeight:'bold', outline:'none', padding:0 }} />
          </div>
          <div style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:'12px', padding:'14px' }}>
            <div style={{ fontSize:'9px', letterSpacing:'2px', color:T.purple, marginBottom:'6px' }}>COLLI/ORA</div>
            <div style={{ display:'flex', gap:'6px' }}>
              {[90, 100].map(v => (
                <button key={v} onClick={() => setRate(v)} style={{ flex:1, padding:'8px 4px', borderRadius:'8px', border:`2px solid ${rate==v ? T.purple : T.border2}`, background: rate==v ? 'rgba(167,139,250,0.15)' : 'transparent', color: rate==v ? T.purple : T.textDim, fontFamily:T.font, fontSize:'14px', fontWeight:'bold', cursor:'pointer' }}>{v}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Turni */}
        {turni.map(t => {
          const eff = Math.max(0, Number(t.persone) - Number(t.assenti||0));
          const c = turnoColor(t.nome);
          return (
            <div key={t.id} style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:'12px', padding:'12px 14px', marginBottom:'8px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px' }}>
                <div>
                  <div style={{ fontSize:'10px', fontWeight:'bold', color:c, letterSpacing:'1px' }}>{t.nome}</div>
                  <div style={{ fontSize:'9px', color:T.textDim, marginTop:'2px' }}>{t.inizio} → {t.fine}</div>
                </div>
                <div style={{ fontSize:'9px', color: eff>0 ? T.green : T.textDim, background: eff>0 ? 'rgba(16,185,129,0.1)' : 'transparent', border: eff>0 ? `1px solid ${T.green}` : 'none', borderRadius:'6px', padding:'3px 8px' }}>
                  {eff > 0 ? `${eff} eff.` : '—'}
                </div>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px' }}>
                <div>
                  <div style={{ fontSize:'8px', color:T.textDim, letterSpacing:'1px', marginBottom:'4px' }}>👥 PERSONE</div>
                  <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                    <button onClick={() => setP(t.id, Number(t.persone)-1)} style={{ width:'32px', height:'32px', borderRadius:'8px', border:`1px solid ${T.border2}`, background:T.bg3, color:c, fontFamily:T.font, fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
                    <input type="number" value={t.persone} onChange={e => setP(t.id, e.target.value)}
                      style={{ width:'44px', textAlign:'center', background:T.bg3, border:`1px solid ${T.border2}`, borderRadius:'8px', color:'#4ade80', fontFamily:T.font, fontSize:'16px', fontWeight:'bold', padding:'5px 2px', outline:'none' }} />
                    <button onClick={() => setP(t.id, Number(t.persone)+1)} style={{ width:'32px', height:'32px', borderRadius:'8px', border:`1px solid ${T.border2}`, background:T.bg3, color:c, fontFamily:T.font, fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
                  </div>
                </div>
                <div>
                  <div style={{ fontSize:'8px', color:T.textDim, letterSpacing:'1px', marginBottom:'4px' }}>🚫 ASSENTI</div>
                  <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                    <button onClick={() => setA(t.id, Number(t.assenti||0)-1)} style={{ width:'32px', height:'32px', borderRadius:'8px', border:`1px solid ${T.border2}`, background:T.bg3, color:T.red, fontFamily:T.font, fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
                    <input type="number" value={t.assenti||0} onChange={e => setA(t.id, e.target.value)}
                      style={{ width:'44px', textAlign:'center', background:T.bg3, border:`1px solid ${T.border2}`, borderRadius:'8px', color:T.red, fontFamily:T.font, fontSize:'16px', fontWeight:'bold', padding:'5px 2px', outline:'none' }} />
                    <button onClick={() => setA(t.id, Number(t.assenti||0)+1)} style={{ width:'32px', height:'32px', borderRadius:'8px', border:`1px solid ${T.border2}`, background:T.bg3, color:T.red, fontFamily:T.font, fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
                  </div>
                </div>
              </div>
            </div>
          );
        })}

        {/* Straordinari */}
        <div style={{ fontSize:'9px', letterSpacing:'2px', color:T.orange, marginBottom:'8px', marginTop:'4px' }}>⚡ STRAORDINARI</div>
        {strao.map(s => (
          <div key={s.id} style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:'12px', padding:'12px 14px', marginBottom:'8px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
              <div style={{ fontSize:'10px', fontWeight:'bold', color:T.orange, letterSpacing:'1px' }}>{s.nome}</div>
              <div style={{ fontSize:'9px', color:T.textDim }}>{s.inizio} → {s.fine}</div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
              <button onClick={() => setStraoP(s.id, Number(s.persone)-1)} style={{ width:'32px', height:'32px', borderRadius:'8px', border:`1px solid ${T.border2}`, background:T.bg3, color:T.orange, fontFamily:T.font, fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
              <input type="number" value={s.persone} onChange={e => setStraoP(s.id, e.target.value)}
                style={{ width:'44px', textAlign:'center', background:T.bg3, border:`1px solid ${T.border2}`, borderRadius:'8px', color:'#4ade80', fontFamily:T.font, fontSize:'16px', fontWeight:'bold', padding:'5px 2px', outline:'none' }} />
              <button onClick={() => setStraoP(s.id, Number(s.persone)+1)} style={{ width:'32px', height:'32px', borderRadius:'8px', border:`1px solid ${T.border2}`, background:T.bg3, color:T.orange, fontFamily:T.font, fontSize:'18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
              <div style={{ fontSize:'9px', color:T.textDim, marginLeft:'4px' }}>persone</div>
            </div>
          </div>
        ))}

        {/* Risultato */}
        {risultato && (
          <div style={{ marginTop:'14px', animation:'fadeUp 0.3s ease' }}>
            <div style={{ background: isOk ? 'linear-gradient(135deg,#064e3b,#065f46)' : 'linear-gradient(135deg,#450a0a,#7f1d1d)', border:`2px solid ${isOk ? T.green : T.red}`, borderRadius:'14px', padding:'20px', textAlign:'center', marginBottom:'10px' }}>
              <div style={{ fontSize:'9px', letterSpacing:'3px', color: isOk ? '#6ee7b7' : T.red2, marginBottom:'8px' }}>
                {isOk ? '✅ CHIUSURA PREVISTA' : '🔴 TURNI INSUFFICIENTI'}
              </div>
              {isOk ? (
                <>
                  <div style={{ fontSize:'48px', fontWeight:'bold', color:T.green, lineHeight:1, marginBottom:'8px' }}>{risultato.fineEsatta}</div>
                  {risultato.anticipo > 0 && (

                  )}
                </>
              ) : (
                <>
                  <div style={{ fontSize:'28px', fontWeight:'bold', color:T.red, marginBottom:'4px' }}>
                    {(Number(colli) - risultato.cumulo).toLocaleString('it-IT')}
                  </div>
                  <div style={{ fontSize:'10px', color:T.red2 }}>colli mancanti</div>
                  <div style={{ fontSize:'11px', color:T.textMid, marginTop:'6px' }}>
                    Prodotti: {risultato.cumulo.toLocaleString('it-IT')} / {Number(colli).toLocaleString('it-IT')}
                  </div>
                </>
              )}
            </div>

            {/* Grafico */}
            <Grafico turni={turni} strao={strao} colli={Number(colli)} rate={Number(rate)} risultato={risultato} />
          </div>
        )}
      </div>
    </div>
  );
}

// ── GRAFICO ──
function Grafico({ turni, strao, colli, rate, risultato }) {
  const W = 340, H = 160, PL = 42, PR = 8, PT = 8, PB = 28;
  const w = W - PL - PR, h = H - PT - PB;

  const allT = useMemo(() => [
    ...turni.map(t => ({ ...t, persone: Math.max(0, Number(t.persone) - Number(t.assenti||0)) })),
    ...strao.filter(s => s.inizio && s.fine && Number(s.persone) > 0),
  ], [turni, strao]);

  if (!colli || allT.every(t => !t.persone)) return null;

  const evSet = new Set();
  allT.forEach(t => {
    evSet.add(tMin(t.inizio)); evSet.add(tMin(t.fine));
    if (t.pausaInizio && t.pausaFine) { evSet.add(tMin(t.pausaInizio)); evSet.add(tMin(t.pausaFine)); }
  });
  const ev = Array.from(evSet).sort((a,b) => a-b);
  const minS = ev[0], maxE = ev[ev.length-1];
  const tRange = maxE - minS;

  const points = [{ t: minS, c: 0 }];
  let cum = 0, done = false;
  for (let i = 0; i < ev.length-1; i++) {
    const frm = ev[i], to = ev[i+1];
    let pers = 0;
    allT.forEach(t => {
      const tIn = tMin(t.inizio), tOut = tMin(t.fine);
      const pIn = t.pausaInizio ? tMin(t.pausaInizio) : null;
      const pOut = t.pausaFine ? tMin(t.pausaFine) : null;
      if (frm >= tIn && to <= tOut && !(pIn !== null && frm >= pIn && to <= pOut))
        pers += Number(t.persone);
    });
    if (pers === 0) { points.push({ t: to, c: cum }); continue; }
    const prod = pers * rate * (to - frm) / 60;
    if (!done && cum + prod >= colli) {
      const ft = frm + (colli - cum) / (pers * rate) * 60;
      cum = colli; done = true;
      points.push({ t: ft, c: cum });
    } else if (!done) cum += prod;
    points.push({ t: to, c: done ? colli : cum });
  }

  const maxC = Math.max(colli, cum) * 1.05;
  const tx = t => PL + ((t - minS) / tRange) * w;
  const ty = c => PT + h - (c / maxC) * h;
  const pathD = points.map((p,i) => (i===0?'M':'L') + tx(p.t).toFixed(1) + ',' + ty(p.c).toFixed(1)).join(' ');
  const areaD = pathD + ` L${tx(points[points.length-1].t).toFixed(1)},${PT+h} L${PL},${PT+h} Z`;
  const targetY = ty(colli);
  const startH = Math.ceil(minS/60), endH = Math.floor(maxE/60);
  const hours = [];
  for (let hh = startH; hh <= endH; hh++) hours.push(hh*60);
  const closePoint = points.find(p => p.c >= colli);

  return (
    <div style={{ background:T.bg2, border:`1px solid ${T.border}`, borderRadius:'12px', padding:'12px', marginBottom:'10px' }}>
      <div style={{ fontSize:'9px', letterSpacing:'2px', color:T.purple, marginBottom:'8px' }}>📊 ANDAMENTO</div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:'block' }}>
        {[0.25,0.5,0.75,1].map(f => (
          <g key={f}>
            <line x1={PL} y1={ty(maxC*f)} x2={PL+w} y2={ty(maxC*f)} stroke={T.border} strokeWidth="1"/>
            <text x={PL-4} y={ty(maxC*f)+4} textAnchor="end" fill={T.textDim} fontSize="8">{Math.round(maxC*f/100)*100}</text>
          </g>
        ))}
        <line x1={PL} y1={targetY} x2={PL+w} y2={targetY} stroke={T.accent} strokeWidth="1" strokeDasharray="3,3"/>
        <path d={areaD} fill="rgba(167,139,250,0.1)"/>
        <path d={pathD} fill="none" stroke={T.purple} strokeWidth="2" strokeLinejoin="round"/>
        {hours.map(m => (
          <g key={m}>
            <line x1={tx(m)} y1={PT} x2={tx(m)} y2={PT+h} stroke={T.border} strokeWidth="1"/>
            <text x={tx(m)} y={PT+h+12} textAnchor="middle" fill={T.textDim} fontSize="8">{Math.floor(m/60)}:00</text>
          </g>
        ))}
        {closePoint && (
          <g>
            <circle cx={tx(closePoint.t)} cy={ty(closePoint.c)} r="4" fill={T.green}/>
            <text x={tx(closePoint.t)} y={ty(closePoint.c)-7} textAnchor="middle" fill={T.green} fontSize="8" fontWeight="bold">{risultato.fineEsatta}</text>
          </g>
        )}
        <line x1={PL} y1={PT} x2={PL} y2={PT+h} stroke={T.border2} strokeWidth="1"/>
        <line x1={PL} y1={PT+h} x2={PL+w} y2={PT+h} stroke={T.border2} strokeWidth="1"/>
      </svg>
    </div>
  );
}

function PageSquadra() {

    if (!nome.trim()) return;

    setSquadra(n); lsSet(LS.squadra, n); setNome('');

  const toggle = (id) => {
    const n = squadra.map(p => p.id===id ? { ...p, presente: !p.presente } : p);

    </div>
  );

function App() {
  const [page, setPage] = useState('turni');
  const logout = () => { try { sessionStorage.removeItem(LS.auth); } catch {} window.location.reload(); };

  const pages = { turni: <PageTurni/>, storico: <PageStorico/>, squadra: <PageSquadra/>, settings: <PageSettings onLogout={logout}/> };

  return (
    <div style={{ height:'100vh', height:'100dvh', display:'flex', flexDirection:'column', background:T.bg, fontFamily:T.font, overflow:'hidden' }}>
      <div key={page} className="page-enter" style={{ flex:1, overflow:'hidden' }}>
        {pages[page]}
      </div>
      <BottomNav page={page} setPage={setPage}/>
    </div>
  );
}

function Root() {
  const [ok, setOk] = useState(() => {
    try { return !!sessionStorage.getItem(LS.auth); } catch { return false; }
  });
  const login = () => { try { sessionStorage.setItem(LS.auth, '1'); } catch {} setOk(true); };
  return ok ? <App/> : <Login onLogin={login}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
