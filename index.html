<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Turni Magazzino</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#070910;overflow:hidden;font-family:'Courier New',Consolas,monospace}
    #root{height:100%}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input,button,select{-webkit-appearance:none}
    ::-webkit-scrollbar{width:0}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
    .fadeup{animation:fadeUp 0.3s ease}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useCallback, useEffect, useRef, useMemo } = React;

// ── COLORI ──
var BG = '#0a0c12';
var BG2 = '#12141e';
var BG3 = '#1a1d2a';
var BORDER = '#1e2235';
var BORDER2 = '#2a2d3f';
var YELLOW = '#f59e0b';
var YELLOW2 = '#fbbf24';
var PURPLE = '#a78bfa';
var GREEN = '#10b981';
var GREEN2 = '#34d399';
var RED = '#ef4444';
var ORANGE = '#f97316';
var BLUE = '#38bdf8';
var TEXT = '#e8e8e0';
var DIM = '#555';
var MID = '#888';
var FONT = "'Courier New',Consolas,monospace";

// ── STORAGE ──
var K = { pwd:'tm_pwd', auth:'tm_auth', turni:'tm_turni', stra:'tm_stra', colli:'tm_colli', rate:'tm_rate', storico:'tm_storico', fb:'tm_fb' };
// SHA-256 hash di "Naturasi2026" — nel codice non si vede mai la password vera
var PWD_DEFAULT_HASH = '2716882c405a97cb51cb0224575d250dfe399301e5c0c13688e7893d2d9b295c';
async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

var DEF_TURNI = [
  { id:1, nome:'Mattina 06:00',    inizio:'06:00', fine:'12:20', pIn:'10:00', pOut:'10:20', persone:0, assenti:0 },
  { id:5, nome:'Giornata 08:00',   inizio:'08:00', fine:'14:20', pIn:'12:00', pOut:'12:20', persone:0, assenti:0 },
  { id:2, nome:'Giornata 10:00',   inizio:'10:00', fine:'16:20', pIn:'14:00', pOut:'14:20', persone:0, assenti:0 },
  { id:3, nome:'Pomeriggio 13:00', inizio:'13:00', fine:'19:20', pIn:'17:00', pOut:'17:20', persone:0, assenti:0 },
];
var DEF_STRA = [
  { id:1, righe:[ { inizio:'12:20', fine:'13:20', persone:0 } ] },
  { id:5, righe:[] },
  { id:2, righe:[] },
  { id:3, righe:[ { inizio:'12:00', fine:'13:00', persone:0 } ] },
];

function lsg(k, d) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
function lss(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function tMin(t) { if (!t || t.indexOf(':') < 0) return 0; var p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); }
function mToT(m) { var h = Math.floor(m/60); var mn = Math.round(m % 60); if (mn === 60) { h++; mn = 0; } return (h < 10 ? '0'+h : ''+h) + ':' + (mn < 10 ? '0'+mn : ''+mn); }
function oggi() { var d = new Date(); return (d.getDate()<10?'0':'')+d.getDate()+'/'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'/'+d.getFullYear(); }
function tColor(nome) { if (/mattina/i.test(nome)) return YELLOW; if (/pomeriggio/i.test(nome)) return PURPLE; return BLUE; }
function newId() { return Date.now() + Math.floor(Math.random()*999); }

// ── CALCOLO ──
function buildAllT(turni, stra, rate) {
  var all = turni.map(function(t) {
    return { id: t.id, nome: t.nome, inizio: t.inizio, fine: t.fine, pIn: t.pIn, pOut: t.pOut,
             persone: Math.max(0, (t.persone||0) - (t.assenti||0)), rate: Number(rate) };
  });
  stra.forEach(function(sp) {
    var t = turni.find(function(x) { return x.id === sp.id; });
    if (!t) return;
    (sp.righe || []).forEach(function(r) {
      if (r.inizio && r.fine && Number(r.persone) > 0) {
        all.push({ id: t.id, nome: t.nome + ' (strao)', inizio: r.inizio, fine: r.fine,
                   pIn: '', pOut: '', persone: Number(r.persone), rate: Number(rate), isStrao: true });
      }
    });
  });
  return all;
}

function calcRows(colliN, allT, rate) {
  var evS = {};
  allT.forEach(function(t) {
    evS[tMin(t.inizio)] = true; evS[tMin(t.fine)] = true;
    if (t.pIn && t.pOut) { evS[tMin(t.pIn)] = true; evS[tMin(t.pOut)] = true; }
  });
  var ev = Object.keys(evS).map(Number).sort(function(a,b){return a-b;});
  var cum = 0; var rows = []; var finished = false;

  for (var i = 0; i < ev.length - 1; i++) {
    var frm = ev[i]; var to = ev[i+1];
    var totalR = 0; var pers = 0; var nome = ''; var isStrao = false;
    allT.forEach(function(t) {
      var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
      var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
      if (frm >= tIn && to <= tOut && !(pIn !== null && frm >= pIn && to <= pOut)) {
        totalR += t.persone * t.rate; pers += t.persone;
        nome = t.nome; if (t.isStrao) isStrao = true;
      }
    });
    var dur = to - frm;
    var prod = totalR * dur / 60;
    var colliH = Math.round(totalR);

    if (pers === 0) {
      rows.push({ frm: mToT(frm), to: mToT(to), pers: 0, colliH: 0, dur: dur, prod: 0, cum: Math.round(cum), rim: Math.round(Math.max(0, colliN - cum)), pausa: true });
      continue;
    }

    if (finished) {
      rows.push({ frm: mToT(frm), to: mToT(to), pers: pers, colliH: colliH, dur: dur, prod: Math.round(prod), cum: colliN, rim: 0, anticipo: true, nome: nome, isStrao: isStrao });
      continue;
    }

    if (cum + prod >= colliN) {
      var fineMin = frm + (colliN - cum) / totalR * 60;
      var prodFatta = colliN - cum; cum = colliN; finished = true;
      rows.push({ frm: mToT(frm), to: mToT(to), fineEx: mToT(fineMin), pers: pers, colliH: colliH, dur: dur, prod: Math.round(prodFatta), cum: colliN, rim: 0, highlight: true, nome: nome, isStrao: isStrao });
    } else {
      cum += prod;
      rows.push({ frm: mToT(frm), to: mToT(to), pers: pers, colliH: colliH, dur: dur, prod: Math.round(prod), cum: Math.round(cum), rim: Math.round(Math.max(0, colliN - cum)), nome: nome, isStrao: isStrao });
    }
  }
  return { ok: finished, rows: rows, cum: Math.round(cum), fineEx: finished ? rows.find(function(r){return r.highlight;}).fineEx : null };
}

function calcAnticipo(allT, fineStr, rate) {
  if (!fineStr) return 0;
  var fineM = tMin(fineStr); var tot = 0;
  var evS = {}; evS[fineM] = true;
  allT.forEach(function(t) {
    evS[tMin(t.inizio)] = true; evS[tMin(t.fine)] = true;
    if (t.pIn && t.pOut) { evS[tMin(t.pIn)] = true; evS[tMin(t.pOut)] = true; }
  });
  var ev = Object.keys(evS).map(Number).filter(function(e){return e >= fineM;}).sort(function(a,b){return a-b;});
  for (var i = 0; i < ev.length - 1; i++) {
    var frm = ev[i]; var to = ev[i+1]; var tR = 0;
    allT.forEach(function(t) {
      var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
      var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
      if (frm >= tIn && to <= tOut && !(pIn !== null && frm >= pIn && to <= pOut))
        tR += t.persone * t.rate;
    });
    tot += tR * (to - frm) / 60;
  }
  return Math.round(tot);
}

// ── UI BASE ──
function Panel(props) {
  var s = Object.assign({ background: BG2, border: '1px solid ' + BORDER, borderRadius: '12px', padding: '12px 14px' }, props.style || {});
  return React.createElement('div', { style: s }, props.children);
}
function Lbl(props) {
  return React.createElement('div', { style: { fontSize: '9px', letterSpacing: '2px', color: props.color || DIM, marginBottom: '5px' } }, props.children);
}
function NumInput(props) {
  var color = props.color || GREEN;
  var displayVal = (props.value === 0 || props.value === '0') ? '' : props.value;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
      <button onClick={function(){props.onChange(Math.max(0, Number(props.value)-1));}} style={{ width:'28px', height:'28px', borderRadius:'7px', border:'1px solid '+BORDER2, background:BG3, color:color, fontFamily:FONT, fontSize:'17px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
      <input type="number" value={displayVal} placeholder="0" onChange={function(e){props.onChange(e.target.value===''?0:Math.max(0,Number(e.target.value)));}} style={{ width:'40px', textAlign:'center', background:BG3, border:'1px solid '+BORDER2, borderRadius:'7px', color:color, fontFamily:FONT, fontSize:'15px', fontWeight:'bold', padding:'4px 2px', outline:'none' }} />
      <button onClick={function(){props.onChange(Number(props.value)+1);}} style={{ width:'28px', height:'28px', borderRadius:'7px', border:'1px solid '+BORDER2, background:BG3, color:color, fontFamily:FONT, fontSize:'17px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
    </div>
  );
}
function TimeInput(props) {
  return <input type="time" value={props.value || ''} onChange={function(e){props.onChange(e.target.value);}} style={{ background:BG3, border:'1px solid '+BORDER2, borderRadius:'7px', color:props.color||TEXT, fontFamily:FONT, fontSize:'12px', padding:'5px 7px', outline:'none', width:'100%' }} />;
}
function Btn(props) {
  var bg = props.bg || 'rgba(245,158,11,0.1)';
  var border = '1px solid ' + (props.color || YELLOW);
  return <button onClick={props.onClick} style={{ width: props.full ? '100%' : 'auto', padding: props.small ? '7px 10px' : '12px 14px', background:bg, border:border, borderRadius:'10px', color:props.color||YELLOW, fontFamily:FONT, fontSize: props.small ? '9px' : '10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer' }}>{props.children}</button>;
}

// ── LOGIN ──
function Login(props) {
  var _pwd = useState(''); var pwd = _pwd[0]; var setPwd = _pwd[1];
  var _show = useState(false); var show = _show[0]; var setShow = _show[1];
  var _err = useState(''); var err = _err[0]; var setErr = _err[1];
  var _shake = useState(false); var shake = _shake[0]; var setShake = _shake[1];
  var _loading = useState(false); var loading = _loading[0]; var setLoading = _loading[1];

  async function doLogin() {
    if (!pwd) return;
    setLoading(true);
    var h = await sha256(pwd);
    var saved = lsg(K.pwd, null);
    var ok = false;
    if (!saved) {
      // Prima volta: nessuna password salvata, usa default Naturasi2026
      ok = (h === PWD_DEFAULT_HASH);
    } else if (saved === h) {
      // Password salvata come hash — confronto normale
      ok = true;
    } else if (saved === pwd) {
      // Vecchio sistema: password salvata in chiaro — migra automaticamente a hash
      ok = true;
      lss(K.pwd, h); // salva come hash da adesso
    }
    if (ok) {
      try { sessionStorage.setItem(K.auth, '1'); } catch(e) {}
      props.onLogin();
    } else {
      setErr('✗ PASSWORD ERRATA');
      setShake(true);
      setPwd('');
      setTimeout(function(){setShake(false);}, 500);
      setTimeout(function(){setErr('');}, 2500);
    }
    setLoading(false);
  }

  function onKey(e) { if (e.key === 'Enter') doLogin(); }

  return (
    <div style={{ minHeight:'100dvh', background:BG, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FONT, padding:'20px' }}>
      <div style={{ width:'100%', maxWidth:'300px', animation: shake ? 'shake 0.4s ease' : 'fadeIn 0.4s ease' }}>
        <div style={{ textAlign:'center', marginBottom:'36px' }}>
          <div style={{ fontSize:'52px', marginBottom:'10px' }}>📦</div>
          <div style={{ fontSize:'14px', fontWeight:'bold', letterSpacing:'4px', color:YELLOW }}>TURNI MAGAZZINO</div>
          <div style={{ fontSize:'9px', color:DIM, letterSpacing:'2px', marginTop:'4px' }}>INSERISCI LA PASSWORD</div>
        </div>

        <div style={{ position:'relative', marginBottom:'14px' }}>
          <input
            type={show ? 'text' : 'password'}
            value={pwd}
            onChange={function(e){setPwd(e.target.value); setErr('');}}
            onKeyDown={onKey}
            placeholder="Password"
            autoFocus
            style={{ width:'100%', background:BG2, border:'2px solid '+(err?RED:BORDER2), borderRadius:'12px', color:TEXT, fontFamily:FONT, fontSize:'18px', padding:'14px 46px 14px 16px', outline:'none', letterSpacing:'2px', boxSizing:'border-box', transition:'border-color 0.2s' }}
          />
          <button onClick={function(){setShow(!show);}} style={{ position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', background:'transparent', border:'none', cursor:'pointer', fontSize:'18px', color:DIM, padding:'4px' }}>
            {show ? '🙈' : '👁️'}
          </button>
        </div>

        <button onClick={doLogin} disabled={loading || !pwd} style={{ width:'100%', padding:'14px', background: pwd ? 'linear-gradient(135deg,'+YELLOW+','+YELLOW2+')' : BG3, border:'none', borderRadius:'12px', color: pwd ? '#000' : DIM, fontFamily:FONT, fontSize:'12px', fontWeight:'bold', letterSpacing:'3px', cursor: pwd ? 'pointer' : 'default', transition:'all 0.2s' }}>
          {loading ? '...' : 'ENTRA →'}
        </button>

        {err && (
          <div style={{ textAlign:'center', color:RED, fontSize:'10px', letterSpacing:'2px', marginTop:'14px' }}>{err}</div>
        )}
      </div>
    </div>
  );
}

// ── BOTTOM NAV ──
function Nav(props) {
  var tabs = [
    { id:'input', icon:'✏️', label:'INPUT' },
    { id:'input', icon:'✏️', label:'INPUT' },
    { id:'turni', icon:'📊', label:'TURNI' },
    { id:'dettaglio', icon:'📋', label:'DETTAGLIO' },
    { id:'riepilogo', icon:'📦', label:'RIEPILOGO' },
    { id:'settings', icon:'⚙️', label:'CONFIG' },
  ];
  return (
    <div style={{ position:'absolute', bottom:0, left:0, right:0, background:BG2, borderTop:'1px solid '+BORDER, display:'flex', zIndex:100, paddingBottom:'env(safe-area-inset-bottom)' }}>
      {tabs.map(function(t) {
        var active = props.page === t.id;
        return (
          <button key={t.id} onClick={function(){props.setPage(t.id);}} style={{ flex:1, background:'transparent', border:'none', padding:'7px 4px 5px', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:'2px' }}>
            <div style={{ fontSize:'18px', lineHeight:1 }}>{t.icon}</div>
            <div style={{ fontSize:'7px', letterSpacing:'1px', fontFamily:FONT, color: active ? YELLOW : DIM, fontWeight: active ? 'bold' : 'normal' }}>{t.label}</div>
            {active && <div style={{ width:'18px', height:'2px', background:YELLOW, borderRadius:'1px' }} />}
          </button>
        );
      })}
    </div>
  );
}


// ── PAGE INPUT RAPIDO ──
function PageInput(props) {
  var turni = props.turni; var setTurni = props.setTurni;
  var colli = props.colli; var setColli = props.setColli;
  var rate = props.rate; var setRate = props.setRate;
  var setPage = props.setPage;

  var _ok = React.useState(false); var confermato = _ok[0]; var setConfermato = _ok[1];

  // Persone locali per ogni turno (inizializzate dai turni esistenti)
  var _pers = React.useState(function() {
    var m = {};
    props.turni.forEach(function(t){ m[t.id] = t.persone || 0; });
    return m;
  });
  var persone = _pers[0]; var setPersone = _pers[1];

  var _colliInput = React.useState(colli || '');
  var colliInput = _colliInput[0]; var setColliInput = _colliInput[1];

  function setPers(id, v) {
    setPersone(function(prev){ var n = Object.assign({}, prev); n[id] = Math.max(0, v); return n; });
  }

  var totPersone = Object.values(persone).reduce(function(a,b){ return a + Number(b); }, 0);

  // Calcolo rapido chiusura stimata
  var chiusuraStimata = (function() {
    if (!colliInput || totPersone === 0) return null;
    var colliN = Number(colliInput);
    var r = Number(rate);
    var allT = props.turni.map(function(t) {
      return Object.assign({}, t, { persone: persone[t.id] || 0, assenti: 0, rate: r });
    });
    var evS = {};
    allT.forEach(function(t){ evS[tMin(t.inizio)] = true; evS[tMin(t.fine)] = true; if(t.pIn&&t.pOut){evS[tMin(t.pIn)]=true;evS[tMin(t.pOut)]=true;} });
    var ev = Object.keys(evS).map(Number).sort(function(a,b){return a-b;});
    var cum = 0;
    for (var i = 0; i < ev.length - 1; i++) {
      var frm = ev[i]; var to = ev[i+1]; var tR = 0;
      allT.forEach(function(t) {
        var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
        var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
        if (frm >= tIn && to <= tOut && !(pIn !== null && frm >= pIn && to <= pOut))
          tR += t.persone * t.rate;
      });
      if (tR === 0) continue;
      var prod = tR * (to - frm) / 60;
      if (cum + prod >= colliN) {
        return mToT(frm + (colliN - cum) / tR * 60);
      }
      cum += prod;
    }
    return null;
  })();

  function conferma() {
    // Applica le persone ai turni
    setTurni(function(prev) {
      return prev.map(function(t) {
        return Object.assign({}, t, { persone: persone[t.id] || 0, assenti: 0 });
      });
    });
    // Applica i colli
    setColli(colliInput);
    setConfermato(true);
    setTimeout(function() { setConfermato(false); setPage('turni'); }, 1200);
  }

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:'80px', fontFamily:FONT }}>
      <div style={{ background:BG2, borderBottom:'1px solid '+BORDER, padding:'10px 14px', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ fontSize:'13px', fontWeight:'bold', letterSpacing:'3px', color:YELLOW }}>✏️ INPUT RAPIDO</div>
        <div style={{ fontSize:'9px', color:DIM, marginTop:'2px', letterSpacing:'1px' }}>Inserisci persone e colli — si compila tutto in automatico</div>
      </div>

      <div style={{ padding:'12px' }}>

        {/* COLLI + RATE */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'14px' }}>
          <Panel>
            <Lbl color={YELLOW}>📦 COLLI DA FARE</Lbl>
            <input type="number" value={colliInput} onChange={function(e){setColliInput(e.target.value);}}
              placeholder="es. 12000"
              style={{ width:'100%', background:'transparent', border:'none', color:YELLOW, fontFamily:FONT, fontSize:'28px', fontWeight:'bold', outline:'none', padding:0 }} />
          </Panel>
          <Panel>
            <Lbl color={PURPLE}>COLLI / ORA</Lbl>
            <div style={{ display:'flex', gap:'6px' }}>
              {[90,100].map(function(v) {
                return (
                  <button key={v} onClick={function(){setRate(v);}}
                    style={{ flex:1, padding:'8px 4px', borderRadius:'8px', border:'2px solid '+(rate==v?PURPLE:BORDER2), background:rate==v?'rgba(167,139,250,0.15)':'transparent', color:rate==v?PURPLE:DIM, fontFamily:FONT, fontSize:'16px', fontWeight:'bold', cursor:'pointer' }}>
                    {v}
                  </button>
                );
              })}
            </div>
          </Panel>
        </div>

        {/* PERSONE PER TURNO */}
        <Lbl color={YELLOW}>👥 PERSONE PER TURNO</Lbl>
        {props.turni.map(function(t) {
          var cl = tColor(t.nome);
          var p = persone[t.id] || 0;
          return (
            <Panel key={t.id} style={{ marginBottom:'8px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <div>
                  <div style={{ fontSize:'11px', fontWeight:'bold', color:cl, letterSpacing:'1px' }}>{t.nome}</div>
                  <div style={{ fontSize:'9px', color:DIM, marginTop:'2px' }}>{t.inizio} → {t.fine}</div>
                </div>
                <NumInput value={p} onChange={function(v){setPers(t.id, v);}} color={cl} />
              </div>
            </Panel>
          );
        })}

        {/* TOTALE */}
        {totPersone > 0 && (
          <Panel style={{ marginBottom:'14px', border:'1px solid '+BORDER2, textAlign:'center' }}>
            <Lbl>TOTALE PERSONE</Lbl>
            <div style={{ fontSize:'32px', fontWeight:'bold', color:TEXT }}>{totPersone}</div>
          </Panel>
        )}

        {/* CHIUSURA STIMATA PREVIEW */}
        {chiusuraStimata && (
          <div style={{ background:'linear-gradient(135deg,#064e3b,#065f46)', border:'2px solid '+GREEN, borderRadius:'14px', padding:'16px', textAlign:'center', marginBottom:'14px' }}>

                  <div style={{ fontSize:'10px', fontWeight:'bold', color:cl, letterSpacing:'1px' }}>{t.nome}</div>
                  <div style={{ fontSize:'9px', color:DIM, marginTop:'1px' }}>{t.inizio} → {t.fine} · pausa {t.pIn}-{t.pOut}</div>
                </div>
                {eff > 0 && <div style={{ fontSize:'9px', color:GREEN, background:'rgba(16,185,129,0.1)', border:'1px solid '+GREEN, borderRadius:'6px', padding:'2px 7px' }}>{eff} eff.</div>}
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom: sp.righe.length > 0 ? '8px' : 0 }}>
                <div><Lbl>👥 PERSONE</Lbl><NumInput value={t.persone||0} onChange={function(v){setP(t.id,v);}} color={cl} /></div>
                <div><Lbl>🚫 ASSENTI</Lbl><NumInput value={t.assenti||0} onChange={function(v){setA(t.id,v);}} color={RED} /></div>

                var eff = Math.max(0, (t.persone||0) - (t.assenti||0));

                var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
                var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
                var min = tOut - tIn;
                if (pIn && pOut) min -= (pOut - pIn);
                var colliTurno = Math.round(eff * Number(rate) * min / 60);
                var colliStrao = 0;
                (sp.righe||[]).forEach(function(rr){
                  if(rr.inizio&&rr.fine&&Number(rr.persone)>0)
                    colliStrao += Math.round(Number(rr.persone)*Number(rate)*(tMin(rr.fine)-tMin(rr.inizio))/60);

                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', background:BG3, borderRadius:'8px', padding:'7px 10px', marginBottom:'8px', marginTop:'2px' }}>

                      <div style={{ fontSize:'14px', fontWeight:'bold', color:cl }}>{colliTurno.toLocaleString('it-IT')}</div>

                    </div>
                  </div>
                );
              })()}
              {sp.righe.map(function(rr, ri) {
                return (
                  <div key={ri} style={{ borderTop:'1px solid '+BORDER, paddingTop:'8px', marginTop:'6px' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px' }}>

                      <div><div style={{ fontSize:'7px', color:DIM, marginBottom:'3px' }}>ALLE</div><TimeInput value={rr.fine} onChange={function(v){setStraRiga(t.id,ri,'fine',v);}} color={ORANGE} /></div>
                      <div><div style={{ fontSize:'7px', color:DIM, marginBottom:'3px' }}>PERS.</div><input type="number" value={rr.persone===0?'':`${rr.persone}`} placeholder="0" onChange={function(e){setStraRiga(t.id,ri,'persone',e.target.value===''?0:Math.max(0,Number(e.target.value)));}} style={{ width:'100%', background:BG3, border:'1px solid '+BORDER2, borderRadius:'7px', color:'#4ade80', fontFamily:FONT, fontSize:'15px', fontWeight:'bold', padding:'4px 4px', outline:'none', textAlign:'center' }} /></div>
                    </div>

                );

            </Panel>
          );

        {risultato && (
          <div className="fadeup" style={{ marginTop:'12px' }}>
            <div style={{ background: isOk ? 'linear-gradient(135deg,#064e3b,#065f46)' : 'linear-gradient(135deg,#450a0a,#7f1d1d)', border:'2px solid '+(isOk?GREEN:RED), borderRadius:'14px', padding:'20px', textAlign:'center' }}>

                    <div><div style={{ fontSize:'8px', color:DIM, marginBottom:'2px' }}>DELTA</div><div style={{ fontSize:'16px', fontWeight:'bold', color: puntoRes.confronto.delta>=0?GREEN:RED }}>{puntoRes.confronto.delta>=0?'+':''}{puntoRes.confronto.delta.toLocaleString('it-IT')}</div></div>

                        </div>
                        <div style={{ fontSize:'20px', fontWeight:'bold', color:BLUE }}>{p.persone}</div>
                      </div>
                    );
                  })}
                </Panel>
              )}
            </div>
          )}
        </div>

        <div style={{ marginTop:'16px', borderTop:'1px solid '+BORDER, paddingTop:'14px' }}>
          <Lbl color={PURPLE}>🎯 OBIETTIVO INVERSO</Lbl>
          <div style={{ display:'flex', gap:'10px', alignItems:'flex-end', marginBottom:'10px', flexWrap:'wrap' }}>

            <button onClick={calcolaInverso} style={{ padding:'11px 16px', background:'rgba(167,139,250,0.1)', border:'2px solid '+PURPLE, borderRadius:'10px', color:PURPLE, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer' }}>🎯 CALCOLA</button>

              {invResult.tipo === 'sposta' && (

                    <div style={{ fontSize:'18px', color:PURPLE }}>→</div>
                    <div style={{ background:BG3, borderRadius:'8px', padding:'7px 10px', textAlign:'center' }}><div style={{ fontSize:'8px', color:DIM }}>A</div><div style={{ fontSize:'10px', color:'#c4b5fd', fontWeight:'bold' }}>{invResult.a}</div></div>
                    <div style={{ background:BG3, borderRadius:'8px', padding:'7px 10px', textAlign:'center' }}><div style={{ fontSize:'8px', color:DIM }}>QUANTE</div><div style={{ fontSize:'26px', fontWeight:'bold', color:PURPLE, lineHeight:1 }}>{invResult.quante}</div></div>
                    <div style={{ background:BG3, borderRadius:'8px', padding:'7px 10px', textAlign:'center' }}><div style={{ fontSize:'8px', color:DIM }}>CHIUSURA</div><div style={{ fontSize:'20px', fontWeight:'bold', color:GREEN, lineHeight:1 }}>{invResult.fineNuova}</div></div>
                  </div>
                  <div style={{ fontSize:'10px', color:MID }}>Mattina → <b style={{ color:TEXT }}>{invResult.matNew}</b> · Pomeriggio → <b style={{ color:TEXT }}>{invResult.pomNew}</b></div>
                </Panel>

              {invResult.tipo === 'strao' && (
                <Panel style={{ border:'2px solid '+ORANGE, marginBottom:'8px' }}>

// ── PAGE DETTAGLIO ──
function PageDettaglio(props) {
  var turni = props.turni; var stra = props.stra;
  var colli = props.colli; var rate = props.rate;

  var rows = useMemo(function() {
    var colliN = Number(colli);
    if (!colliN) return [];
    var allT = buildAllT(turni, stra, Number(rate));
    return calcRows(colliN, allT, Number(rate)).rows;
  }, [colli, rate, JSON.stringify(turni), JSON.stringify(stra)]);

  var chiusura = null;
  rows.forEach(function(r) { if (r.highlight) chiusura = r.fineEx; });
  var anticipo = chiusura ? calcAnticipo(buildAllT(turni, stra, Number(rate)), chiusura, Number(rate)) : 0;

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:'70px', fontFamily:FONT }}>
      <div style={{ background:BG2, borderBottom:'1px solid '+BORDER, padding:'10px 12px', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ fontSize:'13px', fontWeight:'bold', letterSpacing:'3px', color:YELLOW }}>📋 DETTAGLIO FASCE</div>
      </div>
      <div style={{ padding:'12px' }}>
        {!Number(colli) ? (
          <div style={{ textAlign:'center', color:DIM, fontSize:'11px', marginTop:'60px', letterSpacing:'2px' }}>
            <div style={{ fontSize:'32px', marginBottom:'12px' }}>📋</div>
            INSERISCI I COLLI<br />
            <span style={{ fontSize:'9px' }}>nella pagina TURNI</span>
          </div>
        ) : (
          <div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'12px' }}>
              <Panel style={{ textAlign:'center' }}><Lbl>COLLI</Lbl><div style={{ fontSize:'24px', fontWeight:'bold', color:YELLOW }}>{Number(colli).toLocaleString('it-IT')}</div></Panel>
              <Panel style={{ border:'2px solid '+(chiusura?GREEN:RED), textAlign:'center' }}><Lbl>CHIUSURA</Lbl><div style={{ fontSize:'24px', fontWeight:'bold', color:chiusura?GREEN:RED }}>{chiusura||'—'}</div></Panel>
            </div>
            {anticipo > 0 && <Panel style={{ border:'1px solid '+PURPLE, textAlign:'center', marginBottom:'12px' }}><Lbl color={PURPLE}>⚡ ANTICIPO</Lbl><div style={{ fontSize:'20px', fontWeight:'bold', color:'#c4b5fd' }}>+{anticipo.toLocaleString('it-IT')} colli</div></Panel>}
            <Lbl>FASCE ORARIE</Lbl>
            {rows.map(function(r, i) {
              var isS = r.isStrao || (r.nome && r.nome.indexOf('strao') >= 0);
              var bord = r.highlight ? GREEN : isS ? ORANGE : r.anticipo ? PURPLE : BORDER;
              var bg = r.highlight ? 'rgba(16,185,129,0.08)' : isS ? 'rgba(249,115,22,0.08)' : r.anticipo ? 'rgba(167,139,250,0.06)' : r.pausa ? 'rgba(239,68,68,0.04)' : BG2;
              var tc = r.highlight ? GREEN : isS ? ORANGE : r.anticipo ? PURPLE : r.pausa ? RED : TEXT;
              return (
                <div key={i} style={{ background:bg, border:'1px solid '+bord, borderRadius:'10px', padding:'10px 12px', marginBottom:'6px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: r.pausa ? 0 : '8px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                      {isS && <span>⚡</span>}
                      <div style={{ fontSize:'13px', fontWeight:'bold', color:tc }}>
                        {r.frm} → {r.highlight ? r.fineEx : r.to}
                        {r.highlight && <span style={{ marginLeft:'8px', fontSize:'9px', background:GREEN, color:'#000', borderRadius:'4px', padding:'1px 6px' }}>FINE ✓</span>}
                        {r.anticipo && <span style={{ marginLeft:'6px', fontSize:'9px', color:PURPLE }}> anticipo</span>}
                      </div>
                      {isS && <span style={{ fontSize:'8px', background:'rgba(249,115,22,0.2)', color:ORANGE, borderRadius:'4px', padding:'1px 5px' }}>STRAO</span>}
                    </div>
                    <div style={{ fontSize:'9px', color:DIM }}>{r.dur}min</div>
                  </div>
                  {r.pausa ? (
                    <div style={{ fontSize:'9px', color:RED, textAlign:'center', letterSpacing:'2px' }}>— PAUSA —</div>
                  ) : (
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'4px', textAlign:'center' }}>
                      <div><div style={{ fontSize:'7px', color:DIM, marginBottom:'2px' }}>PERS.</div><div style={{ fontSize:'12px', fontWeight:'bold', color:TEXT }}>{r.pers}</div></div>
                      <div><div style={{ fontSize:'7px', color:DIM, marginBottom:'2px' }}>C/H</div><div style={{ fontSize:'12px', fontWeight:'bold', color:MID }}>{r.colliH||'—'}</div></div>
                      <div><div style={{ fontSize:'7px', color:DIM, marginBottom:'2px' }}>{r.anticipo?'ANTICIPO':'PROD.'}</div><div style={{ fontSize:'12px', fontWeight:'bold', color: r.highlight?GREEN:isS?ORANGE:r.anticipo?PURPLE:TEXT }}>{r.prod>0 ? '+'+r.prod.toLocaleString('it-IT') : '—'}</div></div>
                      <div><div style={{ fontSize:'7px', color:DIM, marginBottom:'2px' }}>{r.anticipo?'CUM.':'RIM.'}</div><div style={{ fontSize:'12px', fontWeight:'bold', color: r.rim===0?GREEN:r.anticipo?PURPLE:YELLOW }}>{r.rim.toLocaleString('it-IT')}</div></div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── PAGE RIEPILOGO ──
function PageRiepilogo(props) {
  var turni = props.turni; var stra = props.stra;
  var rate = props.rate; var colli = props.colli;
  var r = Number(rate);

  var righe = [];
  turni.forEach(function(t) {
    var pers = Math.max(0, (t.persone||0) - (t.assenti||0));
    if (!pers) return;
    var tIn = tMin(t.inizio); var tOut = tMin(t.fine);
    var pIn = t.pIn ? tMin(t.pIn) : null; var pOut = t.pOut ? tMin(t.pOut) : null;
    var min = tOut - tIn;
    if (pIn && pOut) min -= (pOut - pIn);
    righe.push({ nome:t.nome, pers:pers, colli:Math.round(pers*r*min/60), isStrao:false, color:tColor(t.nome) });
    var sp = stra.find(function(s){return s.id===t.id;});
    if (sp) {
      (sp.righe||[]).filter(function(rr){return rr.inizio&&rr.fine&&Number(rr.persone)>0;}).forEach(function(rr) {
        var sMin = tMin(rr.fine) - tMin(rr.inizio);
        righe.push({ nome:'⚡ '+t.nome.split(' ')[0], pers:Number(rr.persone), colli:Math.round(Number(rr.persone)*r*sMin/60), isStrao:true, color:ORANGE });
      });
    }
  });
  var totale = righe.reduce(function(s,x){return s+x.colli;}, 0);
  var storico = lsg(K.storico, []).slice(0, 7);

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:'70px', fontFamily:FONT }}>
      <div style={{ background:BG2, borderBottom:'1px solid '+BORDER, padding:'10px 12px', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ fontSize:'13px', fontWeight:'bold', letterSpacing:'3px', color:YELLOW }}>📦 RIEPILOGO</div>
      </div>
      <div style={{ padding:'12px' }}>
        {righe.length > 0 ? (
          <Panel style={{ marginBottom:'12px', border:'1px solid '+YELLOW }}>
            <Lbl color={YELLOW}>📦 COLLI / TURNO</Lbl>
            {righe.map(function(x, i) {
              return (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'9px 0', borderBottom:'1px solid '+BORDER }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                    {x.isStrao && <span style={{ fontSize:'11px' }}>⚡</span>}
                    <div style={{ fontSize:'10px', color:x.color, fontWeight: x.isStrao ? 'normal' : 'bold' }}>{x.nome}</div>
                  </div>
                  <div style={{ display:'flex', gap:'14px', alignItems:'center' }}>
                    <div style={{ fontSize:'9px', color:DIM }}>{x.pers} pers</div>
                    <div style={{ fontSize:'14px', fontWeight:'bold', color: x.isStrao ? ORANGE : GREEN, minWidth:'75px', textAlign:'right' }}>{x.colli.toLocaleString('it-IT')}</div>
                  </div>
                </div>
              );
            })}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:'10px' }}>

// ── PAGE SETTINGS ──
function PageSettings(props) {
  var turni = props.turni; var setTurni = props.setTurni;
  var stra = props.stra; var setStra = props.setStra;
  var onLogout = props.onLogout;

  var _tab = useState('turni'); var tab = _tab[0]; var setTab = _tab[1];
  var _op = useState(''); var oldP = _op[0]; var setOldP = _op[1];
  var _np = useState(''); var newP = _np[0]; var setNewP = _np[1];
  var _cf = useState(''); var conf = _cf[0]; var setConf = _cf[1];
  var _msg = useState(null); var msg = _msg[0]; var setMsg = _msg[1];
  var _fb = useState(function(){return lsg(K.fb,{}).url||'';}); var fbUrl = _fb[0]; var setFbUrl = _fb[1];
  var _sm = useState(null); var syncMsg = _sm[0]; var setSyncMsg = _sm[1];
  var _sy = useState(false); var syncing = _sy[0]; var setSyncing = _sy[1];

  function aggiornaTurno(id, field, val) {
    setTurni(function(prev){return prev.map(function(t){return t.id===id ? Object.assign({},t,{[field]:val}) : t;});});
  }
  function aggiungiTurno() {
    var id = newId();
    setTurni(function(prev){return prev.concat([{id:id,nome:'Nuovo Turno',inizio:'06:00',fine:'14:00',pIn:'10:00',pOut:'10:20',persone:0,assenti:0}]);});
    setStra(function(prev){return prev.concat([{id:id,righe:[]}]);});
  }
  function eliminaTurno(id) {
    setTurni(function(prev){return prev.filter(function(t){return t.id!==id;});});
    setStra(function(prev){return prev.filter(function(s){return s.id!==id;});});
  }
  function addStraDefault(tid) {
    setStra(function(prev){return prev.map(function(sp){return sp.id===tid ? Object.assign({},sp,{righe:(sp.righe||[]).concat([{inizio:'',fine:'',persone:0}])}) : sp;});});
  }
  function delStraDefault(tid, ri) {
    setStra(function(prev){return prev.map(function(sp){return sp.id===tid ? Object.assign({},sp,{righe:sp.righe.filter(function(_,i){return i!==ri;})}) : sp;});});
  }
  function setStraDefault(tid, ri, field, val) {
    setStra(function(prev){return prev.map(function(sp){
      if(sp.id!==tid)return sp;
      return Object.assign({},sp,{righe:sp.righe.map(function(r,i){return i===ri?Object.assign({},r,{[field]:val}):r;})});
    });});
  }

  async function cambiaPwd() {
    var curHash = lsg(K.pwd, PWD_DEFAULT_HASH);
    var oldHash = await sha256(oldP);
    if (oldHash !== curHash) { setMsg({ok:false,t:'Password attuale errata'}); return; }
    if (newP.length < 4) { setMsg({ok:false,t:'Minimo 4 caratteri'}); return; }
    if (newP !== conf) { setMsg({ok:false,t:'Le password non coincidono'}); return; }
    var newHash = await sha256(newP);
    lss(K.pwd, newHash); setMsg({ok:true,t:'✅ Password cambiata!'}); setOldP(''); setNewP(''); setConf('');
    setTimeout(function(){setMsg(null);}, 2500);
  }

  function salvaDefault() {
    lss('tm_def_stra', stra);
    setSyncMsg({ok:true,t:'✅ Salvato come default!'}); setTimeout(function(){setSyncMsg(null);}, 2000);
  }

  function syncNow(dir) {
    var fbCfg = lsg(K.fb, {});
    if (!fbCfg.url) { setSyncMsg({ok:false,t:'Configura prima il URL Firebase'}); return; }
    setSyncing(true);
    var url = fbCfg.url.replace(/\/$/, '') + '/turni_data.json';
    if (dir === 'up') {
      var data = { turni:lsg(K.turni,[]), stra:lsg(K.stra,[]), colli:lsg(K.colli,''), rate:lsg(K.rate,90), storico:lsg(K.storico,[]) };
      fetch(url, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) })
        .then(function(res){ setSyncing(false); setSyncMsg(res.ok?{ok:true,t:'✅ Dati caricati!'}:{ok:false,t:'Errore HTTP '+res.status}); setTimeout(function(){setSyncMsg(null);},4000); })
        .catch(function(e){ setSyncing(false); setSyncMsg({ok:false,t:'Errore: '+e.message}); setTimeout(function(){setSyncMsg(null);},4000); });
    } else {
      fetch(url)
        .then(function(res){ return res.json(); })
        .then(function(d){ if(d.turni)lss(K.turni,d.turni); if(d.stra)lss(K.stra,d.stra); if(d.colli!==undefined)lss(K.colli,d.colli); if(d.rate)lss(K.rate,d.rate); if(d.storico)lss(K.storico,d.storico); setSyncing(false); setSyncMsg({ok:true,t:'✅ Scaricato! Ricarica.'}); setTimeout(function(){setSyncMsg(null);},4000); })
        .catch(function(e){ setSyncing(false); setSyncMsg({ok:false,t:'Errore: '+e.message}); setTimeout(function(){setSyncMsg(null);},4000); });
    }
  }

  var tabs = [{id:'turni',label:'TURNI'},{id:'pwd',label:'PASSWORD'},{id:'sync',label:'SYNC'}];

  return (
    <div style={{ height:'100%', overflowY:'auto', paddingBottom:'70px', fontFamily:FONT }}>
      <div style={{ background:BG2, borderBottom:'1px solid '+BORDER, padding:'10px 12px', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ fontSize:'13px', fontWeight:'bold', letterSpacing:'3px', color:YELLOW }}>⚙️ IMPOSTAZIONI</div>
      </div>
      <div style={{ display:'flex', background:BG2, borderBottom:'1px solid '+BORDER }}>
        {tabs.map(function(t) {
          return <button key={t.id} onClick={function(){setTab(t.id);}} style={{ flex:1, background:'transparent', border:'none', borderBottom:'2px solid '+(tab===t.id?YELLOW:'transparent'), padding:'10px 4px', color:tab===t.id?YELLOW:DIM, fontFamily:FONT, fontSize:'9px', letterSpacing:'2px', cursor:'pointer', fontWeight:tab===t.id?'bold':'normal' }}>{t.label}</button>;
        })}
      </div>

      <div style={{ padding:'12px' }}>
        {tab === 'turni' && (
          <div>
            <div style={{ fontSize:'10px', color:MID, marginBottom:'12px', lineHeight:1.6 }}>Modifica gli orari dei turni e i default degli straordinari.</div>
            {turni.map(function(t) {
              var sp = stra.find(function(s){return s.id===t.id;}) || {righe:[]};
              var cl = tColor(t.nome);
              return (
                <Panel key={t.id} style={{ marginBottom:'10px', border:'1px solid '+cl }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px' }}>
                    <input value={t.nome} onChange={function(e){aggiornaTurno(t.id,'nome',e.target.value);}}
                      style={{ background:'transparent', border:'none', color:cl, fontFamily:FONT, fontSize:'11px', fontWeight:'bold', outline:'none', letterSpacing:'1px', flex:1 }} />
                    <button onClick={function(){eliminaTurno(t.id);}} style={{ background:'rgba(239,68,68,0.1)', border:'1px solid '+RED, borderRadius:'6px', color:RED, fontFamily:FONT, fontSize:'9px', padding:'3px 8px', cursor:'pointer' }}>× ELIMINA</button>
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'8px' }}>
                    <div><Lbl>INIZIO</Lbl><TimeInput value={t.inizio} onChange={function(v){aggiornaTurno(t.id,'inizio',v);}} /></div>
                    <div><Lbl>FINE</Lbl><TimeInput value={t.fine} onChange={function(v){aggiornaTurno(t.id,'fine',v);}} /></div>
                    <div><Lbl>PAUSA INIZIO</Lbl><TimeInput value={t.pIn} onChange={function(v){aggiornaTurno(t.id,'pIn',v);}} color={MID} /></div>
                    <div><Lbl>PAUSA FINE</Lbl><TimeInput value={t.pOut} onChange={function(v){aggiornaTurno(t.id,'pOut',v);}} color={MID} /></div>
                  </div>
                  {(sp.righe||[]).map(function(rr, ri) {
                    return (
                      <div key={ri} style={{ borderTop:'1px solid '+BORDER, paddingTop:'8px', marginTop:'4px' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'5px' }}>
                          <Lbl color={ORANGE}>⚡ STRAO DEFAULT {ri+1}</Lbl>
                          <button onClick={function(){delStraDefault(t.id,ri);}} style={{ background:'transparent', border:'none', color:RED, cursor:'pointer', fontSize:'13px' }}>×</button>
                        </div>
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px' }}>
                          <div><Lbl>DALLE</Lbl><TimeInput value={rr.inizio} onChange={function(v){setStraDefault(t.id,ri,'inizio',v);}} color={ORANGE} /></div>
                          <div><Lbl>ALLE</Lbl><TimeInput value={rr.fine} onChange={function(v){setStraDefault(t.id,ri,'fine',v);}} color={ORANGE} /></div>
                        </div>
                      </div>
                    );
                  })}
                  <button onClick={function(){addStraDefault(t.id);}} style={{ width:'100%', marginTop:'8px', padding:'7px', background:'rgba(249,115,22,0.06)', border:'1px dashed '+ORANGE, borderRadius:'7px', color:ORANGE, fontFamily:FONT, fontSize:'9px', letterSpacing:'2px', cursor:'pointer' }}>+ AGGIUNGI RIGA STRAORDINARIO</button>
                </Panel>
              );
            })}
            <button onClick={aggiungiTurno} style={{ width:'100%', padding:'13px', background:'rgba(245,158,11,0.06)', border:'2px dashed '+YELLOW, borderRadius:'12px', color:YELLOW, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'3px', cursor:'pointer', marginBottom:'10px' }}>+ AGGIUNGI TURNO</button>
            <button onClick={salvaDefault} style={{ width:'100%', padding:'12px', background:'rgba(16,185,129,0.1)', border:'1px solid '+GREEN, borderRadius:'10px', color:GREEN, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer' }}>💾 SALVA COME DEFAULT</button>
            {syncMsg && <div style={{ marginTop:'8px', fontSize:'10px', color:syncMsg.ok?GREEN:RED, textAlign:'center' }}>{syncMsg.t}</div>}
          </div>
        )}

        {tab === 'pwd' && (
          <Panel>
            <Lbl color={PURPLE}>🔐 CAMBIA PASSWORD</Lbl>
            <div style={{ fontSize:'9px', color:DIM, marginBottom:'10px', lineHeight:1.6 }}>La password attuale è richiesta per confermarne una nuova. Minimo 4 caratteri.</div>
            {[['PASSWORD ATTUALE',oldP,setOldP],['NUOVA PASSWORD',newP,setNewP],['CONFERMA PASSWORD',conf,setConf]].map(function(item) {
              return (
                <div key={item[0]} style={{ marginBottom:'8px' }}>
                  <div style={{ fontSize:'8px', color:DIM, marginBottom:'3px', letterSpacing:'1px' }}>{item[0]}</div>
                  <input type="password" value={item[1]} onChange={function(e){item[2](e.target.value);}}
                    style={{ width:'100%', background:BG3, border:'1px solid '+BORDER2, borderRadius:'8px', color:TEXT, fontFamily:FONT, fontSize:'16px', padding:'10px 12px', outline:'none' }} />
                </div>
              );
            })}
            {msg && <div style={{ fontSize:'10px', color:msg.ok?GREEN:RED, textAlign:'center', marginBottom:'8px' }}>{msg.t}</div>}
            <button onClick={cambiaPwd} style={{ width:'100%', padding:'12px', background:'rgba(167,139,250,0.1)', border:'1px solid '+PURPLE, borderRadius:'8px', color:PURPLE, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer', marginBottom:'10px' }}>SALVA NUOVA PASSWORD</button>
            <button onClick={onLogout} style={{ width:'100%', padding:'12px', background:'rgba(245,158,11,0.1)', border:'1px solid '+YELLOW, borderRadius:'8px', color:YELLOW, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer', marginBottom:'8px' }}>🚪 ESCI</button>
            <button onClick={function(){if(window.confirm('Cancellare tutti i dati?')){[K.turni,K.stra,K.colli,K.rate,K.storico].forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});window.location.reload();}}} style={{ width:'100%', padding:'12px', background:'rgba(239,68,68,0.1)', border:'1px solid '+RED, borderRadius:'8px', color:RED, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer' }}>🗑 CANCELLA TUTTI I DATI</button>
          </Panel>
        )}

        {tab === 'sync' && (
          <Panel style={{ border:'1px solid '+BLUE }}>
            <Lbl color={BLUE}>☁️ SINCRONIZZAZIONE FIREBASE</Lbl>
            <div style={{ fontSize:'9px', color:DIM, marginBottom:'10px', lineHeight:1.7 }}>
              1. Vai su <b style={{ color:BLUE }}>firebase.google.com</b><br />

              3. Copia l'URL del database<br />
              4. Regole: {'{'}".read":true,".write":true{'}'}
            </div>
            <Lbl>URL DATABASE</Lbl>
            <input value={fbUrl} onChange={function(e){setFbUrl(e.target.value);}} placeholder="https://progetto-default-rtdb.firebaseio.com"
              style={{ width:'100%', background:BG3, border:'1px solid '+BORDER2, borderRadius:'8px', color:TEXT, fontFamily:FONT, fontSize:'10px', padding:'10px', outline:'none', marginBottom:'8px' }} />
            <button onClick={function(){lss(K.fb,{url:fbUrl});setSyncMsg({ok:true,t:'URL salvato!'});setTimeout(function(){setSyncMsg(null);},1500);}} style={{ width:'100%', padding:'10px', background:'rgba(56,189,248,0.1)', border:'1px solid '+BLUE, borderRadius:'8px', color:BLUE, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', letterSpacing:'2px', cursor:'pointer', marginBottom:'8px' }}>💾 SALVA URL</button>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px' }}>
              <button onClick={function(){syncNow('up');}} style={{ padding:'12px', background:'rgba(16,185,129,0.1)', border:'1px solid '+GREEN, borderRadius:'8px', color:GREEN, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', cursor:'pointer' }}>{syncing ? '⟳' : '⬆️ CARICA'}</button>
              <button onClick={function(){syncNow('down');}} style={{ padding:'12px', background:'rgba(249,115,22,0.1)', border:'1px solid '+ORANGE, borderRadius:'8px', color:ORANGE, fontFamily:FONT, fontSize:'10px', fontWeight:'bold', cursor:'pointer' }}>{syncing ? '⟳' : '⬇️ SCARICA'}</button>
            </div>
            {syncMsg && <div style={{ marginTop:'8px', fontSize:'10px', color:syncMsg.ok?GREEN:RED, textAlign:'center' }}>{syncMsg.t}</div>}

}

// ── APP ──
function App() {
  var _page = useState('turni'); var page = _page[0]; var setPage = _page[1];
  var _turni = useState(function(){return lsg(K.turni, DEF_TURNI);}); var turni = _turni[0]; var setTurniRaw = _turni[1];
  var _stra = useState(function(){return lsg(K.stra, DEF_STRA);}); var stra = _stra[0]; var setStraRaw = _stra[1];
  var _colli = useState(function(){return lsg(K.colli, '');}); var colli = _colli[0]; var setColliRaw = _colli[1];
  var _rate = useState(function(){return lsg(K.rate, 90);}); var rate = _rate[0]; var setRateRaw = _rate[1];
  var _puntoOra = useState(''); var puntoOra = _puntoOra[0]; var setPuntoOra = _puntoOra[1];
  var _puntoRim = useState(''); var puntoRim = _puntoRim[0]; var setPuntoRim = _puntoRim[1];
  var _puntoRes = useState(null); var puntoRes = _puntoRes[0]; var setPuntoRes = _puntoRes[1];

  function setTurni(v) { var n = typeof v === 'function' ? v(turni) : v; setTurniRaw(n); lss(K.turni, n); }
  function setStra(v) { var n = typeof v === 'function' ? v(stra) : v; setStraRaw(n); lss(K.stra, n); }
  function setColli(v) { setColliRaw(v); lss(K.colli, v); }
  function setRate(v) { setRateRaw(v); lss(K.rate, v); }

  useEffect(function() {
    setStra(function(prev) {
      var updated = turni.map(function(t) {
        var ex = prev.find(function(s){return s.id===t.id;});
        return ex || { id:t.id, righe:[] };
      });
      return updated;
    });
  }, [turni.length]);

  function logout() { try { sessionStorage.removeItem(K.auth); } catch(e) {} window.location.reload(); }

  var pageProps = { turni:turni, setTurni:setTurni, stra:stra, setStra:setStra, colli:colli, setColli:setColli, rate:rate, setRate:setRate, puntoOra:puntoOra, setPuntoOra:setPuntoOra, puntoRim:puntoRim, setPuntoRim:setPuntoRim, puntoRes:puntoRes, setPuntoRes:setPuntoRes };

  return (
    <div style={{ height:'100vh', maxWidth:'480px', margin:'0 auto', position:'relative', display:'flex', flexDirection:'column', background:BG, overflow:'hidden' }}>
      <div key={page} style={{ flex:1, overflow:'hidden', animation:'fadeUp 0.2s ease' }}>
        {page === 'input' && <PageInput {...pageProps} setPage={setPage} />}
        {page === 'input' && <PageInput {...pageProps} setPage={setPage} />}
        {page === 'turni' && <PageTurni {...pageProps} />}
        {page === 'dettaglio' && <PageDettaglio {...pageProps} />}
        {page === 'riepilogo' && <PageRiepilogo {...pageProps} />}
        {page === 'settings' && <PageSettings turni={turni} setTurni={setTurni} stra={stra} setStra={setStra} onLogout={logout} />}
      </div>
      <Nav page={page} setPage={setPage} />
    </div>
  );
}

function Root() {
  var _ok = useState(function(){try{return!!sessionStorage.getItem(K.auth);}catch(e){return false;}}); var ok = _ok[0]; var setOk = _ok[1];
  function login() { try { sessionStorage.setItem(K.auth, '1'); } catch(e) {} setOk(true); }
  return ok ? <App /> : <Login onLogin={login} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

</script>
